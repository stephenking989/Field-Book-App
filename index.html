                <button onClick={() => { addColumn(); setOpenTbMenu(null); }}>＋ Column</button>
              )}
              {page.type === 'points' && (
                <>
                  <div className="dp-drop-sep" />
                  <div className="dp-drop-section">Import</div>
                  <button onClick={() => { importPointsCSV(); setOpenTbMenu(null); }}>⬆ Import CSV…</button>
                </>
              )}
              {page.type !== 'points' && (
                <>
                  <div className="dp-drop-sep" />
                  <div className="dp-drop-section">Import</div>
                  <button onClick={() => { importDataCSV(); setOpenTbMenu(null); }}>⬆ Import CSV…</button>
                  <div className="dp-drop-sep" />
                  <div className="dp-drop-section">Templates</div>
                  <button onClick={() => { setTemplateModal(true); setOpenTbMenu(null); }}>Apply Template…</button>
                </>
              )}
            </div>
          )}
          {openTbMenu === 'formulas' && (
            <div ref={tbMenuRef} className="dp-drop-panel" style={{ top: menuPos.top, left: menuPos.left }}>
              <div className="dp-drop-section">Insert Formula</div>
              <button onClick={() => {
                setOpenTbMenu(null);
                if (!activeCell) return;
                const { rowIdx: ri, colIdx: ci } = activeCell;
                if (!rows[ri] || !columns[ci]) return;
                const f = ri > 0 ? `=SUM(${cellRef(0,ci)}:${cellRef(ri-1,ci)})` : '=SUM(A1:A1)';
                setEditValue(f); startEdit(ri, ci);
              }}>Σ  SUM</button>
              <button onClick={() => {
                setOpenTbMenu(null);
                if (!activeCell) return;
                const { rowIdx: ri, colIdx: ci } = activeCell;
                if (!rows[ri] || !columns[ci]) return;
                const f = ri > 0 ? `=AVERAGE(${cellRef(0,ci)}:${cellRef(ri-1,ci)})` : '=AVERAGE(A1:A1)';
                setEditValue(f); startEdit(ri, ci);
              }}>ø  AVG</button>
              <button onClick={() => {
                setOpenTbMenu(null);
                if (!activeCell) return;
                const { rowIdx: ri, colIdx: ci } = activeCell;
                if (!rows[ri] || !columns[ci]) return;
                const a1 = ri >= 1 ? cellRef(ri-1,ci) : cellRef(0,ci);
                const a2 = ri >= 2 ? cellRef(ri-2,ci) : cellRef(0,ci);
                setEditValue(`=${a1}-${a2}`); startEdit(ri, ci);
              }}>Δ  DIFF</button>
              <div className="dp-drop-sep" />
              <div className="dp-drop-section">Fill</div>
              <button onClick={() => { fillDown(); setOpenTbMenu(null); }}>Fill ↓</button>
            </div>
          )}
          {openTbMenu === 'view' && (
            <div ref={tbMenuRef} className="dp-drop-panel" style={{ top: menuPos.top, left: menuPos.left, minWidth: 200 }}>
              <div className="dp-drop-section">Input</div>
              <button className="dp-drop-toggle" onClick={() => setDmsKeyboard(v => {
                  const next = !v;
                  try { localStorage.setItem('fb_dms_keyboard', String(next)); } catch {}
                  return next;
                })}>
                <span>DMS Keyboard</span>
                <span className="dp-drop-toggle-pill">
                  <span className={dmsKeyboard ? 'on' : 'off'}>ON</span>
                  <span className={dmsKeyboard ? 'off' : 'on'}>OFF</span>
                </span>
              </button>
            </div>
          )}

        </div>

        {/* ── Formula bar ── */}
        <div className="dp-formula-bar">
          <span className="cell-ref">{activeCellRef || '—'}</span>
          {/* Cell-type badge — tap to cycle, long-press/double-tap resets to column default */}
          {activeCellEffType && (
            <button
              title={activeCellHasOverride
                ? `Cell override: ${activeCellEffType.toUpperCase()} — double-tap to reset to column default`
                : `Column type: ${activeCellEffType.toUpperCase()} — tap to override this cell`}
              onPointerDown={e => {
                e.preventDefault();
                // Double-tap (two taps < 400ms) resets override
                const now = Date.now();
                const last = e.currentTarget._lastTap || 0;
                e.currentTarget._lastTap = now;
                if (now - last < 400) {
                  setCellsType(null); // remove override
                } else {
                  const cycle = { text: 'num', num: 'dms', dms: 'text' };
                  setCellsType(cycle[activeCellEffType] || 'num');
                }
              }}
              style={{
                padding: '2px 6px', borderRadius: 4, fontSize: 10, fontWeight: 700,
                fontFamily: 'Courier New, monospace', flexShrink: 0, cursor: 'pointer',
                border: `1.5px solid ${activeCellHasOverride ? typeColors[activeCellEffType] : typeColors[activeCellEffType] + '88'}`,
                color: typeColors[activeCellEffType],
                background: activeCellHasOverride ? typeColors[activeCellEffType] + '22' : 'transparent',
                outline: 'none',
              }}>
              {typeLabels[activeCellEffType]}{activeCellHasOverride ? ' ●' : ''}
            </button>
          )}
          <span className="fx-label">fx</span>
          <input
            ref={fbInputRef}
            value={formulaBarVal}
            onChange={e => {
              setFormulaBarVal(e.target.value);
              if (activeCell) {
                const row = rows[activeCell.rowIdx];
                const col = columns[activeCell.colIdx];
                if (row && col) setEditValue(e.target.value);
              }
            }}
            onFocus={() => { fbFocusedRef.current = true; }}
            onBlur={() => { fbFocusedRef.current = false; }}
            onKeyDown={handleFormulaBarCommit}
            placeholder="Select a cell to view or edit its value…  (F4 cycles $A$1 reference types)"
            spellCheck={false}
            style={{ background: isFormulaEditing ? 'rgba(45,106,79,0.05)' : 'transparent' }}
          />
        </div>
        {/* ── Ref chips — colour-coded cell references in current formula ── */}
        {formulaRefs.length > 0 && (
          <div className="dp-ref-chips">
            {formulaRefs.map(ref => (
              <span key={ref} style={{
                padding: '1px 6px', borderRadius: 4, fontSize: 9.5,
                fontFamily: 'Courier New, monospace', fontWeight: 700,
                background: refColorMap[ref] + '22',
                color: refColorMap[ref],
                border: `1px solid ${refColorMap[ref]}60`,
                lineHeight: '16px',
              }}>{ref}</span>
            ))}
            <span style={{ fontSize: 9, color: '#9CA3AF', marginLeft: 2 }}>
              tap a cell to insert ref
            </span>
          </div>
        )}

        {/* ── Table ── */}
        <div ref={tableRef} tabIndex={0} onKeyDown={handleGridKeyDown} onPaste={handleGridPaste}
          onPointerMove={e => {
            // Cancel long-press if finger has scrolled (moved > 8px before timer fires)
            if (e.pointerType === 'touch' && lpStartRef.current && lpTimerRef.current) {
              const dx = e.clientX - lpStartRef.current.x;
              const dy = e.clientY - lpStartRef.current.y;
              if (Math.hypot(dx, dy) > 8) {
                clearTimeout(lpTimerRef.current);
                lpTimerRef.current = null;
                lpStartRef.current = null;
              }
            }
            // Edge-scroll while drag-selecting
            if (isDraggingSelRef.current && tableRef.current) {
              const rect = tableRef.current.getBoundingClientRect();
              const EDGE = 44, SPEED = 10;
              if (e.clientY < rect.top    + EDGE) tableRef.current.scrollTop  -= SPEED;
              if (e.clientY > rect.bottom - EDGE) tableRef.current.scrollTop  += SPEED;
              if (e.clientX < rect.left   + EDGE) tableRef.current.scrollLeft -= SPEED;
              if (e.clientX > rect.right  - EDGE) tableRef.current.scrollLeft += SPEED;
            }
          }}
          onPointerUp={e => {
            if (e.pointerType !== 'touch') return;
            // Short tap (timer still running) = single-cell select, no drag
            if (lpTimerRef.current) {
              clearTimeout(lpTimerRef.current);
              lpTimerRef.current = null;
              if (lpStartRef.current) {
                activateCell(lpStartRef.current.ri, lpStartRef.current.ci);
                lpStartRef.current = null;
              }
            } else {
              lpStartRef.current = null;
            }
            isDraggingSelRef.current = false;
          }}
          style={{ flex: 1, overflowX: 'auto', overflowY: 'auto', background: '#FDFAF4', outline: 'none' }}>
          <table className="fb-table" style={{ tableLayout: 'fixed', width: 'max-content', minWidth: '100%' }}>
            <thead>
              <tr>
                {/* Row number gutter */}
                <th className="dp-row-num" style={{ position: 'sticky', top: 0, left: 0, zIndex: 3 }}>#</th>
                {columns.map((col, ci) => (
                  <th key={col.id}
                    draggable={page.type !== 'points'}
                    className={`dp-col-header${activeCell && activeCell.colIdx === ci ? ' active-col' : ''}${dragOverCol === ci && dragStartCol !== ci ? ' dp-drag-over-col' : ''}`}
                    style={{ width: colWidth(col), minWidth: colWidth(col), cursor: page.type === 'points' ? 'default' : undefined }}
                    onClick={() => page.type !== 'points' && openColModal(col)}
                    onDragStart={page.type !== 'points' ? (e => handleColDragStart(e, ci)) : undefined}
                    onDragOver={page.type !== 'points' ? (e => handleColDragOver(e, ci)) : undefined}
                    onDrop={page.type !== 'points' ? (e => handleColDrop(e, ci)) : undefined}
                    onDragEnd={page.type !== 'points' ? handleColDragEnd : undefined}
                    title={page.type === 'points' ? 'PNEZD column — locked' : 'Drag to reorder · Tap to edit settings'}>
                    <span style={{ fontSize: 7.5, color: 'rgba(156,163,175,0.6)', fontFamily: 'Courier New', marginRight: 3 }}>
                      {colLetter(ci)}
                    </span>
                    {col.label}
                    {page.type === 'points'
                      ? <span style={{ fontSize: 8, color: '#9CA3AF', marginLeft: 4, opacity: 0.6 }}>🔒</span>
                      : <span className={`dp-col-type-badge dp-col-type-${col.colType || 'num'}`}>{typeLabels[col.colType || 'num']}</span>
                    }
                  </th>
                ))}
                <th style={{ width: 32, minWidth: 32 }}></th>
              </tr>
            </thead>
            <tbody>
              {rows.length === 0 && (
                <tr>
                  <td colSpan={columns.length + 2}
                    style={{ textAlign: 'center', padding: '18px 10px', color: '#9CA3AF', fontStyle: 'italic', fontSize: 12, background: 'transparent', height: 'auto' }}>
                               Tap + Row in the toolbar to begin
                  </td>
                </tr>
              )}
              {rows.map((row, ri) => (
                <tr key={row.id} data-row-idx={ri}>
                  {/* Row number — draggable to reorder */}
                  <td className={`dp-row-num${activeCell && activeCell.rowIdx === ri ? ' active-row' : ''}${dragOverRow === ri && dragStartRow !== ri ? ' dp-drag-over-row' : ''}`}
                    draggable={true}
                    onDragStart={e => handleRowDragStart(e, ri)}
                    onDragOver={e => handleRowDragOver(e, ri)}
                    onDrop={e => handleRowDrop(e, ri)}
                    onDragEnd={handleRowDragEnd}
                    onDragLeave={() => { if (dragOverRow === ri) setDragOverRow(null); }}
                    title="Drag to reorder row">
                    {ri + 1}
                  </td>
                  {columns.map((col, ci) => {
                    const isActive = activeCell && activeCell.rowIdx === ri && activeCell.colIdx === ci;
                    const isEditing = editingCell && editingCell.rowIdx === ri && editingCell.colIdx === ci;
                    const inSel = isInRange(ri, ci);
                    const { text, isFormula, isDMS, isError } = displayValue(row, col);
                    const myCellRef = cellRef(ri, ci);
                    const refColor = refColorMap[myCellRef] || null;
                    // Fill preview: cells in the active column between active row and drag target
                    const isFillPreview = fillDragRow !== null &&
                      activeCell && ci === activeCell.colIdx &&
                      ri > activeCell.rowIdx && ri <= fillDragRow;
                    return (
                      <td key={col.id}
                        className={`${isActive ? 'dp-cell-active' : isFillPreview ? 'dp-cell-fill-preview' : inSel ? 'dp-cell-selected' : ''}`}
                        style={{
                          width: colWidth(col), minWidth: colWidth(col),
                          // Always relative when active (needed to anchor the fill handle)
                          ...(isActive ? { position: 'relative' } : {}),
                          // Colour-coded border when this cell is referenced by the formula being edited
                          ...(refColor ? { outline: `2px solid ${refColor}`, outlineOffset: '-1px', zIndex: 1, position: 'relative' } : {}),
                        }}
                        onPointerDown={e => {
                          if (e.button !== 0) return;

                          // ── Point-to-select: insert cell ref into formula being edited ──
                          if (isFormulaEditing) {
                            e.preventDefault(); // keeps focus on the edit input
                            const ref = myCellRef;
                            if (editingCell !== null) {
                              const newVal = editValue + ref;
                              setEditValue(newVal);
                              setFormulaBarVal(newVal);
                              requestAnimationFrame(() => inputRef.current?.focus());
                            } else {
                              // Editing from formula bar
                              const newVal = formulaBarVal + ref;
                              setFormulaBarVal(newVal);
                              setEditValue(newVal);
                              requestAnimationFrame(() => fbInputRef.current?.focus());
                            }
                            return;
                          }

                          if (e.pointerType === 'touch') {
                            // Touch: don't select immediately — prevent scroll-while-selecting
                            // Long press (400ms) activates drag-select with haptic feedback
                            if (lpTimerRef.current) clearTimeout(lpTimerRef.current);
                            lpStartRef.current = { x: e.clientX, y: e.clientY, ri, ci };
                            lpTimerRef.current = setTimeout(() => {
                              lpTimerRef.current = null;
                              isDraggingSelRef.current = true;
                              activateCell(lpStartRef.current.ri, lpStartRef.current.ci);
                              if (navigator.vibrate) navigator.vibrate(50);
                            }, 400);
                            // Don't preventDefault — allows native scroll to work
                          } else {
                            // Mouse / stylus: existing behavior (immediate selection)
                            isDraggingSelRef.current = true;
                            if (e.shiftKey && activeCell) {
                              if (!selectionAnchor) setSelectionAnchor(activeCell);
                              setActiveCell({ rowIdx: ri, colIdx: ci });
                              const row2 = rows[ri], col2 = columns[ci];
                              if (row2 && col2) setFormulaBarVal((row2.cells || {})[col2.id] || '');
                              if (tableRef.current) tableRef.current.focus();
                            } else {
                              activateCell(ri, ci);
                            }
                          }
                        }}
                        onPointerEnter={e => {
                          if (!isDraggingSelRef.current || !(e.buttons & 1)) return;
                          setActiveCell({ rowIdx: ri, colIdx: ci });
                        }}
                        onDoubleClick={() => startEdit(ri, ci)}>
                        {isEditing ? (
                          <input
                            ref={inputRef}
                            type="text"
                            inputMode={isDMSCell ? 'none' : 'text'}
                            value={editValue}
                            onChange={e => { setEditValue(e.target.value); setFormulaBarVal(e.target.value); }}
                            onBlur={() => commitEdit(ri, ci, editValue)}
                            onKeyDown={e => handleCellKeyDown(e, ri, ci)}
                            style={{ display: 'block', width: '100%', height: 32, padding: '0 5px',
                              background: 'rgba(78,120,100,0.06)', border: 'none', outline: 'none',
                              fontFamily: "'Caveat', cursive", fontSize: 17, textAlign: 'center', color: '#1A1A1A' }}
                          />
                        ) : (
                          <span
                            className={isError ? 'dp-cell-error' : isDMS ? 'dp-cell-dms' : isFormula ? 'dp-cell-formula' : ''}
                            style={{ display: 'block', height: 32, lineHeight: '32px', padding: '0 5px',
                              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                              fontFamily: "'Caveat', cursive", fontSize: 17,
                              cursor: 'default', userSelect: 'none' }}
                            onDoubleClick={() => startEdit(ri, ci)}>
                            {text}
                          </span>
                        )}
                        {/* ── Fill handle — only on active non-editing cell ── */}
                        {isActive && !isEditing && (
                          <div
                            className="dp-fill-handle"
                            title="Drag down to fill · formulas shift relative refs automatically"
                            onPointerDown={e => {
                              e.stopPropagation();
                              e.preventDefault();
                              fillDragRef.current = { active: true, startRow: ri, startCol: ci };
                              setFillDragRow(ri);
                              e.currentTarget.setPointerCapture(e.pointerId);
                            }}
                            onPointerMove={e => {
                              if (!fillDragRef.current.active) return;
                              // elementFromPoint works regardless of pointer capture
                              const el = document.elementFromPoint(e.clientX, e.clientY);
                              const tr = el?.closest('tr[data-row-idx]');
                              if (tr) {
                                const idx = parseInt(tr.getAttribute('data-row-idx'), 10);
                                if (!isNaN(idx)) {
                                  setFillDragRow(Math.max(idx, fillDragRef.current.startRow));
                                }
                              }
                            }}
                            onPointerUp={e => {
                              if (!fillDragRef.current.active) return;
                              e.currentTarget.releasePointerCapture(e.pointerId);
                              const { startRow, startCol } = fillDragRef.current;
                              fillDragRef.current = { active: false, startRow: -1, startCol: -1 };
                              const endRow = fillDragRow;
                              setFillDragRow(null);
                              if (endRow !== null && endRow > startRow) {
                                performFillDown(startRow, startCol, endRow);
                              }
                            }}
                          />
                        )}
                      </td>
                    );
                  })}
                  <td className="td-action">
                    <button onClick={() => deleteRow(row.id)}
                      className="w-8 h-8 flex items-center justify-center text-gray-300 active:text-red-400 mx-auto">
                      <Ico.Trash />
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* ── Status bar ── */}
        <div className="px-4 py-2 border-t border-fb-border bg-fb-cream2/50 flex items-center gap-4 flex-shrink-0" style={{ fontSize: 11 }}>
          <span className="text-fb-muted font-data">{rows.length} rows · {columns.length} cols</span>
          {activeCell && (() => {
            const b = getSelectionBounds();
            const isMulti = b && (b.maxR > b.minR || b.maxC > b.minC);
            if (isMulti) {
              const numRows = b.maxR - b.minR + 1, numCols = b.maxC - b.minC + 1;
              return (
                <span className="text-fb-mid font-data font-semibold">
                  {cellRef(b.minR, b.minC)}:{cellRef(b.maxR, b.maxC)}
                  <span style={{ color: '#9CA3AF', marginLeft: 4 }}>({numRows}×{numCols})</span>
                </span>
              );
            }
            return (
              <span className="text-fb-mid font-data font-semibold">
                {activeCellRef}
                {columns[activeCell.colIdx] && (
                  <span style={{ color: typeColors[columns[activeCell.colIdx].colType || 'num'], marginLeft: 4 }}>
                    [{typeLabels[columns[activeCell.colIdx].colType || 'num']}]
                  </span>
                )}
              </span>
            );
          })()}
          <span className="ml-auto text-fb-muted" style={{ fontSize: 10 }}>Shift+click/arrow to select range · Ctrl+C/V · Del clears · drag # to reorder</span>
        </div>

        {/* ── DMS Numpad — shown when editing a DMS column cell ── */}
        {isDMSCell && (
          <DmsNumpad
            value={editValue}
            onChange={newVal => { setEditValue(newVal); setFormulaBarVal(newVal); }}
            onCommit={() => {
              const { rowIdx: ri, colIdx: ci } = editingCell;
              commitEdit(ri, ci, editValue);
            }}
            onDismiss={() => { setEditingCell(null); setEditValue(''); }}
          />
        )}

        {/* ── Column settings modal ── */}
        {colModal && (
          <div className="modal-backdrop" onClick={() => setColModal(null)}>
            <div ref={colModalRef} className="modal-sheet" onClick={e => e.stopPropagation()}>
              <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4" />
              <h2 className="text-lg font-bold text-fb-dark mb-4">Column Settings</h2>
              <div className="space-y-4">
                <div>
                  <p className="text-[9px] font-bold text-fb-mid uppercase tracking-widest mb-1">Label</p>
                  <input type="text" value={colModalForm.label}
                    onChange={e => setColModalForm(f => ({ ...f, label: e.target.value }))}
                    autoFocus maxLength={20}
                    className="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-fb-mid outline-none text-fb-text text-sm font-data"
                    onFocus={e => e.target.select()}
                    onKeyDown={e => e.key === 'Enter' && saveColModal()}
                  />
                </div>
                <div>
                  <p className="text-[9px] font-bold text-fb-mid uppercase tracking-widest mb-2">Column Type</p>
                  <div className="flex gap-2">
                    {['text', 'num', 'dms'].map(t => (
                      <button key={t}
                        onClick={() => setColModalForm(f => ({ ...f, colType: t }))}
                        className="flex-1 py-2 rounded-xl border-2 text-sm font-bold font-data"
                        style={{
                          borderColor: colModalForm.colType === t ? typeColors[t] : '#DDD6C8',
                          color: colModalForm.colType === t ? typeColors[t] : '#9CA3AF',
                          background: colModalForm.colType === t ? typeColors[t] + '18' : 'white',
                        }}>
                        {typeLabels[t]}
                      </button>
                    ))}
                  </div>
                  <p className="text-xs text-fb-muted mt-2">
                    {colModalForm.colType === 'dms' && 'Enter angles as “45 34 23” (D M S) or “45°34\'23"”. Displays as D°MM\'SS.s".'}
                    {colModalForm.colType === 'num' && 'Decimal numbers. Formulas like =SUM(A1:A5) work in this column.'}
                    {colModalForm.colType === 'text' && 'Free text — station IDs, descriptions, notes.'}
                  </p>
                </div>
                <div>
                  <p className="text-[9px] font-bold text-fb-mid uppercase tracking-widest mb-1">Width (px)</p>
                  <input type="number" value={colModalForm.width}
                    onChange={e => setColModalForm(f => ({ ...f, width: Math.max(50, Math.min(300, parseInt(e.target.value) || 80)) }))}
                    min={50} max={300}
                    className="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-fb-mid outline-none text-fb-text text-sm font-data"
                  />
                </div>
              </div>
              <div className="flex gap-3 mt-5">
                <button onClick={() => deleteCol(colModal.col.id)}
                  className="py-3 px-4 rounded-xl border-2 border-red-200 text-red-400 font-semibold text-sm active:bg-red-50">
                  Delete
                </button>
                <button onClick={() => setColModal(null)} className="flex-1 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm">Cancel</button>
                <button onClick={saveColModal} className="flex-1 py-3 rounded-xl text-white font-semibold text-sm" style={{ background: '#2D6A4F' }}>Save</button>
              </div>
            </div>
          </div>
        )}

        {/* ── CSV Import modal ── */}
        {csvImportModal && (
          <div className="modal-backdrop" onClick={() => setCsvImportModal(null)}>
            <div className="modal-sheet" onClick={e => e.stopPropagation()} style={{ maxWidth: 420 }}>
              <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4" />
              <h2 className="text-lg font-bold text-fb-dark mb-1">Import CSV</h2>
              <p className="text-fb-muted text-xs mb-4">
                {csvImportModal.parsed.length} row{csvImportModal.parsed.length !== 1 ? 's' : ''} detected,&nbsp;
                {Math.max(...csvImportModal.parsed.map(r => r.length))} column{Math.max(...csvImportModal.parsed.map(r => r.length)) !== 1 ? 's' : ''}.
              </p>
              {/* Header preview */}
              <div style={{ background: '#F5F1E8', borderRadius: 8, padding: '8px 10px', marginBottom: 16,
                            fontSize: 12, fontFamily: 'Courier New, monospace', color: '#3C5445',
                            overflowX: 'auto', whiteSpace: 'nowrap' }}>
                <strong>Row 1:</strong> {csvImportModal.parsed[0].map(c => `"${c}"`).join(', ')}
              </div>
              {/* Use first row as headers toggle */}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                            padding: '10px 12px', borderRadius: 10, background: '#F5F1E8', marginBottom: 20 }}>
                <span style={{ fontSize: 14, color: '#3C5445', fontWeight: 500 }}>Use first row as column headers</span>
                <button
                  onClick={() => setCsvImportModal(m => ({ ...m, useHeader: !m.useHeader }))}
                  style={{ padding: '4px 14px', borderRadius: 20, border: 'none', cursor: 'pointer',
                           fontWeight: 700, fontSize: 12,
                           background: csvImportModal.useHeader ? '#3C5445' : '#E5E1D8',
                           color:      csvImportModal.useHeader ? '#FDFAF4'  : '#6B6560' }}>
                  {csvImportModal.useHeader ? 'ON' : 'OFF'}
                </button>
              </div>
              <p className="text-fb-muted text-xs mb-4" style={{ marginTop: -12 }}>
                {csvImportModal.useHeader
                  ? `Will import ${csvImportModal.parsed.length - 1} data row${csvImportModal.parsed.length - 1 !== 1 ? 's' : ''} using row 1 as headers.`
                  : `Will import all ${csvImportModal.parsed.length} rows with auto-labelled columns (A, B, C…).`}
              </p>
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={() => setCsvImportModal(null)}
                  style={{ flex: 1, padding: '12px 0', borderRadius: 12, border: '2px solid #E5E1D8',
                           background: 'transparent', color: '#6B6560', fontWeight: 600, fontSize: 14, cursor: 'pointer' }}>
                  Cancel
                </button>
                <button onClick={() => confirmDataCSVImport(csvImportModal.parsed, csvImportModal.useHeader)}
                  style={{ flex: 2, padding: '12px 0', borderRadius: 12, border: 'none',
                           background: '#3C5445', color: '#FDFAF4', fontWeight: 600, fontSize: 14, cursor: 'pointer' }}>
                  Import
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── Template modal ── */}
        {templateModal && (
          <div className="modal-backdrop" onClick={() => setTemplateModal(false)}>
            <div ref={templateModalRef} className="modal-sheet" onClick={e => e.stopPropagation()}
              style={{ maxHeight: '85vh', overflowY: 'auto' }}>
              <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4" />
              <h2 className="text-lg font-bold text-fb-dark mb-1">Templates</h2>
              <p className="text-fb-muted text-xs mb-4">Applying a template replaces the current columns and clears all rows.</p>

              {/* Save current as template */}
              {columns.length > 0 && (
                <button
                  onClick={() => {
                    const name = window.prompt('Template name:');
                    if (!name || !name.trim()) return;
                    const tpl = {
                      name: name.trim(),
                      desc: columns.map(c => c.label || c.id).join(' · '),
                      cols: columns.map((c, i) => ({ ...c, id: 'ct' + Date.now() + '_' + i })),
                      custom: true,
                      savedAt: new Date().toISOString(),
                    };
                    DB.saveCustomTemplate(tpl);
                    setCustomTemplates(DB.getCustomTemplates());
                  }}
                  className="w-full flex items-center justify-center gap-2 mb-4 py-2.5 rounded-xl border-2 border-dashed border-fb-mid text-fb-mid font-semibold text-sm active:bg-fb-mid/10">
                  <span style={{ fontSize: 16 }}>＋</span> Save current columns as template
                </button>
              )}

              {/* My templates */}
              {customTemplates.length > 0 && (
                <>
                  <p className="text-fb-muted text-xs font-semibold uppercase tracking-wide mb-2 px-1">My Templates</p>
                  <div className="space-y-2 mb-4">
                    {customTemplates.map(tpl => (
                      <div key={tpl.name} className="flex items-stretch gap-2">
                        <button
                          onClick={() => {
                            if (rows.some(r => Object.values(r.cells || {}).some(v => v.trim())))
                              if (!window.confirm('This will clear all existing data. Continue?')) return;
                            applyTemplate(tpl);
                          }}
                          className="flex-1 flex items-start gap-3 p-3 rounded-xl border-2 border-fb-mid/30 active:border-fb-mid text-left">
                          <div className="flex-1 min-w-0">
                            <p className="font-semibold text-fb-text text-sm">{tpl.name}</p>
                            <p className="text-fb-muted text-xs mt-0.5 font-data">{tpl.desc}</p>
                          </div>
                          <Ico.ChevR />
                        </button>
                        <button
                          onClick={() => {
                            if (!window.confirm(`Delete template "${tpl.name}"?`)) return;
                            DB.deleteCustomTemplate(tpl.name);
                            setCustomTemplates(DB.getCustomTemplates());
                          }}
                          className="w-10 flex items-center justify-center rounded-xl border-2 border-red-100 text-red-300 active:text-red-500 active:border-red-300 flex-shrink-0">
                          <Ico.Trash />
                        </button>
                      </div>
                    ))}
                  </div>
                </>
              )}

              {/* Built-in templates */}
              <p className="text-fb-muted text-xs font-semibold uppercase tracking-wide mb-2 px-1">Built-in</p>
              <div className="space-y-2">
                {TEMPLATES.map(tpl => (
                  <button key={tpl.name}
                    onClick={() => {
                      if (rows.some(r => Object.values(r.cells || {}).some(v => v.trim())))
                        if (!window.confirm('This will clear all existing data. Continue?')) return;
                      applyTemplate(tpl);
                    }}
                    className="w-full flex items-start gap-3 p-3 rounded-xl border-2 border-gray-100 active:border-fb-mid text-left">
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-fb-text text-sm">{tpl.name}</p>
                      <p className="text-fb-muted text-xs mt-0.5 font-data">{tpl.desc}</p>
                    </div>
                    <Ico.ChevR />
                  </button>
                ))}
              </div>

              <button onClick={() => setTemplateModal(false)}
                className="w-full mt-4 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm">
                Cancel
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }


  // ─────────────────────────────────────────────────────────────────────────────
  // SKETCH PAGE — loaded from sketch.js (see that file for the full engine)
  // SketchPage is available on window.SketchPage after sketch.js executes.
  // ─────────────────────────────────────────────────────────────────────────────

  // ─────────────────────────────────────────────────────────────────────────────
  // TITLE PAGE
  // ─────────────────────────────────────────────────────────────────────────────

  function TitlePage({ page, projectId, onReload }) {
    const [form, setForm] = useState({
      title:       page.title       || '',
      location:    page.location    || '',
      crew:        page.crew        || '',
      equipment:   page.equipment   || '',
      datum:       page.datum       || 'NAD83(CSRS), UTM Zone 20N / CGVD2013',
      ppm:         page.ppm         || '',
      temperature: page.temperature || '',
      pressure:    page.pressure    || '',
      prismConst:  page.prismConst  || '',
      summary:     page.summary     || '',
      codeList:    page.codeList    || '',
      fileNames:   page.fileNames   || '',
    });
    const [dirty, setDirty] = useState(false);
    const timerRef = useRef(null);

    // Auto-grow all textareas on page load / page change
    useEffect(() => {
      document.querySelectorAll('.tp-grow').forEach(el => {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
      });
    }, [page.id]);

    useEffect(() => {
      setForm({
        title:       page.title       || '',
        location:    page.location    || '',
        crew:        page.crew        || '',
        equipment:   page.equipment   || '',
        datum:       page.datum       || 'NAD83(CSRS), UTM Zone 20N / CGVD2013',
        ppm:         page.ppm         || '',
        temperature: page.temperature || '',
        pressure:    page.pressure    || '',
        prismConst:  page.prismConst  || '',
        summary:     page.summary     || '',
        codeList:    page.codeList    || '',
        fileNames:   page.fileNames   || '',
      });
    }, [page.id]);

    function handleChange(key, val) {
      const updated = { ...form, [key]: val };
      setForm(updated);
      setDirty(true);
      clearTimeout(timerRef.current);
      timerRef.current = setTimeout(() => {
        DB.updatePage(projectId, page.id, updated);
        onReload();
        setDirty(false);
      }, 800);
    }

    // Grows a textarea to fit its content, then keeps the cursor visible.
    function grow(el) {
      if (!el) return;
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
      // After the layout settles, scroll the active element back into view so
      // the cursor doesn't disappear below the bottom of the page/keyboard.
      if (document.activeElement === el) {
        requestAnimationFrame(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
      }
    }

    // When a field is focused, wait for the mobile keyboard to finish sliding
    // open (~350 ms) then scroll the field to the center of whatever visible
    // viewport remains above the keyboard.
    function focusScroll(e) {
      const el = e.target;
      setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 350);
    }

    // visualViewport fires when the keyboard opens / closes. Re-scroll the
    // active element so it stays visible whenever the available height changes.
    useEffect(() => {
      if (!window.visualViewport) return;
      function onVVResize() {
        const el = document.activeElement;
        if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) return;
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      window.visualViewport.addEventListener('resize', onVVResize);
      return () => window.visualViewport.removeEventListener('resize', onVVResize);
    }, []);

    const taClass = 'tp-grow w-full font-handwritten text-base text-fb-text bg-transparent outline-none resize-none placeholder-gray-300 leading-relaxed overflow-hidden';
    const inClass = 'w-full font-handwritten text-base text-fb-text bg-transparent outline-none placeholder-gray-300';
    const lblClass = 'text-[9px] font-bold text-fb-mid uppercase tracking-widest mb-0.5';
    const secClass = 'py-2.5 border-b border-fb-border';
    const instrInputClass = 'flex-1 min-w-0 font-handwritten text-base text-fb-text bg-transparent outline-none placeholder-gray-300';
    const instrLblClass   = 'text-[9px] font-bold text-fb-mid uppercase tracking-widest whitespace-nowrap flex-shrink-0';
    const instrUnitClass  = 'text-[10px] text-fb-muted flex-shrink-0';

    return (
      <div style={{ background: '#FDFAF4' }}>
        <div className="page-header-strip px-4 py-2.5 flex items-center justify-between gap-3">
          <div className="flex-1 min-w-0">
            <p className={lblClass}>Title Page · P.{page.pageNumber}</p>
            <input
              type="text"
              value={form.title}
              onChange={e => handleChange('title', e.target.value)}
              placeholder="Page title..."
              maxLength={60}
              className="w-full font-handwritten text-base text-fb-dark bg-transparent outline-none placeholder-gray-300"
              style={{ border: 'none', borderBottom: '1px solid rgba(180,165,140,0.5)', padding: '1px 0' }}
            />
          </div>
          <div className="flex-shrink-0 text-right">
            <p className="text-xs font-data text-fb-muted">{page.date}</p>
            {dirty && <span className="text-[10px] text-fb-muted italic">saving...</span>}
          </div>
        </div>
        {/* paddingBottom ensures bottom fields can scroll up above the keyboard */}
        <div className="px-5" style={{ paddingBottom: '50vh' }}>
          {/* Project Title / Location */}
          <div className={secClass}>
            <p className={lblClass}>Project Title / Location</p>
            <textarea
              ref={grow} onInput={e => grow(e.target)} onFocus={focusScroll}
              value={form.location} onChange={e => handleChange('location', e.target.value)}
              placeholder="Property address, legal description, project name..."
              className={taClass} rows={1} />
          </div>
          {/* Crew */}
          <div className={secClass}>
            <p className={lblClass}>Crew &amp; Responsibilities</p>
            <textarea
              ref={grow} onInput={e => grow(e.target)} onFocus={focusScroll}
              value={form.crew} onChange={e => handleChange('crew', e.target.value)}
              placeholder="Party chief: —   Rod person: —   Note keeper: —"
              className={taClass} rows={1} />
          </div>
          {/* Equipment */}
          <div className={secClass}>
            <p className={lblClass}>Equipment (Make, Model, S/N)</p>
            <textarea
              ref={grow} onInput={e => grow(e.target)} onFocus={focusScroll}
              value={form.equipment} onChange={e => handleChange('equipment', e.target.value)}
              placeholder="Total station: —   Level: —   Prism: —"
              className={taClass} rows={1} />
          </div>
          {/* Datum */}
          <div className={secClass}>
            <p className={lblClass}>Datum &amp; Projection</p>
            <input type="text" value={form.datum} onChange={e => handleChange('datum', e.target.value)}
              onFocus={focusScroll}
              placeholder="NAD83(CSRS), UTM Zone 20N / CGVD2013"
              className={inClass} />
          </div>
          {/* Instrument Settings — 2-column grid */}
          <div className={secClass}>
            <p className={lblClass}>Instrument Settings</p>
            <div className="grid grid-cols-2 gap-x-4 gap-y-1 mt-0.5">
              <div className="flex items-baseline gap-1.5 min-w-0">
                <span className={instrLblClass}>PPM</span>
                <input type="text" value={form.ppm} onChange={e => handleChange('ppm', e.target.value)}
                  onFocus={focusScroll} placeholder="—" className={instrInputClass} />
              </div>
              <div className="flex items-baseline gap-1.5 min-w-0">
                <span className={instrLblClass}>Temp</span>
                <input type="text" value={form.temperature} onChange={e => handleChange('temperature', e.target.value)}
                  onFocus={focusScroll} placeholder="—" className={instrInputClass} />
                <span className={instrUnitClass}>°C</span>
              </div>
              <div className="flex items-baseline gap-1.5 min-w-0">
                <span className={instrLblClass}>Pressure</span>
                <input type="text" value={form.pressure} onChange={e => handleChange('pressure', e.target.value)}
                  onFocus={focusScroll} placeholder="—" className={instrInputClass} />
                <span className={instrUnitClass}>hPa</span>
              </div>
              <div className="flex items-baseline gap-1.5 min-w-0">
                <span className={instrLblClass}>Prism K</span>
                <input type="text" value={form.prismConst} onChange={e => handleChange('prismConst', e.target.value)}
                  onFocus={focusScroll} placeholder="—" className={instrInputClass} />
                <span className={instrUnitClass}>mm</span>
              </div>
            </div>
          </div>
          {/* Summary */}
          <div className={secClass}>
            <p className={lblClass}>Summary of Work</p>
            <textarea
              ref={grow} onInput={e => grow(e.target)} onFocus={focusScroll}
              value={form.summary} onChange={e => handleChange('summary', e.target.value)}
              placeholder="Overview of survey objectives for this session..."
              className={taClass} rows={1} />
          </div>
          {/* Code List — carries over to new title pages */}
          <div className={secClass}>
            <p className={lblClass}>Code List</p>
            <textarea
              ref={grow} onInput={e => grow(e.target)} onFocus={focusScroll}
              value={form.codeList} onChange={e => handleChange('codeList', e.target.value)}
              placeholder="TL - Tree Line&#10;FT - Fallen Tree&#10;SPK - Spike&#10;SM FD - Survey Marker Found..."
              className={taClass} rows={1} />
          </div>
          {/* Digital File Names — day-specific, does not carry over */}
          <div className={secClass}>
            <p className={lblClass}>Digital File Names</p>
            <textarea
              ref={grow} onInput={e => grow(e.target)} onFocus={focusScroll}
              value={form.fileNames} onChange={e => handleChange('fileNames', e.target.value)}
              placeholder="e.g. 2026-04-06_Site9_TS.job&#10;2026-04-06_Site9_GNSS.csv"
              className={taClass} rows={1} />
          </div>
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // APP ROOT
  // ─────────────────────────────────────────────────────────────────────────────

  function App() {
    const hash  = useRouter();
    const route = parseRoute(hash);
    const toast = useToast();
    const [installPrompt, setInstallPrompt] = useState(null);
    const [pendingFileImport, setPendingFileImport] = useState(null);

    useEffect(() => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => toast.error('Service worker failed to register'));
      }
      // Sweep any IDB photos no longer referenced by any project. Covers
      // leftovers from project/page deletes and failed migrations. Safe to
      // run here because it only deletes entries not referenced anywhere.
      (async () => {
        try {
          const n = await photoDB.pruneOrphans(DB.getProjects());
          if (n > 0) console.log(`[photoDB] pruned ${n} orphan${n === 1 ? '' : 's'}`);
        } catch (err) { console.error('[photoDB] prune failed:', err); }
      })();
      const handler = e => { e.preventDefault(); setInstallPrompt(e); };
      window.addEventListener('beforeinstallprompt', handler);

      // PWA File Handling API — handles .fieldbook files opened from the OS
      if ('launchQueue' in window) {
        window.launchQueue.setConsumer(async (launchParams) => {
          if (!launchParams.files || launchParams.files.length === 0) return;
          const fileHandle = launchParams.files[0];
          try {
            const file = await fileHandle.getFile();
            const text = await file.text();
            const data = JSON.parse(text);
            if (data.type !== 'fieldbook_project_export') {
              toast.error('Not a valid .fieldbook file');
              return;
            }
            setPendingFileImport(data);
          } catch {
            toast.error('Could not open .fieldbook file');
          }
        });
      }

      return () => window.removeEventListener('beforeinstallprompt', handler);
    }, []);

    function handleFileImported(newProject) {
      setPendingFileImport(null);
      toast.success(`"${newProject.name}" imported`);
      navigate(`#/project/${newProject.id}`);
    }

    const RINGS = 15;
    return (
      <div className="notebook-frame">
        {/* Wire-O spiral binding — desktop only (hidden on mobile via CSS) */}
        <div className="notebook-binding-bar" aria-hidden="true">
          {Array.from({ length: RINGS }).map((_, i) => <div key={i} className="spiral-ring" />)}
        </div>
        {/* App content */}
        <div className="notebook-inner">
          {route.view === 'home'    && <HomePage installPrompt={installPrompt} onInstalled={() => setInstallPrompt(null)} />}
          {route.view === 'project' && <ProjectView projectId={route.projectId} />}
          {route.view === 'page'    && <PageView    projectId={route.projectId} pageId={route.pageId} />}
        </div>
        {/* App-level: PWA file-open import modal */}
        {pendingFileImport && (
          <ImportProjectModal
            fileData={pendingFileImport}
            onClose={() => setPendingFileImport(null)}
            onImported={handleFileImported}
          />
        )}
      </div>
    );
  }

  function AppWithProviders() {
    return (
      <ToastProvider>
        <App />
      </ToastProvider>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // PNEZD column IDs — shared between DataPage (points mode) and sketch.js canvas.
  // These are fixed so sketch.js can reference them without hard-coding strings.
  const PNEZD_COLS = {
    ptNum: 'col_ptnum',
    north: 'col_north',
    east:  'col_east',
    elev:  'col_elev',
    desc:  'col_desc',
  };

  // Permanently removes a point row from all 'points' data pages AND removes
  // any matching point shapes from all sketch pages in the same project.
  // Called when: (1) a row is deleted from a Points Data Page, or
  //              (2) user chooses "Delete Permanently" from the sketch delete prompt.
  function deletePointPermanently(projectId, pointId) {
    const project = DB.getProject(projectId);
    if (!project) return;
    project.pages.forEach(page => {
      if (page.type === 'points' && page.rows) {
        const next = page.rows.filter(r => r.id !== pointId);
        if (next.length !== page.rows.length)
          DB.updatePage(projectId, page.id, { rows: next });
      }
      if (page.type === 'sketch' && page.shapes) {
        const next = page.shapes.filter(s => !(s.type === 'point' && s.pointId === pointId));
        if (next.length !== page.shapes.length)
          DB.updatePage(projectId, page.id, { shapes: next });
      }
    });
  }

  // Returns the next available Pt # for manual canvas placement.
  // Starts from lastNum+1 (or 1), then walks forward past any existing numbers.
  function getNextManualPtNum(projectId, lastNum) {
    const project = DB.getProject(projectId);
    const usedNums = new Set();
    if (project) {
      for (const pg of project.pages) {
        if (pg.type === 'points' && pg.rows) {
          pg.rows.forEach(r => {
            const n = parseInt(r.cells?.col_ptnum);
            if (!isNaN(n)) usedNums.add(n);
          });
        }
      }
    }
    let candidate = (lastNum != null && !isNaN(parseInt(lastNum)))
      ? parseInt(lastNum) + 1
      : 1;
    while (usedNums.has(candidate)) candidate++;
    return candidate;
  }

  // Returns true if ptNum (as a string) is already used by a row other than excludeRowId.
  function isPtNumTaken(projectId, ptNum, excludeRowId) {
    const project = DB.getProject(projectId);
    if (!project) return false;
    const target = String(ptNum).trim();
    for (const pg of project.pages) {
      if (pg.type === 'points' && pg.rows) {
        for (const r of pg.rows) {
          if (r.id !== excludeRowId && String(r.cells?.col_ptnum ?? '').trim() === target)
            return true;
        }
      }
    }
    return false;
  }

  // Appends a new row object to the first 'points' page in the project.
  // The caller is responsible for building the row (id, cells).
  function addPointRow(projectId, row) {
    const project = DB.getProject(projectId);
    if (!project) return null;
    const pg = project.pages.find(p => p.type === 'points');
    if (!pg) return null;
    const updatedRows = [...(pg.rows || []), row];
    DB.updatePage(projectId, pg.id, { rows: updatedRows });
    return row.id;
  }

  // Updates specific cells on an existing point row (by rowId) across all points pages.
  // cells is an object like { col_ptnum: '5', col_north: '123.45' }
  function updatePointRow(projectId, rowId, cells) {
    const project = DB.getProject(projectId);
    if (!project) return;
    for (const pg of project.pages) {
      if (pg.type === 'points' && pg.rows) {
        const idx = pg.rows.findIndex(r => r.id === rowId);
        if (idx >= 0) {
          const newRows = pg.rows.map((r, i) =>
            i === idx ? { ...r, cells: { ...r.cells, ...cells } } : r
          );
          DB.updatePage(projectId, pg.id, { rows: newRows });
          return;
        }
      }
    }
  }

  // Expose shared globals for sketch.js to consume via window._fb
  window._fb = { DB, PageHeaderStrip, HCell, compressImage, PNEZD_COLS,
                 deletePointPermanently, getNextManualPtNum, addPointRow, updatePointRow, isPtNumTaken };

  // Mount the app only after sketch.js has loaded and resolved _sketchPromise
  _sketchPromise.then(() => {
    ReactDOM.createRoot(document.getElementById('root')).render(<AppWithProviders />);
  });
</script>
