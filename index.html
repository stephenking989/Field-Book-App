  // ─────────────────────────────────────────────────────────────────────────────
  // PROJECT PDF EXPORT — module-level helpers
  // ─────────────────────────────────────────────────────────────────────────────

  // Convert a hex colour string to [r, g, b] array for jsPDF
  function _hexRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  // Returns jsPDF font names for handwritten and monospace styles.
  // Custom TTF loading was removed — jsPDF's built-in font registration silently
  // stores broken entries for some TTFs and then crashes on pdf.text() with
  // "Cannot read properties of undefined (reading 'Unicode')". helvetica/courier
  // are jsPDF built-ins and always work.
  function _initPDFFonts() {
    return { hand: 'helvetica', handSt: 'bold', mono: 'courier', monoSt: 'normal' };
  }

  // Build an SVG string from stored sketch page data.
  // Uses window._fbSketchUtils (exposed by sketch.js) for arc/path geometry,
  // dimension formatting, scale bar, and north arrow.
  function buildSketchSVG(shapes, layers, viewBox, scaleDenom, units, showDims = true, transparent = false) {
    const utils = window._fbSketchUtils;
    if (!utils) return null;
    const { arcPath: _arc, pathToSVGD: _pathD, computeArcFromPI: _cArc,
            fmtPxAsReal: _fmt, normAng: _norm, toDMS: _toDMS,
            niceScaleBarValue: _nice, realToPx: _rtp, formatReal: _fmtR } = utils;

    const vb = viewBox || { x: 0, y: 0, w: 800, h: 600 };
    const sd = scaleDenom || 1;
    const un = units || 'm';
    const outW = 1200;
    const outH = Math.round(outW * vb.h / vb.w);
    // ps: viewBox units per output pixel — used to scale all overlay elements
    const ps = vb.w / outW;

    const visLayers = new Set((layers || []).filter(l => l.visible !== false).map(l => l.id));
    const defaultLayerId = (layers && layers[0]) ? layers[0].id : null;

    // ── SVG text element with white halo (matches screen rendering) ──────────
    function _dimSVG(lx, ly, angle, text) {
      const a = angle || 0;
      const rot = a ? ` transform="rotate(${a.toFixed(2)},${lx.toFixed(2)},${ly.toFixed(2)})"` : '';
      const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<text x="${lx.toFixed(2)}" y="${ly.toFixed(2)}"${rot} font-size="${(12*ps).toFixed(2)}" font-family="Courier New,monospace" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#000000" stroke="#FFFFFF" stroke-width="${(3.5*ps).toFixed(2)}" style="pointer-events:none;user-select:none;paint-order:stroke fill;">${esc(text)}</text>`;
    }

    // ── Rotate a point around a pivot ────────────────────────────────────────
    function _rotPt(x, y, cx, cy, deg) {
      const r = deg * Math.PI / 180;
      const c = Math.cos(r), s = Math.sin(r);
      return { x: cx + (x-cx)*c - (y-cy)*s, y: cy + (x-cx)*s + (y-cy)*c };
    }

    // ── Dimension labels for a single shape (SVG string) ─────────────────────
    function _dimsSVG(s) {
      if (s._hideDims) return '';
      const rot = s._rot || 0;
      const OFF = 13 * ps;

      // Pivot for rotation
      let piv;
      if (s._pivot) { piv = s._pivot; }
      else switch (s.type) {
        case 'line':   piv = { x:(s.x1+s.x2)/2, y:(s.y1+s.y2)/2 }; break;
        case 'circle': piv = { x:s.cx, y:s.cy };                     break;
        case 'rect':   piv = { x:s.x+s.w/2, y:s.y+s.h/2 };          break;
        default:       piv = { x:s.x||0, y:s.y||0 };
      }

      // Rotate anchor then emit text at that world position
      function D(rawX, rawY, ang, txt) {
        const { x: lx, y: ly } = rot ? _rotPt(rawX, rawY, piv.x, piv.y, rot) : { x:rawX, y:rawY };
        return _dimSVG(lx, ly, _norm(ang + rot), txt);
      }

      // NTS label override
      if (s.ntsLabel) {
        let nx = 0, ny = 0;
        switch (s.type) {
          case 'line':   nx=(s.x1+s.x2)/2; ny=(s.y1+s.y2)/2; break;
          case 'circle': nx=s.cx;           ny=s.cy;           break;
          case 'rect':   nx=s.x+s.w/2;     ny=s.y+s.h/2;     break;
          default:       return '';
        }
        return _dimSVG(nx, ny, 0, s.ntsLabel + ' *');
      }

      switch (s.type) {
        case 'line': {
          const len = Math.hypot(s.x2-s.x1, s.y2-s.y1);
          if (len < 5*ps) return '';
          const mx=(s.x1+s.x2)/2, my=(s.y1+s.y2)/2;
          const nx=-(s.y2-s.y1)/len, ny=(s.x2-s.x1)/len;
          const ang = Math.atan2(s.y2-s.y1, s.x2-s.x1)*180/Math.PI;
          const az  = ((Math.atan2(s.x2-s.x1, -(s.y2-s.y1))*180/Math.PI) + rot + 360) % 360;
          return D(mx+nx*OFF, my+ny*OFF, ang, _fmt(len, sd, un))
               + D(mx-nx*OFF, my-ny*OFF, ang, _toDMS(az));
        }
        case 'curve': {
          const px = s.px !== undefined ? s.px : (s.x1+s.x2)/2;
          const py = s.py !== undefined ? s.py : (s.y1+s.y2)/2;
          const cp = _cArc(s.x1, s.y1, s.x2, s.y2, px, py);
          if (!cp || cp.L < 5*ps) return '';
          const mx=(s.x1+s.x2)/2, my=(s.y1+s.y2)/2;
          const olen = Math.hypot(px-mx, py-my) || 1;
          const ux=(px-mx)/olen, uy=(py-my)/olen;
          const lx1=mx+(cp.M+OFF)*ux,       ly1=my+(cp.M+OFF)*uy;
          const lx2=mx+(cp.M+OFF+12*ps)*ux, ly2=my+(cp.M+OFF+12*ps)*uy;
          const r0 = rot ? _rotPt(lx1, ly1, piv.x, piv.y, rot) : { x:lx1, y:ly1 };
          const r1 = rot ? _rotPt(lx2, ly2, piv.x, piv.y, rot) : { x:lx2, y:ly2 };
          return _dimSVG(r0.x, r0.y, 0, `L ${_fmt(cp.L, sd, un)}`)
               + _dimSVG(r1.x, r1.y, 0, `R ${_fmt(cp.R, sd, un)}`);
        }
        case 'circle':
          if (s.r < 5*ps) return '';
          return D(s.cx, s.cy + s.r*0.25, 0, `R=${_fmt(s.r, sd, un)}`);
        case 'rect':
          return D(s.x+s.w/2,     s.y+s.h+OFF, 0,   _fmt(Math.abs(s.w), sd, un))
               + D(s.x+s.w+OFF,   s.y+s.h/2,   -90, _fmt(Math.abs(s.h), sd, un));

        // ── Dimension shape labels ──────────────────────────────────────────
        case 'dim-linear': {
          if (!s.p1||!s.p2) return '';
          const dlLen=Math.hypot(s.p2.x-s.p1.x,s.p2.y-s.p1.y);
          if (dlLen<5*ps) return '';
          const dlOff=s.offset||0;
          const dlpX=-(s.p2.y-s.p1.y)/dlLen, dlpY=(s.p2.x-s.p1.x)/dlLen;
          const mx=(s.p1.x+s.p2.x)/2+dlpX*dlOff, my=(s.p1.y+s.p2.y)/2+dlpY*dlOff;
          const ang=Math.atan2(s.p2.y-s.p1.y,s.p2.x-s.p1.x)*180/Math.PI;
          return _dimSVG(mx,my,_norm(ang),s.ntsLabel?s.ntsLabel+' *':_fmt(dlLen,sd,un));
        }
        case 'dim-angle': {
          if (!s.line1Id||!s.line2Id) return '';
          const dal1=(shapes||[]).find(sh=>sh.id===s.line1Id&&sh.type==='line');
          const dal2=(shapes||[]).find(sh=>sh.id===s.line2Id&&sh.type==='line');
          if (!dal1||!dal2) return '';
          const daInt=_liIntersect(dal1.x1,dal1.y1,dal1.x2,dal1.y2,dal2.x1,dal2.y1,dal2.x2,dal2.y2);
          if (!daInt) return '';
          let daa1=_dimArmAng(dal1.x1,dal1.y1,dal1.x2,dal1.y2,daInt.x,daInt.y);
          let daa2=_dimArmAng(dal2.x1,dal2.y1,dal2.x2,dal2.y2,daInt.x,daInt.y);
          let daDelta=((daa2-daa1)+2*Math.PI)%(2*Math.PI);
          if (daDelta>Math.PI){const t=daa1;daa1=daa2;daa2=t;daDelta=2*Math.PI-daDelta;}
          const midAng=(daa1+daDelta/2)+(s.flip?Math.PI:0);
          const angleDeg=s.flip?(360-daDelta*180/Math.PI):(daDelta*180/Math.PI);
          const arcRA=(s.scale||1.0)*40*ps;
          const lx=daInt.x+Math.cos(midAng)*(arcRA+30*ps);
          const ly=daInt.y+Math.sin(midAng)*(arcRA+30*ps);
          return _dimSVG(lx,ly,_norm(midAng*180/Math.PI),s.ntsLabel?s.ntsLabel+' *':_toDMS(angleDeg));
        }
        case 'dim-bearing': {
          if (!s.p1||!s.p2||s.arrowOnly) return '';
          const dbLen=Math.hypot(s.p2.x-s.p1.x,s.p2.y-s.p1.y);
          if (dbLen<5*ps) return '';
          const bmx=(s.p1.x+s.p2.x)/2, bmy=(s.p1.y+s.p2.y)/2;
          const rawAz=((Math.atan2(s.p2.x-s.p1.x,-(s.p2.y-s.p1.y))*180/Math.PI)+360)%360;
          const lineAng=Math.atan2(s.p2.y-s.p1.y,s.p2.x-s.p1.x)*180/Math.PI;
          return _dimSVG(bmx,bmy,_norm(lineAng),s.ntsLabel?s.ntsLabel+' *':_toDMS(rawAz));
        }
        case 'dim-radius': {
          const rrRef=(shapes||[]).find(sh=>sh.id===s.shapeId);
          if (!rrRef) return '';
          let rrcx,rrcy,rrR;
          if (rrRef.type==='circle') { rrcx=rrRef.cx;rrcy=rrRef.cy;rrR=rrRef.r; }
          else if (rrRef.type==='curve') {
            const rrpx=rrRef.px!==undefined?rrRef.px:(rrRef.x1+rrRef.x2)/2;
            const rrpy=rrRef.py!==undefined?rrRef.py:(rrRef.y1+rrRef.y2)/2;
            const rra=_cArc(rrRef.x1,rrRef.y1,rrRef.x2,rrRef.y2,rrpx,rrpy);
            if (!rra) return '';
            rrcx=rra.cx;rrcy=rra.cy;rrR=rra.R;
          } else return '';
          const rrOff=s.offset||{x:50*ps,y:-50*ps};
          const rrEx=rrcx+rrOff.x+14*ps, rrEy=rrcy+rrOff.y;
          return _dimSVG(rrEx,rrEy,0,s.ntsLabel?s.ntsLabel+' *':`R ${_fmt(rrR,sd,un)}`);
        }

        default:
          return '';
      }
    }

    // ── Scale bar (bottom-left) ───────────────────────────────────────────────
    function _scaleBarSVG() {
      const barReal = _nice(sd, vb.w, outW, un);
      const barPxW  = _rtp(barReal, sd, un);
      const barLabel = _fmtR(barReal, un);
      const scaleLabel = `1 : ${sd.toLocaleString()}`;
      const bx  = vb.x + vb.w * 0.025;
      const by  = vb.y + vb.h * 0.956;
      const bh  = 4 * ps;
      const sw  = 1.5 * ps;
      const fs  = 8.5 * ps;
      const pad = 5 * ps;
      const bgW = barPxW + pad * 2;
      const bgH = bh + 20 * ps;
      const bgX = bx - pad, bgY = by - 12 * ps;
      return `<g>
        <rect x="${bgX.toFixed(1)}" y="${bgY.toFixed(1)}" width="${bgW.toFixed(1)}" height="${bgH.toFixed(1)}" rx="${(3*ps).toFixed(1)}" fill="rgba(255,255,255,0.88)" stroke="#DDD6C8" stroke-width="${(0.8*ps).toFixed(1)}"/>
        <line x1="${bx.toFixed(1)}" y1="${by.toFixed(1)}" x2="${(bx+barPxW).toFixed(1)}" y2="${by.toFixed(1)}" stroke="#3C5445" stroke-width="${(sw*2).toFixed(1)}"/>
        <line x1="${bx.toFixed(1)}" y1="${(by-bh/2).toFixed(1)}" x2="${bx.toFixed(1)}" y2="${(by+bh/2).toFixed(1)}" stroke="#3C5445" stroke-width="${sw.toFixed(1)}"/>
        <line x1="${(bx+barPxW).toFixed(1)}" y1="${(by-bh/2).toFixed(1)}" x2="${(bx+barPxW).toFixed(1)}" y2="${(by+bh/2).toFixed(1)}" stroke="#3C5445" stroke-width="${sw.toFixed(1)}"/>
        <text x="${(bx+barPxW/2).toFixed(1)}" y="${(by-bh/2-2.5*ps).toFixed(1)}" text-anchor="middle" dominant-baseline="auto" font-size="${fs.toFixed(1)}" fill="#3C5445" font-family="Courier New,monospace" font-weight="bold">${barLabel}</text>
        <text x="${(bx+barPxW/2).toFixed(1)}" y="${(by+bh/2+7*ps).toFixed(1)}" text-anchor="middle" dominant-baseline="auto" font-size="${(fs*0.85).toFixed(1)}" fill="#555" font-family="Helvetica,Arial,sans-serif" font-style="italic">${scaleLabel}</text>
      </g>`;
    }

    // ── North arrow (bottom-right) ────────────────────────────────────────────
    function _northArrowSVG() {
      const R    = vb.h * 0.042;
      const ax   = vb.x + vb.w * 0.955;
      const ay   = vb.y + vb.h * 0.910;
      const sw   = 1.2 * ps;
      const tipY = ay - R * 0.82;
      const baseY = ay + R * 0.62;
      const wingX = R * 0.36;
      const nFs   = (9.5 * ps).toFixed(1);
      return `<g>
        <circle cx="${ax.toFixed(1)}" cy="${ay.toFixed(1)}" r="${(R+2.5*ps).toFixed(1)}" fill="white" opacity="0.92"/>
        <circle cx="${ax.toFixed(1)}" cy="${ay.toFixed(1)}" r="${(R+1.5*ps).toFixed(1)}" fill="none" stroke="#3C5445" stroke-width="${(sw*1.2).toFixed(1)}"/>
        <polygon points="${ax.toFixed(1)},${tipY.toFixed(1)} ${(ax-wingX).toFixed(1)},${ay.toFixed(1)} ${(ax+wingX).toFixed(1)},${ay.toFixed(1)}" fill="#3C5445"/>
        <polygon points="${ax.toFixed(1)},${baseY.toFixed(1)} ${(ax-wingX).toFixed(1)},${ay.toFixed(1)} ${(ax+wingX).toFixed(1)},${ay.toFixed(1)}" fill="white" stroke="#3C5445" stroke-width="${sw.toFixed(1)}"/>
        <text x="${ax.toFixed(1)}" y="${(tipY-3.5*ps).toFixed(1)}" text-anchor="middle" dominant-baseline="auto" font-size="${nFs}" fill="#3C5445" font-family="Helvetica,Arial,sans-serif" font-weight="bold">N</text>
      </g>`;
    }

    // ── Geometry helpers for dim shapes (inlined — not in _fbSketchUtils) ───────
    function _liIntersect(x1,y1,x2,y2,x3,y3,x4,y4) {
      const dx1=x2-x1,dy1=y2-y1,dx2=x4-x3,dy2=y4-y3;
      const denom=dx1*dy2-dy1*dx2;
      if (Math.abs(denom)<1e-10) return null;
      const t=((x3-x1)*dy2-(y3-y1)*dx2)/denom;
      return {x:x1+t*dx1,y:y1+t*dy1};
    }
    function _dimArmAng(lx1,ly1,lx2,ly2,px,py) {
      const dx=lx2-lx1,dy=ly2-ly1,lenSq=dx*dx+dy*dy||1;
      const t=((px-lx1)*dx+(py-ly1)*dy)/lenSq;
      return t<=0.5 ? Math.atan2(dy,dx) : Math.atan2(-dy,-dx);
    }

    // ── Render shapes — in layer order (bottom to top), matching canvas draw order ──
    // Build a layer-index lookup so shapes can be sorted by their layer position.
    // Within each layer, shapes keep their original array order (stable sort).
    const _layerOrder = (layers || []).map(l => l.id);
    const _layerIdx = id => { const i = _layerOrder.indexOf(id); return i === -1 ? 0 : i; };
    const _sortedShapes = [...(shapes || [])].sort((a, b) => {
      const ai = _layerIdx(a.layerId || defaultLayerId);
      const bi = _layerIdx(b.layerId || defaultLayerId);
      return ai - bi;  // lower layer index = rendered first = appears behind
    });

    let shapesSVG = '';
    let dimsSVG   = '';

    for (const s of _sortedShapes) {
      const lid = s.layerId || defaultLayerId;
      if (lid && !visLayers.has(lid)) continue;
      if (s.visible === false) continue;  // per-shape visibility

      const stroke = s.stroke || '#3C5445';
      const sw     = (s.strokeWidth || 1.5) * ps;  // multiply by ps so lines match screen thickness
      const fill   = s.fill || 'none';
      const sOp    = s.strokeOpacity ?? 1;
      const fOp    = s.fillOpacity   ?? 1;
      const base   = `stroke="${stroke}" stroke-width="${sw.toFixed(3)}" fill="${fill}" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="${sOp}" fill-opacity="${fOp}"`;

      let el = '';
      switch (s.type) {
        case 'line':
          el = `<line x1="${s.x1}" y1="${s.y1}" x2="${s.x2}" y2="${s.y2}" ${base}/>`;
          break;
        case 'circle':
          el = `<circle cx="${s.cx}" cy="${s.cy}" r="${s.r}" ${base}/>`;
          break;
        case 'rect':
          el = `<rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" ${base}/>`;
          break;
        case 'curve': {
          const px = s.px !== undefined ? s.px : (s.x1+s.x2)/2;
          const py = s.py !== undefined ? s.py : (s.y1+s.y2)/2;
          el = `<path d="${_arc(s.x1, s.y1, s.x2, s.y2, px, py)}" ${base}/>`;
          break;
        }
        case 'path': {
          const d = _pathD(s.nodes, s.closed);
          if (d) el = `<path d="${d}" ${base}/>`;
          break;
        }
        case 'image':
          if (s.dataUrl) {
            const imgOp = s.strokeOpacity ?? s.fillOpacity ?? 1;
            el = `<image href="${s.dataUrl}" x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" preserveAspectRatio="none" opacity="${imgOp}"/>`;
          }
          break;
        case 'text': {
          // s.x/s.y is the CENTRE of the text box (matches sketch.js rendering).
          // Convert to top-left corner using the same counter-scaling as sketch.js:
          // tw = screen-px width * ps, th = screen-px height * ps.
          const sw = s.w || 180;
          const sh = s.h || 80;
          const tw = sw * ps;
          const th = sh * ps;
          const rx = s.x - tw / 2;
          const ry = s.y - th / 2;
          const tFontSize = 9.5 * ps;
          const tLineH = tFontSize * 1.55;
          const charW = 9.5 * 0.601;
          const maxChars = Math.max(1, Math.floor((sw - 6) / charW));
          const _wt = (utils && utils.wrapText) ? utils.wrapText : (t, n) => {
            const out = [];
            for (const para of t.split('\n')) {
              if (para.length <= n) { out.push(para); continue; }
              let rem = para;
              while (rem.length > n) { out.push(rem.slice(0, n)); rem = rem.slice(n); }
              out.push(rem);
            }
            return out;
          };
          const lines = _wt(s.content || '', maxChars);
          const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const tspans = lines.map((ln, i) =>
            `<tspan x="${(rx + 3*ps).toFixed(3)}" dy="${i === 0 ? (tFontSize*1.25).toFixed(3) : tLineH.toFixed(3)}">${esc(ln) || '\u00a0'}</tspan>`
          ).join('');
          el = `<text x="${(rx + 3*ps).toFixed(3)}" y="${ry.toFixed(3)}" font-size="${tFontSize.toFixed(3)}" fill="${stroke}" font-family="Courier New,monospace">${tspans}</text>`;
          break;
        }
        // ── Dimension shapes ────────────────────────────────────────────────
        case 'dim-linear': {
          if (!s.p1 || !s.p2) break;
          const dlOff = s.offset || 0;
          const dlLen = Math.hypot(s.p2.x-s.p1.x, s.p2.y-s.p1.y);
          if (dlLen < 1) break;
          const dlpX = -(s.p2.y-s.p1.y)/dlLen, dlpY = (s.p2.x-s.p1.x)/dlLen;
          const dd1x = s.p1.x+dlpX*dlOff, dd1y = s.p1.y+dlpY*dlOff;
          const dd2x = s.p2.x+dlpX*dlOff, dd2y = s.p2.y+dlpY*dlOff;
          const dlGap=3*ps, dlExt=6*ps, dlAh=8*ps, dlAs=3*ps;
          const dludx=(s.p2.x-s.p1.x)/dlLen, dludy=(s.p2.y-s.p1.y)/dlLen;
          const mka=(ax,ay,dx,dy)=>
            `M ${ax-dx*dlAh*0.5+dy*dlAs} ${ay-dy*dlAh*0.5-dx*dlAs} L ${ax} ${ay} L ${ax-dx*dlAh*0.5-dy*dlAs} ${ay-dy*dlAh*0.5+dx*dlAs}`;
          el = `<g stroke="${stroke}" stroke-width="${(1.2*ps).toFixed(3)}" fill="none" stroke-linecap="round" stroke-linejoin="round">`+
            `<line x1="${s.p1.x+dlpX*dlGap}" y1="${s.p1.y+dlpY*dlGap}" x2="${dd1x+dlpX*dlExt}" y2="${dd1y+dlpY*dlExt}" stroke-width="${(0.9*ps).toFixed(3)}"/>`+
            `<line x1="${s.p2.x+dlpX*dlGap}" y1="${s.p2.y+dlpY*dlGap}" x2="${dd2x+dlpX*dlExt}" y2="${dd2y+dlpY*dlExt}" stroke-width="${(0.9*ps).toFixed(3)}"/>`+
            `<line x1="${dd1x}" y1="${dd1y}" x2="${dd2x}" y2="${dd2y}"/>`+
            `<path d="${mka(dd1x,dd1y,-dludx,-dludy)}"/><path d="${mka(dd2x,dd2y,dludx,dludy)}"/>`+
            `</g>`;
          break;
        }
        case 'dim-angle': {
          if (!showDims || s._hideDims) break;
          const dal1 = (shapes||[]).find(sh=>sh.id===s.line1Id&&sh.type==='line');
          const dal2 = (shapes||[]).find(sh=>sh.id===s.line2Id&&sh.type==='line');
          if (!dal1||!dal2) break;
          const daInt = _liIntersect(dal1.x1,dal1.y1,dal1.x2,dal1.y2,dal2.x1,dal2.y1,dal2.x2,dal2.y2);
          if (!daInt) break;
          let daa1=_dimArmAng(dal1.x1,dal1.y1,dal1.x2,dal1.y2,daInt.x,daInt.y);
          let daa2=_dimArmAng(dal2.x1,dal2.y1,dal2.x2,dal2.y2,daInt.x,daInt.y);
          let daDelta=((daa2-daa1)+2*Math.PI)%(2*Math.PI);
          if (daDelta>Math.PI){const t=daa1;daa1=daa2;daa2=t;}
          const daR=(s.scale||1.0)*40*ps;
          const daLg=s.flip?1:0, daSw=s.flip?0:1;
          const ax1=daInt.x+Math.cos(daa1)*daR, ay1=daInt.y+Math.sin(daa1)*daR;
          const ax2=daInt.x+Math.cos(daa2)*daR, ay2=daInt.y+Math.sin(daa2)*daR;
          el = `<path d="M ${ax1.toFixed(2)} ${ay1.toFixed(2)} A ${daR.toFixed(2)} ${daR.toFixed(2)} 0 ${daLg} ${daSw} ${ax2.toFixed(2)} ${ay2.toFixed(2)}" stroke="${stroke}" stroke-width="${(1.2*ps).toFixed(3)}" fill="none" stroke-linecap="round"/>`;
          break;
        }
        case 'dim-bearing': {
          if (!s.p1||!s.p2) break;
          const dbLen=Math.hypot(s.p2.x-s.p1.x,s.p2.y-s.p1.y);
          if (dbLen<1) break;
          const dbUx=(s.p2.x-s.p1.x)/dbLen, dbUy=(s.p2.y-s.p1.y)/dbLen;
          const dbAh=8*ps, dbAs=3*ps;
          const mkba=(ax,ay,dx,dy)=>
            `M ${ax-dx*dbAh*0.5+dy*dbAs} ${ay-dy*dbAh*0.5-dx*dbAs} L ${ax} ${ay} L ${ax-dx*dbAh*0.5-dy*dbAs} ${ay-dy*dbAh*0.5+dx*dbAs}`;
          el = `<g stroke="${stroke}" stroke-width="${(1.2*ps).toFixed(3)}" fill="none" stroke-linecap="round" stroke-linejoin="round">`+
            `<line x1="${s.p1.x}" y1="${s.p1.y}" x2="${s.p2.x}" y2="${s.p2.y}"/>`+
            `<path d="${mkba(s.p2.x,s.p2.y,dbUx,dbUy)}"/>`+
            `</g>`;
          break;
        }
        case 'dim-radius': {
          const rrRef=(shapes||[]).find(sh=>sh.id===s.shapeId);
          if (!rrRef) break;
          let rrcx,rrcy,rrR;
          if (rrRef.type==='circle') {
            rrcx=rrRef.cx; rrcy=rrRef.cy; rrR=rrRef.r;
          } else if (rrRef.type==='curve') {
            const rrpx=rrRef.px!==undefined?rrRef.px:(rrRef.x1+rrRef.x2)/2;
            const rrpy=rrRef.py!==undefined?rrRef.py:(rrRef.y1+rrRef.y2)/2;
            const rra=_cArc(rrRef.x1,rrRef.y1,rrRef.x2,rrRef.y2,rrpx,rrpy);
            if (!rra) break;
            rrcx=rra.cx; rrcy=rra.cy; rrR=rra.R;
          } else break;
          const rrOff=s.offset||{x:50*ps,y:-50*ps};
          const rrEx=rrcx+rrOff.x, rrEy=rrcy+rrOff.y;
          const rrLL=Math.hypot(rrOff.x,rrOff.y)||1;
          const rrUx=rrOff.x/rrLL, rrUy=rrOff.y/rrLL;
          const rrSx=rrcx+rrUx*rrR, rrSy=rrcy+rrUy*rrR;
          el = `<g stroke="${stroke}" stroke-width="${(1.2*ps).toFixed(3)}" fill="none" stroke-linecap="round">`+
            `<line x1="${rrSx.toFixed(2)}" y1="${rrSy.toFixed(2)}" x2="${rrEx.toFixed(2)}" y2="${rrEy.toFixed(2)}"/>`+
            `<line x1="${rrEx.toFixed(2)}" y1="${rrEy.toFixed(2)}" x2="${(rrEx+12*ps).toFixed(2)}" y2="${rrEy.toFixed(2)}"/>`+
            `</g>`;
          break;
        }
        case 'point': {
          // Point symbol — constant screen-size elements scaled by ps
          const r = 10 * ps;
          const sw = (s.strokeWidth || 1.5) * ps;
          const stroke = s.stroke || '#3C5445';
          const cx = s.x, cy = s.y;
          const sym = s.symbol || 'survey';
          let symEl = '';
          switch (sym) {
            case 'survey':
              symEl = `<circle cx="${cx}" cy="${cy}" r="${r}" stroke="${stroke}" stroke-width="${sw}" fill="none"/>` +
                      `<circle cx="${cx}" cy="${cy}" r="${(r*0.35).toFixed(2)}" fill="${stroke}" stroke="none"/>`;
              break;
            case 'dot':
              symEl = `<circle cx="${cx}" cy="${cy}" r="${(r*0.35).toFixed(2)}" fill="${stroke}" stroke="none"/>`;
              break;
            case 'x': {
              const d = (r * 0.7).toFixed(2);
              symEl = `<line x1="${(cx-d)}" y1="${(cy-d)}" x2="${(cx+d)}" y2="${(cy+d)}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round"/>` +
                      `<line x1="${(cx+d)}" y1="${(cy-d)}" x2="${(cx-d)}" y2="${(cy+d)}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round"/>`;
              break;
            }
            case 'cross': {
              const d = (r * 0.7).toFixed(2);
              symEl = `<line x1="${cx}" y1="${(cy-d)}" x2="${cx}" y2="${(cy+d)}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round"/>` +
                      `<line x1="${(cx-d)}" y1="${cy}" x2="${(cx+d)}" y2="${cy}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round"/>`;
              break;
            }
            case 'square': {
              const h = (r * 0.7).toFixed(2);
              symEl = `<rect x="${(cx-h)}" y="${(cy-h)}" width="${(h*2)}" height="${(h*2)}" stroke="${stroke}" stroke-width="${sw}" fill="none"/>`;
              break;
            }
            case 'triangle': {
              const h = r;
              const pts = `${cx},${(cy-h)} ${(cx-h*0.866)},${(cy+h*0.5)} ${(cx+h*0.866)},${(cy+h*0.5)}`;
              symEl = `<polygon points="${pts}" stroke="${stroke}" stroke-width="${sw}" fill="none" stroke-linejoin="round"/>`;
              break;
            }
            case 'tri-down': {
              const h = r;
              const pts = `${cx},${(cy+h)} ${(cx-h*0.866)},${(cy-h*0.5)} ${(cx+h*0.866)},${(cy-h*0.5)}`;
              symEl = `<polygon points="${pts}" stroke="${stroke}" stroke-width="${sw}" fill="none" stroke-linejoin="round"/>`;
              break;
            }
            case 'diamond': {
              const pts = `${cx},${(cy-r)} ${(cx+r)},${cy} ${cx},${(cy+r)} ${(cx-r)},${cy}`;
              symEl = `<polygon points="${pts}" stroke="${stroke}" stroke-width="${sw}" fill="none" stroke-linejoin="round"/>`;
              break;
            }
            case 'circle':
            default:
              symEl = `<circle cx="${cx}" cy="${cy}" r="${r}" stroke="${stroke}" stroke-width="${sw}" fill="none"/>`;
              break;
          }
          el = `<g>${symEl}</g>`;

          // Labels stacked below symbol
          const esc = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const lfs = (10 * ps).toFixed(2);
          const lStep = 11 * ps;
          let labels = [];
          if (s.showNum     && s.ptNum)    labels.push(esc(s.ptNum));
          if (s.showNorthing && s.northing) labels.push('N ' + esc(s.northing));
          if (s.showEasting  && s.easting)  labels.push('E ' + esc(s.easting));
          if (s.showElev     && s.elev)     labels.push('Z ' + esc(s.elev));
          if (s.showDesc     && s.desc)     labels.push(esc(s.desc));
          let startY = cy + r + 14 * ps;
          labels.forEach(txt => {
            el += `<text x="${cx}" y="${startY.toFixed(2)}" font-size="${lfs}" font-family="Courier New,monospace" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#000000" stroke="#FFFFFF" stroke-width="${(3*ps).toFixed(2)}" paint-order="stroke fill" style="pointer-events:none;user-select:none;">${txt}</text>`;
            startY += lStep;
          });
          // Points don't use _rot and are never added to dimsSVG
          shapesSVG += el;
          continue; // skip the rotation + _dimsSVG logic below
        }
      }
      if (!el) continue;

      if (s._rot) {
        let px, py;
        if (s._pivot) { px = s._pivot.x; py = s._pivot.y; }
        else switch (s.type) {
          case 'line':   px=(s.x1+s.x2)/2; py=(s.y1+s.y2)/2; break;
          case 'circle': px=s.cx;           py=s.cy;           break;
          case 'rect':   px=s.x+s.w/2;     py=s.y+s.h/2;     break;
          default:       px=s.x||0;         py=s.y||0;
        }
        el = `<g transform="rotate(${s._rot},${px},${py})">${el}</g>`;
      }
      shapesSVG += el;
      if (showDims) dimsSVG += _dimsSVG(s);
    }

    const bgAttr = transparent ? '' : ' style="background:#F5F0E3;"';
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb.x} ${vb.y} ${vb.w} ${vb.h}" width="${outW}" height="${outH}"${bgAttr}>${shapesSVG}${dimsSVG}</svg>`;
  }

  // Draw the notebook-style page header on the current jsPDF page.
  // Returns the y coordinate where content should start below the header.
  function _pdfPageHeader(pdf, page, meta, W, H, margin, F) {
    const _F = F || { hand: 'helvetica', handSt: 'bold', mono: 'courier', monoSt: 'normal' };

    // White page background
    pdf.setFillColor(255, 255, 255);
    pdf.rect(0, 0, W, H, 'F');

    // Light grey header band
    pdf.setFillColor(236, 236, 236);
    pdf.roundedRect(margin, margin, W - 2*margin, 20, 4, 4, 'F');
    pdf.rect(margin, margin + 10, W - 2*margin, 10, 'F');
    // Thin rule at bottom of header band
    pdf.setDrawColor(180, 180, 180);
    pdf.setLineWidth(0.6);
    pdf.line(margin, margin + 20, W - margin, margin + 20);

    // Page title
    const titleStr = page.title?.trim() || '(Untitled)';
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(30, 30, 30);
    const titleLines = pdf.splitTextToSize(titleStr, W - margin*2 - 50);
    pdf.text(titleLines[0], margin + 4, margin + 13);

    // Date / weather on the right in header
    const dateStr = [page.date, page.weather].filter(Boolean).join('  ·  ');
    if (dateStr) {
      pdf.setFontSize(7.5);
      pdf.setFont(_F.mono, _F.monoSt);
      pdf.setTextColor(110, 110, 110);
      pdf.text(dateStr, W - margin - 4, margin + 13, { align: 'right' });
    }

    let y = margin + 20 + 3;

    // Notes band (non-title pages only) — drawn inside the cream rect
    if (page.notes?.trim() && page.type !== 'title') {
      const noteLines = pdf.splitTextToSize(page.notes.trim(), W - 2*margin - 18);
      const noteH = noteLines.length * 4.5 + 8;
      pdf.setFillColor(246, 246, 246);
      pdf.rect(margin, y, W - 2*margin, noteH, 'F');
      pdf.setDrawColor(200, 200, 200);
      pdf.setLineWidth(0.3);
      pdf.line(margin, y, W - margin, y);
      pdf.line(margin, y + noteH, W - margin, y + noteH);
      // "Notes:" label
      pdf.setFontSize(6.5);
      pdf.setFont('helvetica', 'bold');
      pdf.setTextColor(107, 114, 128);
      pdf.text('NOTES', margin + 4, y + 5.5);
      // Notes text
      pdf.setFontSize(8);
      pdf.setFont(_F.mono, _F.monoSt);
      pdf.setTextColor(44, 44, 44);
      pdf.text(noteLines, margin + 18, y + 5.5);
      y += noteH + 2;
    }

    return y;
  }

  // ── PDF SKETCH OVERLAY HELPERS ─────────────────────────────────────────────

  // Draw a 5mm graph-paper grid over the content area of a notebook page.
  function _drawPdfGrid(pdf, W, H, margin, top) {
    const step = 5;
    const left = margin, right = W - margin;
    const bottom = H - margin;
    pdf.setDrawColor(200, 195, 185);
    pdf.setLineWidth(0.12);
    for (let x = left; x <= right + 0.01; x += step) {
      pdf.line(x, top, x, bottom);
    }
    for (let y = top; y <= bottom + 0.01; y += step) {
      pdf.line(left, y, right, y);
    }
  }

  // Draw a simple north arrow at the top-right of the content area.
  function _drawPdfNorthArrow(pdf, W, margin) {
    const cx = W - margin - 9;
    const cy = margin + 32;
    pdf.setDrawColor(40, 40, 40); pdf.setLineWidth(0.6);
    pdf.line(cx, cy + 6, cx, cy - 3);
    pdf.line(cx, cy - 3, cx - 2.5, cy + 1.5);
    pdf.line(cx, cy - 3, cx + 2.5, cy + 1.5);
    pdf.setFillColor(40, 40, 40);
    pdf.circle(cx, cy + 6, 0.9, 'F');
    pdf.setFontSize(7); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(40, 40, 40);
    pdf.text('N', cx, cy - 5.5, { align: 'center' });
  }

  // Draw a map-style alternating scale bar at the bottom-right of the content area.
  // vbW  = page.viewBox.w in canvas pixels (how many px wide the sketch viewport is)
  // availW = PDF content width in mm (W - margin*2)
  // These two values are required to compute the physically correct bar width.
  //
  // The sketch uses PIXELS_PER_METER = 1000, so:
  //   pxToReal(px) = px * scaleDenom / 1000  (metres; × 3.28084 for feet)
  //   realToPx(v)  = v_metres * 1000 / scaleDenom
  //
  // On the printed page vbW canvas-pixels fill availW mm, so:
  //   barW_mm = realToPx(niceReal) × (availW / vbW)
  //
  // targetReal for a ~50 mm bar:
  //   realToPx(targetReal) × (availW / vbW) = 50
  //   → targetReal = 50 × vbW / availW × scaleDenom / 1000   (metres)
  function _drawPdfScaleBar(pdf, scaleDenom, units, W, H, margin, vbW, availW) {
    if (!scaleDenom || scaleDenom <= 1 || !vbW || !availW) return;
    const u = units === 'ft' ? 'ft' : 'm';

    // Real-world distance (in display units) that fills ~50 mm on paper
    let targetReal = 50 * (vbW / availW) * scaleDenom / 1000;
    if (units === 'ft') targetReal *= 3.28084;

    // Pick the largest nice value that stays within ~120 % of the target
    const niceVals = [0.1,0.2,0.5,1,2,5,10,25,50,100,150,200,250,500,1000,2000,5000];
    let niceReal = niceVals[0];
    for (const v of niceVals) {
      if (v <= targetReal * 1.2) niceReal = v;
      else break;
    }

    // Canvas pixels the bar represents, then convert to mm on the printed page
    const niceMetres = units === 'ft' ? niceReal / 3.28084 : niceReal;
    const barPx = niceMetres * 1000 / scaleDenom;   // canvas pixels
    const barW  = barPx * availW / vbW;              // mm on paper

    if (barW < 5 || barW > availW * 0.7) return;    // sanity guard

    // Choose nSegs so every tick label is a distinct whole number
    let nSegs = 5;
    for (const n of [5, 4, 2, 1]) {
      if (Number.isInteger(niceReal / n)) { nSegs = n; break; }
    }

    const barH = 3.5;
    const segW = barW / nSegs;
    const bx   = W - margin - 4 - barW;
    const by   = H - margin - 19;
    const dk   = [55, 55, 55];
    const wh   = [255, 255, 255];

    // Alternating filled / white segments
    for (let i = 0; i < nSegs; i++) {
      pdf.setFillColor(...(i % 2 === 0 ? dk : wh));
      pdf.rect(bx + i * segW, by, segW, barH, 'F');
    }

    // Outer border + internal dividers
    pdf.setDrawColor(...dk); pdf.setLineWidth(0.3);
    pdf.rect(bx, by, barW, barH, 'S');
    for (let i = 1; i < nSegs; i++) {
      pdf.line(bx + i * segW, by, bx + i * segW, by + barH);
    }

    // Tick labels — integer values, one per division
    pdf.setFontSize(5.5); pdf.setFont('helvetica', 'normal'); pdf.setTextColor(44, 44, 44);
    for (let i = 0; i <= nSegs; i++) {
      const val = Math.round((i / nSegs) * niceReal);
      pdf.text(String(val), bx + i * segW, by - 1, { align: 'center' });
    }

    // Unit label and 1:N scale note to the right
    pdf.text(u, bx + barW + 2, by + barH - 0.5, { align: 'left' });
    pdf.setFontSize(5); pdf.setTextColor(100, 100, 100);
    pdf.text(`1:${scaleDenom}`, bx + barW + 2, by - 1, { align: 'left' });
  }

  // Main project PDF export — called from ProjectView.
  async function exportProjectPDF(projectId, toast, setExporting) {
    if (!window.jspdf?.jsPDF) { toast.error('PDF library not loaded'); return; }
    setExporting(true);

    try {
      const proj = DB.getProject(projectId);
      if (!proj) { toast.error('Project not found'); return; }

      const { jsPDF } = window.jspdf;
      const W = 210, H = 297, margin = 14;
      const GD  = [40,  40,  40];   // dark grey  (headings, fills)
      const GM  = [110, 110, 110];  // mid grey   (accents, badges)
      const GL  = [160, 160, 160];  // light grey (secondary text)
      const CR  = [255, 255, 255];  // white
      const BRD = [200, 200, 200];  // border grey

      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const F   = _initPDFFonts();
      // Export timestamp — used in per-page footer
      const exportTs = new Date().toLocaleString('en-CA', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false,
      });

      // ── PAGE 1: TITLE PAGE ─────────────────────────────────────────────────
      // Minimal ink — typography, rules, and whitespace only. No filled shapes.

      // White background
      pdf.setFillColor(255, 255, 255);
      pdf.rect(0, 0, W, H, 'F');

      // Outer border — single thin rule
      pdf.setDrawColor(30, 30, 30); pdf.setLineWidth(0.5);
      pdf.rect(10, 10, W - 20, H - 20, 'S');

      // ── "DIGITAL FIELD BOOK" label — top centre ───────────────────────────
      pdf.setFontSize(7); pdf.setFont('helvetica', 'bold');
      pdf.setTextColor(130, 130, 130);
      pdf.text('D I G I T A L   F I E L D   B O O K', W / 2, 24, { align: 'center' });

      // Rule below label
      pdf.setDrawColor(180, 180, 180); pdf.setLineWidth(0.3);
      pdf.line(28, 27, W - 28, 27);

      // ── Project name — vertically centred in upper half ───────────────────
      const nameLines = pdf.splitTextToSize(proj.name, W - 40);
      const nameFontSize = nameLines.length > 1 ? 26 : 32;
      pdf.setFontSize(nameFontSize); pdf.setFont('helvetica', 'bold');
      pdf.setTextColor(15, 15, 15);
      // Sit the name around 38% down the page
      const nameY = H * 0.38 - ((nameLines.length - 1) * nameFontSize * 0.3528 * 0.6);
      pdf.text(nameLines, W / 2, nameY, { align: 'center' });

      // Thick rule below project name
      pdf.setDrawColor(30, 30, 30); pdf.setLineWidth(0.8);
      pdf.line(28, nameY + 10, W - 28, nameY + 10);

      // ── Metadata — 2-column, left-aligned under rule ──────────────────────
      const mLeft  = 28;
      const mRight = W / 2 + 6;
      const mTop2  = nameY + 22;
      const mRowH2 = 20;
      const metaFields = [
        [mLeft,  mTop2,              'CLIENT',      proj.client   || '—'],
        [mRight, mTop2,              'SURVEYOR',    proj.surveyor || '—'],
        [mLeft,  mTop2 + mRowH2,     'DATE',        proj.date     || '—'],
        [mRight, mTop2 + mRowH2,     'JOB NUMBER',  proj.jobNumber || '—'],
      ];
      metaFields.forEach(([fx, fy, lbl, val]) => {
        pdf.setFontSize(6.5); pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(120, 120, 120);
        pdf.text(lbl, fx, fy);
        pdf.setFontSize(12); pdf.setFont('helvetica', 'normal');
        pdf.setTextColor(20, 20, 20);
        pdf.text(String(val), fx, fy + 8);
        pdf.setDrawColor(200, 200, 200); pdf.setLineWidth(0.25);
        pdf.line(fx, fy + 11, fx + (W / 2 - 34), fy + 11);
      });

      // Thin rule after metadata
      const afterMetaY = mTop2 + mRowH2 * 2 + 4;
      pdf.setDrawColor(180, 180, 180); pdf.setLineWidth(0.3);
      pdf.line(28, afterMetaY, W - 28, afterMetaY);

      // ── Page count + created date ─────────────────────────────────────────
      const pageCount = proj.pages?.length || 0;
      const createdStr = new Date(proj.createdAt).toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
      const infoY = afterMetaY + 10;
      pdf.setFontSize(7); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(120, 120, 120);
      pdf.text('PAGES', mLeft, infoY);
      pdf.setFontSize(11); pdf.setFont('helvetica', 'normal'); pdf.setTextColor(20, 20, 20);
      pdf.text(String(pageCount), mLeft, infoY + 7);
      pdf.setFontSize(7); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(120, 120, 120);
      pdf.text('CREATED', mRight, infoY);
      pdf.setFontSize(11); pdf.setFont('helvetica', 'normal'); pdf.setTextColor(20, 20, 20);
      pdf.text(createdStr, mRight, infoY + 7);

      // ── Footer — bottom of page, rule + export info ───────────────────────
      const exportDateStr = new Date().toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
      const ftRuleY = H - 20;
      pdf.setDrawColor(180, 180, 180); pdf.setLineWidth(0.3);
      pdf.line(28, ftRuleY, W - 28, ftRuleY);
      pdf.setFontSize(7); pdf.setFont('helvetica', 'normal'); pdf.setTextColor(150, 150, 150);
      pdf.text('FieldBook  ·  Digital Field Notebook', 28, ftRuleY + 6);
      pdf.text(`Exported  ${exportDateStr}`, W - 28, ftRuleY + 6, { align: 'right' });

      // ── PAGE 2: TOC PLACEHOLDER (filled in below) ──────────────────────────
      pdf.addPage();

      // ── CONTENT PAGES ─────────────────────────────────────────────────────
      const tocEntries = [];

      for (const page of (proj.pages || [])) {
        pdf.addPage();
        const pdfPageNum = pdf.getNumberOfPages(); // 3, 4, 5, ...
        const meta = { data:   { label: 'Data',   color: '#606060', bg: '#EEEEEE' },
                       sketch: { label: 'Sketch', color: '#606060', bg: '#EEEEEE' },
                       title:  { label: 'Title',  color: '#606060', bg: '#EEEEEE' },
                       photo:  { label: 'Photos', color: '#606060', bg: '#EEEEEE' },
                       notes:  { label: 'Notes',  color: '#606060', bg: '#EEEEEE' } }[page.type]
                   || { label: 'Data', color: '#606060', bg: '#EEEEEE' };
        const displayTitle = page.title?.trim() || `P.${page.pageNumber} — ${meta.label}`;
        tocEntries.push({ pageNum: page.pageNumber, typeLabel: meta.label, title: displayTitle, pdfPage: pdfPageNum });

        if (page.type === 'sketch') {
          const contentY = _pdfPageHeader(pdf, page, meta, W, H, margin, F);
          // Grid covers full content area
          if (page.showGrid !== false) _drawPdfGrid(pdf, W, H, margin, contentY);
          const drawH = (H - margin - 14) - contentY;

          // Generate SVG and render via html2canvas
          const svgStr = buildSketchSVG(page.shapes || [], page.layers, page.viewBox, page.scaleDenom, page.units, page.showDims !== false, true);
          if (svgStr && window.html2canvas) {
            const availW = W - margin*2;
            // Render at portrait proportions matching the PDF content area so the
            // drawing fills the full page height without clipping or tiny strips
            const pdfOutW = 1600;
            const pdfOutH = Math.round(pdfOutW * drawH / availW);
            // Rewrite the SVG's width/height to portrait proportions while keeping
            // the viewBox so content scales correctly via SVG's own aspect-ratio handling
            const svgForPDF = svgStr.replace(/width="\d+" height="\d+"/, `width="${pdfOutW}" height="${pdfOutH}"`);
            const tmp = document.createElement('div');
            tmp.style.cssText = `position:fixed;left:-9999px;top:-9999px;width:${pdfOutW}px;height:${pdfOutH}px;overflow:hidden;background:transparent;`;
            tmp.innerHTML = svgForPDF;
            document.body.appendChild(tmp);
            try {
              const canvas = await window.html2canvas(tmp, { scale: 1.5, useCORS: true, logging: false, width: pdfOutW, height: pdfOutH, backgroundColor: null });
              document.body.removeChild(tmp);
              // Place image filling the entire content area
              pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, contentY, availW, drawH);
              // North arrow and scale bar drawn directly in PDF (on top of sketch)
              if (page.showNorthArrow !== false) _drawPdfNorthArrow(pdf, W, margin);
              if (page.showScaleBar !== false) _drawPdfScaleBar(pdf, page.scaleDenom, page.units, W, H, margin, page.viewBox?.w, availW);
            } catch {
              if (tmp.parentNode) document.body.removeChild(tmp);
              pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
              pdf.text('(Sketch render failed)', W/2, contentY + drawH/2, { align: 'center' });
            }
          } else {
            pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
            pdf.text('(No drawing content)', W/2, contentY + drawH/2, { align: 'center' });
          }

        } else if (page.type === 'title') {
          // ── TITLE PAGE — professional cover sheet ────────────────────────────
          const contentY = _pdfPageHeader(pdf, page, meta, W, H, margin, F);
          const BRD2 = [200, 200, 200];
          const GD2  = [40,  40,  40];
          const GM2  = [120, 120, 120];
          const GL2  = [100, 100, 100];
          let ty = contentY + 6;

          // Helper: draw a titled field block with left accent bar
          function _titleField(lbl, val, opts = {}) {
            if (!val?.trim() || ty > H - margin - 16) return;
            const maxW = W - margin * 2 - 14;
            const lines = pdf.splitTextToSize(val.trim(), maxW);
            const lineH = opts.mono ? 5 : 4.8;
            const blockH = lines.length * lineH + 13;
            // Left accent bar
            pdf.setFillColor(...GM2);
            pdf.rect(margin + 2, ty, 2.5, blockH - 2, 'F');
            // Section label
            pdf.setFontSize(6); pdf.setFont('helvetica', 'bold');
            pdf.setTextColor(...GL2);
            pdf.text(lbl.toUpperCase(), margin + 8, ty + 5);
            // Value text — always helvetica for consistency
            pdf.setFontSize(10);
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(28, 28, 28);
            pdf.text(lines, margin + 8, ty + 10.5);
            // Bottom rule
            pdf.setDrawColor(...BRD2); pdf.setLineWidth(0.25);
            pdf.line(margin + 6, ty + blockH, W - margin - 4, ty + blockH);
            ty += blockH + 4;
          }

          // Instrument settings — compact 2-column grid
          function _instrBlock() {
            const instrItems = [
              ['PPM',       page.ppm         || '—'],
              ['Temp',      (page.temperature || '—') + ' °C'],
              ['Pressure',  (page.pressure    || '—') + ' hPa'],
              ['Prism K',   (page.prismConst  || '—') + ' mm'],
            ];
            if (ty > H - margin - 30) return;
            const blockH = 20;
            pdf.setFillColor(...GM2);
            pdf.rect(margin + 2, ty, 2.5, blockH - 2, 'F');
            pdf.setFontSize(6); pdf.setFont('helvetica', 'bold');
            pdf.setTextColor(...GL2);
            pdf.text('INSTRUMENT SETTINGS', margin + 8, ty + 5);
            const colW = (W - margin * 2 - 14) / 2;
            instrItems.forEach(([k, v], i) => {
              const col = i % 2, row = Math.floor(i / 2);
              const ix = margin + 8 + col * (colW + 2);
              const iy = ty + 11 + row * 5.5;
              pdf.setFontSize(6.5); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(...GM2);
              pdf.text(k + ':', ix, iy);
              pdf.setFont('helvetica', 'normal'); pdf.setTextColor(28, 28, 28);
              pdf.text(v, ix + 18, iy);
            });
            pdf.setDrawColor(...BRD2); pdf.setLineWidth(0.25);
            pdf.line(margin + 6, ty + blockH, W - margin - 4, ty + blockH);
            ty += blockH + 4;
          }

          _titleField('Location',                   page.location);
          _titleField('Crew & Responsibilities',    page.crew);
          _titleField('Equipment (Make, Model, S/N)', page.equipment, { mono: true });
          _titleField('Datum & Projection',         page.datum);
          _instrBlock();
          _titleField('Summary of Work',            page.summary);
          _titleField('Code List',                  page.codeList, { mono: true });
          _titleField('Digital File Names',         page.fileNames, { mono: true });

          if (ty === contentY + 6) {
            // Nothing was rendered — all fields empty
            pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
            pdf.text('(No data entered)', W/2, contentY + 20, { align: 'center' });
          }

        } else if (page.type === 'photo') {
          // ── PHOTOS PAGE — 2×2 grid ──────────────────────────────────────────
          const contentY = _pdfPageHeader(pdf, page, meta, W, H, margin, F);
          const pagePhotos = page.photos || [];
          if (pagePhotos.length === 0) {
            pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
            pdf.text('(No photos)', W/2, contentY + 20, { align: 'center' });
          } else {
            const urls = await resolvePhotoUrls(pagePhotos);
            const colGap = 6, rowGap = 8;
            const cellW = (W - margin * 2 - colGap) / 2;
            const maxImgH = 62, captH = 10;
            const cellH = maxImgH + captH;
            let pi = 0, isFirstPage = true;
            while (pi < pagePhotos.length) {
              if (!isFirstPage) pdf.addPage();
              isFirstPage = false;
              let py = contentY + 4;
              for (let row = 0; row < 2 && pi < pagePhotos.length; row++) {
                for (let col = 0; col < 2 && pi < pagePhotos.length; col++) {
                  const ph = pagePhotos[pi++];
                  const url = urls[ph.id];
                  const cx = margin + col * (cellW + colGap);
                  if (url) {
                    try {
                      const tmp = new Image();
                      await new Promise(res => { tmp.onload = res; tmp.onerror = res; tmp.src = url; });
                      const aspect = (tmp.naturalWidth || 4) / (tmp.naturalHeight || 3);
                      let imgW = cellW, imgH = imgW / aspect;
                      if (imgH > maxImgH) { imgH = maxImgH; imgW = imgH * aspect; }
                      pdf.addImage(url, 'JPEG', cx + (cellW - imgW) / 2, py, imgW, imgH);
                    } catch { /* skip unloadable */ }
                  }
                  if (ph.note?.trim()) {
                    pdf.setFontSize(7.5); pdf.setTextColor(60, 60, 60);
                    const captLines = pdf.splitTextToSize(ph.note.trim(), cellW).slice(0, 2);
                    captLines.forEach((ln, li) => {
                      pdf.text(ln, cx + cellW / 2, py + maxImgH + 4 + li * 4.5, { align: 'center' });
                    });
                  }
                }
                py += cellH + rowGap;
              }
            }
          }

        } else if (page.type === 'notes') {
          // ── NOTES PAGE ──────────────────────────────────────────────────────────
          const contentY = _pdfPageHeader(pdf, page, meta, W, H, margin, F);
          // Convert HTML to text, preserving paragraph/line breaks
          let rawHtml = page.notesHtml || '';
          rawHtml = rawHtml.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n')
                           .replace(/<\/div>/gi, '\n').replace(/<\/li>/gi, '\n')
                           .replace(/<\/h[1-6]>/gi, '\n').replace(/<[^>]+>/g, '');
          const entEl = document.createElement('textarea');
          entEl.innerHTML = rawHtml;
          const text = entEl.value.replace(/\n{3,}/g, '\n\n').trim();
          if (!text) {
            pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
            pdf.text('(No notes)', W/2, contentY + 20, { align: 'center' });
          } else {
            let ny = contentY + 6;
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(10);
            pdf.setTextColor(28, 28, 28);
            for (const para of text.split('\n')) {
              if (!para.trim()) { ny += 3; continue; }
              const wrapped = pdf.splitTextToSize(para, W - margin * 2);
              for (const ln of wrapped) {
                if (ny > H - margin - 14) { pdf.addPage(); ny = margin + 6; }
                pdf.text(ln, margin, ny);
                ny += 5.5;
              }
            }
          }

        } else {
          // DATA page
          const contentY = _pdfPageHeader(pdf, page, meta, W, H, margin, F);
          const cols = page.columns || [];
          const rows = page.rows || [];

          if (cols.length === 0) {
            pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
            pdf.text('(No columns defined)', W/2, contentY + 20, { align: 'center' });
          } else {
            const head = [cols.map(c => c.label || c.id)];
            const hfRes = evalDataPageCells(cols, rows);
            const body = rows.map(row => cols.map(col => {
              const raw = (row.cells || {})[col.id] || '';
              if (!raw.trim()) return '';
              const key = row.id + '_' + col.id;
              const cellType = getCellType(row, col);
              if (raw.startsWith('=')) return hfRes[key] || '';
              if (cellType === 'dms') return formatDMS(parseDMSInput(raw)) || raw;
              return raw;
            }));

            const typeColMap = cols.reduce((acc, col, i) => {
              acc[i] = { halign: col.colType === 'text' ? 'left' : 'center', font: F.mono };
              return acc;
            }, {});

            pdf.autoTable({
              head,
              body,
              startY: contentY + 2,
              margin: { left: margin, right: margin, bottom: margin + 14 },
              tableWidth: W - margin * 2,
              headStyles: {
                fillColor: GD, textColor: CR, fontSize: 8, fontStyle: 'bold',
                halign: 'center', cellPadding: { top: 3, bottom: 3, left: 3, right: 3 },
              },
              bodyStyles: {
                fontSize: 8, textColor: [44, 44, 44],
                cellPadding: { top: 2.5, bottom: 2.5, left: 3, right: 3 },
              },
              alternateRowStyles: { fillColor: [245, 245, 245] },
              columnStyles: typeColMap,
              didDrawPage: (data) => {
                // Page footer on each autoTable overflow page
                if (data.pageNumber > 1) {
                  // Re-draw the page header label for continuation pages
                  pdf.setFillColor(235, 235, 235);
                  pdf.rect(0, 0, W, 10, 'F');
                  pdf.setFontSize(7); pdf.setFont('helvetica', 'italic'); pdf.setTextColor(107, 114, 128);
                  pdf.text(`${displayTitle}  (continued)`, margin, 7);
                }
              },
            });

            // Row count footer
            pdf.setFontSize(7); pdf.setFont('helvetica', 'italic'); pdf.setTextColor(107, 114, 128);
            const finalY = pdf.lastAutoTable?.finalY;
            if (finalY && finalY < H - 14) {
              pdf.text(`${rows.length} row${rows.length !== 1 ? 's' : ''}  ·  ${cols.length} column${cols.length !== 1 ? 's' : ''}`, margin, finalY + 5);
            }
          }
        }

        // Notebook footer
        pdf.setDrawColor(200, 200, 200); pdf.setLineWidth(0.3);
        pdf.line(margin + 4, H - margin - 10, W - margin - 4, H - margin - 10);
        pdf.setFontSize(7); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(110, 110, 110);
        pdf.text(`P.${page.pageNumber}`, margin + 4, H - margin - 4);
        pdf.setFont('helvetica', 'normal'); pdf.setTextColor(150, 150, 150);
        pdf.text(`Exported  ${exportTs}`, W - margin - 4, H - margin - 4, { align: 'right' });
      }

      // ── DRAW TOC on page 2 ─────────────────────────────────────────────────
      pdf.setPage(2);

      // White background
      pdf.setFillColor(255, 255, 255);
      pdf.rect(0, 0, W, H, 'F');
      // Dark grey TOC header band
      pdf.setFillColor(50, 50, 50);
      pdf.roundedRect(margin, margin + 10, W - margin*2, 24, 4, 4, 'F');
      pdf.rect(margin, margin + 10 + 20, W - margin*2, 4, 'F');
      pdf.setFontSize(11); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(255, 255, 255);
      pdf.text('TABLE OF CONTENTS', W/2, margin + 25, { align: 'center' });
      pdf.setFontSize(7.5); pdf.setFont('helvetica', 'italic'); pdf.setTextColor(180, 180, 180);
      pdf.text(proj.name, W/2, margin + 20, { align: 'center' });

      let ty = margin + 46;
      tocEntries.forEach((entry, i) => {
        if (ty > H - margin - 20) return;

        // Alternate row shade
        if (i % 2 === 0) {
          pdf.setFillColor(246, 246, 246);
          pdf.rect(margin + 2, ty - 4.5, W - margin*2 - 4, 10, 'F');
        }

        // Type badge — grey
        pdf.setFillColor(220, 220, 220);
        pdf.roundedRect(margin + 4, ty - 3.5, 16, 7, 1.5, 1.5, 'F');
        pdf.setFontSize(6); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(80, 80, 80);
        pdf.text(entry.typeLabel.toUpperCase(), margin + 12, ty + 0.5, { align: 'center' });

        // P.n label
        pdf.setFontSize(7.5); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(40, 40, 40);
        pdf.text(`P.${entry.pageNum}`, margin + 24, ty + 0.5);

        // Title text
        pdf.setFontSize(10); pdf.setFont('helvetica', 'normal'); pdf.setTextColor(44, 44, 44);
        const maxTitleW = W - margin*2 - 60;
        const titleLine = pdf.splitTextToSize(entry.title, maxTitleW)[0];
        pdf.text(titleLine, margin + 36, ty + 0.5);

        // Leader dots
        const titleEndX = margin + 36 + pdf.getTextWidth(titleLine) + 2;
        const dotsEndX = W - margin - 16;
        if (titleEndX < dotsEndX) {
          pdf.setFontSize(7); pdf.setTextColor(180, 180, 180);
          let dx = titleEndX;
          while (dx < dotsEndX) { pdf.text('.', dx, ty + 0.5); dx += 2.4; }
        }

        // PDF page number
        pdf.setFontSize(10); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(40, 40, 40);
        pdf.text(String(entry.pdfPage), W - margin - 4, ty + 0.5, { align: 'right' });

        ty += 12;
      });

      // TOC footer
      pdf.setDrawColor(200, 200, 200); pdf.setLineWidth(0.3);
      pdf.line(margin + 4, H - margin - 10, W - margin - 4, H - margin - 10);
      pdf.setFontSize(6.5); pdf.setFont('helvetica', 'normal'); pdf.setTextColor(110, 110, 110);
      pdf.text(proj.name, margin + 4, H - margin - 4);
      pdf.text('2', W - margin - 4, H - margin - 4, { align: 'right' });

      // ── Save ──────────────────────────────────────────────────────────────
      const fname = `${proj.name.replace(/[^a-zA-Z0-9_-]/g, '_')}_fieldbook_${new Date().toISOString().split('T')[0]}.pdf`;
      pdf.save(fname);
      toast.success(`Exported ${fname}`);

    } catch (err) {
      console.error('[exportProjectPDF]', err);
      toast.error('PDF export failed — see console');
    } finally {
      setExporting(false);
    }
  }

  // Single-page PDF export — same format as the per-page section of exportProjectPDF
  // but outputs only the one page (no cover, no TOC).
  async function exportSinglePagePDF(projectId, pageId, toast, setExporting) {
    if (!window.jspdf?.jsPDF) { toast.error('PDF library not loaded'); return; }
    setExporting(true);
    try {
      const proj = DB.getProject(projectId);
      if (!proj) { toast.error('Project not found'); return; }
      const page = proj.pages.find(p => p.id === pageId);
      if (!page) { toast.error('Page not found'); return; }

      const { jsPDF } = window.jspdf;
      const W = 210, H = 297, margin = 14;
      const GD  = [40,  40,  40];
      const GM  = [110, 110, 110];
      const GL  = [160, 160, 160];
      const CR  = [255, 255, 255];
      const metaMap = {
        data:   { label: 'Data',   color: '#606060', bg: '#EEEEEE' },
        sketch: { label: 'Sketch', color: '#606060', bg: '#EEEEEE' },
        title:  { label: 'Title',  color: '#606060', bg: '#EEEEEE' },
        photo:  { label: 'Photos', color: '#606060', bg: '#EEEEEE' },
        notes:  { label: 'Notes',  color: '#606060', bg: '#EEEEEE' },
      };
      const meta = metaMap[page.type] || metaMap.data;
      const pdf  = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const F    = _initPDFFonts();
      const contentY = _pdfPageHeader(pdf, page, meta, W, H, margin, F);

      if (page.type === 'sketch') {
        // Grid covers full content area
        if (page.showGrid !== false) _drawPdfGrid(pdf, W, H, margin, contentY);
        const drawH = (H - margin - 14) - contentY;
        const svgStr = buildSketchSVG(page.shapes || [], page.layers, page.viewBox, page.scaleDenom, page.units, page.showDims !== false, true);
        if (svgStr && window.html2canvas) {
          const availW = W - margin*2;
          // Render at portrait proportions matching the PDF content area
          const pdfOutW = 1600;
          const pdfOutH = Math.round(pdfOutW * drawH / availW);
          const svgForPDF = svgStr.replace(/width="\d+" height="\d+"/, `width="${pdfOutW}" height="${pdfOutH}"`);
          const tmp = document.createElement('div');
          tmp.style.cssText = `position:fixed;left:-9999px;top:-9999px;width:${pdfOutW}px;height:${pdfOutH}px;overflow:hidden;background:transparent;`;
          tmp.innerHTML = svgForPDF;
          document.body.appendChild(tmp);
          try {
            const canvas = await window.html2canvas(tmp, { scale: 1.5, useCORS: true, logging: false, width: pdfOutW, height: pdfOutH, backgroundColor: null });
            document.body.removeChild(tmp);
            // Fill the entire content area
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, contentY, availW, drawH);
            // North arrow and scale bar drawn directly in PDF (on top of sketch)
            if (page.showNorthArrow !== false) _drawPdfNorthArrow(pdf, W, margin);
            if (page.showScaleBar !== false) _drawPdfScaleBar(pdf, page.scaleDenom, page.units, W, H, margin, page.viewBox?.w, availW);
          } catch (_) { document.body.removeChild(tmp); }
        }
      } else if (page.type === 'title') {
        // ── TITLE PAGE — professional cover sheet ──────────────────────────────
        const BRD2 = [200, 200, 200];
        const GM2  = [110, 110, 110];
        const GL2  = [100, 100, 100];
        let ty = contentY + 6;

        function _titleFieldSP(lbl, val, opts = {}) {
          if (!val?.trim() || ty > H - margin - 16) return;
          const maxW = W - margin * 2 - 14;
          const lines = pdf.splitTextToSize(val.trim(), maxW);
          const lineH = opts.mono ? 5 : 4.8;
          const blockH = lines.length * lineH + 13;
          pdf.setFillColor(...GM2);
          pdf.rect(margin + 2, ty, 2.5, blockH - 2, 'F');
          pdf.setFontSize(6); pdf.setFont('helvetica', 'bold');
          pdf.setTextColor(...GL2);
          pdf.text(lbl.toUpperCase(), margin + 8, ty + 5);
          pdf.setFontSize(10);
          pdf.setFont('helvetica', 'normal');
          pdf.setTextColor(28, 28, 28);
          pdf.text(lines, margin + 8, ty + 10.5);
          pdf.setDrawColor(...BRD2); pdf.setLineWidth(0.25);
          pdf.line(margin + 6, ty + blockH, W - margin - 4, ty + blockH);
          ty += blockH + 4;
        }

        function _instrBlockSP() {
          const instrItems = [
            ['PPM',       page.ppm         || '—'],
            ['Temp',      (page.temperature || '—') + ' °C'],
            ['Pressure',  (page.pressure    || '—') + ' hPa'],
            ['Prism K',   (page.prismConst  || '—') + ' mm'],
          ];
          if (ty > H - margin - 30) return;
          const blockH = 20;
          pdf.setFillColor(...GM2);
          pdf.rect(margin + 2, ty, 2.5, blockH - 2, 'F');
          pdf.setFontSize(6); pdf.setFont('helvetica', 'bold');
          pdf.setTextColor(...GL2);
          pdf.text('INSTRUMENT SETTINGS', margin + 8, ty + 5);
          const colW = (W - margin * 2 - 14) / 2;
          instrItems.forEach(([k, v], i) => {
            const col = i % 2, row = Math.floor(i / 2);
            const ix = margin + 8 + col * (colW + 2);
            const iy = ty + 11 + row * 5.5;
            pdf.setFontSize(6.5); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(...GM2);
            pdf.text(k + ':', ix, iy);
            pdf.setFont('helvetica', 'normal'); pdf.setTextColor(28, 28, 28);
            pdf.text(v, ix + 18, iy);
          });
          pdf.setDrawColor(...BRD2); pdf.setLineWidth(0.25);
          pdf.line(margin + 6, ty + blockH, W - margin - 4, ty + blockH);
          ty += blockH + 4;
        }

        _titleFieldSP('Location',                    page.location);
        _titleFieldSP('Crew & Responsibilities',     page.crew);
        _titleFieldSP('Equipment (Make, Model, S/N)', page.equipment, { mono: true });
        _titleFieldSP('Datum & Projection',          page.datum);
        _instrBlockSP();
        _titleFieldSP('Summary of Work',             page.summary);
        _titleFieldSP('Code List',                   page.codeList, { mono: true });
        _titleFieldSP('Digital File Names',          page.fileNames, { mono: true });
      } else if (page.type === 'notes') {
        let rawHtml = page.notesHtml || '';
        rawHtml = rawHtml.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n')
                         .replace(/<\/div>/gi, '\n').replace(/<\/li>/gi, '\n')
                         .replace(/<\/h[1-6]>/gi, '\n').replace(/<[^>]+>/g, '');
        const entEl2 = document.createElement('textarea');
        entEl2.innerHTML = rawHtml;
        const text = entEl2.value.replace(/\n{3,}/g, '\n\n').trim();
        if (!text) {
          pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
          pdf.text('(No notes)', W/2, contentY + 20, { align: 'center' });
        } else {
          let ny = contentY + 6;
          pdf.setFont('helvetica', 'normal');
          pdf.setFontSize(10);
          pdf.setTextColor(28, 28, 28);
          for (const para of text.split('\n')) {
            if (!para.trim()) { ny += 3; continue; }
            const wrapped = pdf.splitTextToSize(para, W - margin * 2);
            for (const ln of wrapped) {
              if (ny > H - margin - 14) { pdf.addPage(); ny = margin + 6; }
              pdf.text(ln, margin, ny);
              ny += 5.5;
            }
          }
        }
      } else {
        const cols = page.columns || [], rows = page.rows || [];
        if (cols.length === 0) {
          pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
          pdf.text('(No columns defined)', W/2, contentY + 20, { align: 'center' });
        } else {
          const head = [cols.map(c => c.label || c.id)];
          const hfRes = evalDataPageCells(cols, rows);
          const body = rows.map(row => cols.map(col => {
            const raw = (row.cells || {})[col.id] || '';
            if (!raw.trim()) return '';
            const key = row.id + '_' + col.id;
            const cellType = getCellType(row, col);
            if (raw.startsWith('=')) return hfRes[key] || '';
            if (cellType === 'dms') return formatDMS(parseDMSInput(raw)) || raw;
            return raw;
          }));
          pdf.autoTable({
            head, body, startY: contentY + 2,
            margin: { left: margin, right: margin, bottom: margin + 14 },
            tableWidth: W - margin*2,
            headStyles: { fillColor: GD, textColor: CR, fontSize: 8, fontStyle: 'bold', halign: 'center',
                          cellPadding: { top: 3, bottom: 3, left: 3, right: 3 } },
            bodyStyles: { fontSize: 8, textColor: [44, 44, 44],
                          cellPadding: { top: 2.5, bottom: 2.5, left: 3, right: 3 } },
            alternateRowStyles: { fillColor: [245, 245, 245] },
            columnStyles: cols.reduce((acc, col, i) => {
              acc[i] = { halign: col.colType === 'text' ? 'left' : 'center', font: F.mono };
              return acc;
            }, {}),
          });
          const fy = pdf.lastAutoTable?.finalY;
          if (fy && fy < H - 14) {
            pdf.setFontSize(7); pdf.setFont('helvetica', 'italic'); pdf.setTextColor(107, 114, 128);
            pdf.text(`${rows.length} row${rows.length !== 1 ? 's' : ''}  ·  ${cols.length} column${cols.length !== 1 ? 's' : ''}`, margin, fy + 5);
          }
        }
      }

      // Notebook footer — inside cream paper area
      const exportTsSP = new Date().toLocaleString('en-CA', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false,
      });
      pdf.setDrawColor(200, 200, 200); pdf.setLineWidth(0.3);
      pdf.line(margin + 4, H - margin - 10, W - margin - 4, H - margin - 10);
      pdf.setFontSize(7); pdf.setFont('helvetica', 'bold'); pdf.setTextColor(110, 110, 110);
      pdf.text(`P.${page.pageNumber}`, margin + 4, H - margin - 4);
      pdf.setFont('helvetica', 'normal'); pdf.setTextColor(150, 150, 150);
      pdf.text(`Exported  ${exportTsSP}`, W - margin - 4, H - margin - 4, { align: 'right' });

      const slug = (page.title?.trim() || `P${page.pageNumber}`).replace(/[^a-zA-Z0-9_-]/g, '_');
      const fname = `${proj.name.replace(/[^a-zA-Z0-9_-]/g, '_')}_${slug}_${new Date().toISOString().split('T')[0]}.pdf`;
      pdf.save(fname);
      toast.success(`Exported ${fname}`);
    } catch (err) {
      console.error('[exportSinglePagePDF]', err);
      toast.error('PDF export failed — see console');
    } finally {
      setExporting(false);
    }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // PROJECT VIEW
  // ─────────────────────────────────────────────────────────────────────────────

  const TYPE_META = {
    data:   { label: 'Data',   color: '#3C5445', bg: '#D2E8DA', Icon: () => <Ico.Table />  },
    sketch: { label: 'Sketch', color: '#3B82F6', bg: '#EFF6FF', Icon: () => <Ico.Grid />   },
    title:  { label: 'Title',  color: '#D97706', bg: '#FEF3C7', Icon: () => <Ico.File />   },
    photo:  { label: 'Photos', color: '#7C3AED', bg: '#EDE9FE', Icon: () => <Ico.Camera /> },
    points: { label: 'Points', color: '#0E7490', bg: '#E0F2FE', Icon: () => <Ico.Pin />    },
  };

  function ProjectView({ projectId }) {
    const [project, setProject] = useState(null);
    const [addStep, setAddStep] = useState(null); // null | 'type'
    const [editingCover, setEditingCover] = useState(false);
    const [coverForm, setCoverForm] = useState({});
    const [exporting, setExporting] = useState(false);
    const [showSettings,    setShowSettings]    = useState(false);
    const [pageActionTarget, setPageActionTarget] = useState(null); // page object
    const [pageExportTarget, setPageExportTarget] = useState(null); // page object
    const [pageCopyToTarget, setPageCopyToTarget] = useState(null); // page object
    const [copyFromOpen,     setCopyFromOpen]     = useState(false);
    const [importPageModal,  setImportPageModal]  = useState(null); // { fileData }
    const [pageChainTarget,  setPageChainTarget]  = useState(null); // page object
    const pageImportInputRef = useRef(null);
    const toast = useToast();

    function reload() { setProject(DB.getProject(projectId)); }
    useEffect(() => { reload(); }, [projectId]);

    function startEditCover() {
      setCoverForm({
        name:       project.name       || '',
        jobNumber:  project.jobNumber  || '',
        client:     project.client     || '',
        surveyor:   project.surveyor   || '',
        date:       project.date       || '',
      });
      setEditingCover(true);
    }

    function saveCover() {
      if (!coverForm.name.trim()) return;
      DB.updateProject(projectId, coverForm);
      reload();
      setEditingCover(false);
    }

    if (!project) return (
      <div className="flex flex-col h-full bg-fb-dark">
        <NavBar title="Project" onBack={() => navigate('#/')} />
        <div className="flex-1 flex items-center justify-center text-white/40 text-sm">Project not found.</div>
      </div>
    );

    function handleTypeSelect(type) {
      let pageData = { type };
      if (type === 'sketch') {
        // Inherit view settings from the most recent sketch page in this project
        // so new pages start with the same configuration as the last one worked on.
        // A brand-new project has no prior sketch pages, so defaults (all true, 1:1) apply.
        const prevSketch = [...(project.pages || [])].reverse().find(p => p.type === 'sketch');
        if (prevSketch) {
          pageData = {
            type: 'sketch',
            showGrid:      prevSketch.showGrid      !== false,
            showDims:      prevSketch.showDims      !== false,
            dimsOnDraw:    prevSketch.dimsOnDraw    !== false,
            showValueCard: prevSketch.showValueCard !== false,
            showScaleBar:  prevSketch.showScaleBar  !== false,
            showNorthArrow:prevSketch.showNorthArrow !== false,
            scaleDenom:    prevSketch.scaleDenom    || 1,
            units:         prevSketch.units         || 'm',
          };
        }
      }
      if (type === 'data') {
        // Each column now carries: id, label, colType ('text'|'num'|'dms'), width
        const cols = [
          { id: 'c1', label: 'Station', colType: 'text', width: 90 },
          { id: 'c2', label: 'BS',      colType: 'num',  width: 80 },
          { id: 'c3', label: 'HI',      colType: 'num',  width: 80 },
          { id: 'c4', label: 'FS',      colType: 'num',  width: 80 },
          { id: 'c5', label: 'Elev',    colType: 'num',  width: 80 },
          { id: 'c6', label: 'Notes',   colType: 'text', width: 120 },
        ];
        const rows = Array.from({ length: 20 }, (_, i) => {
          const cells = {};
          cols.forEach(c => { cells[c.id] = ''; });
          return { id: 'r_' + Date.now() + '_' + i, cells };
        });
        pageData = { type: 'data', columns: cols, rows };
      }
      if (type === 'title') {
        // Seed new title page from the most recent existing title page in this
        // project — crew, equipment, datum, etc. are almost always the same
        // day-to-day; the user just clears anything that changed rather than
        // re-entering everything from scratch.
        // Day-specific fields (title, summary, notes) are left blank.
        const prevTitle = [...(project.pages || [])].reverse().find(p => p.type === 'title');
        if (prevTitle) {
          pageData = {
            type:        'title',
            location:    prevTitle.location    || '',
            crew:        prevTitle.crew        || '',
            equipment:   prevTitle.equipment   || '',
            datum:       prevTitle.datum       || 'NAD83(CSRS), UTM Zone 20N / CGVD2013',
            ppm:         prevTitle.ppm         || '',
            temperature: prevTitle.temperature || '',
            pressure:    prevTitle.pressure    || '',
            prismConst:  prevTitle.prismConst  || '',
            codeList:    prevTitle.codeList    || '', // carry over — codes are project-wide
            // fileNames intentionally blank — different every session
          };
        }
      }
      if (type === 'notes') {
        pageData = { type: 'notes', notesHtml: '' };
      }
      if (type === 'photo') {
        pageData = { type: 'photo', photos: [] };
      }
      if (type === 'points') {
        // Fixed PNEZD columns — IDs must match PNEZD_COLS constants
        const cols = [
          { id: 'col_ptnum', label: 'Pt #',        colType: 'text', width: 70 },
          { id: 'col_north', label: 'Northing',    colType: 'num',  width: 100 },
          { id: 'col_east',  label: 'Easting',     colType: 'num',  width: 100 },
          { id: 'col_elev',  label: 'Elevation',   colType: 'num',  width: 100 },
          { id: 'col_desc',  label: 'Description', colType: 'text', width: 130 },
        ];
        // Rows start empty — they are added automatically when points are placed
        // on the sketch canvas (one row per placed point).
        pageData = { type: 'points', columns: cols, rows: [] };
      }
      const page = DB.addPage(projectId, pageData);
      if (page) { reload(); setAddStep(null); navigate(`#/project/${projectId}/page/${page.id}`); }
    }

    const pageCount = project.pages?.length || 0;

    return (
      <div className="flex flex-col h-full" style={{ background: '#3C5445' }}>
        <NavBar title={project.name}
          subtitle={project.jobNumber ? `Job #${project.jobNumber}` : undefined}
          onBack={() => navigate('#/')}
          actions={
            <>
              <button

            {editingCover ? (
              <>
                <div className="px-5 py-3 border-b border-fb-mid/30 flex items-center justify-between">
                  <p className="text-fb-light text-[10px] font-bold uppercase tracking-widest">Edit Project Info</p>
                  <div className="flex gap-2">
                    <button onClick={() => setEditingCover(false)}

                      Cancel

                    <button onClick={saveCover}
