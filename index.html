    });
    const [hf, setHf]                   = useState(null);
    const [calcResults, setCalcResults] = useState({});    // { 'r_xxx_cId': displayValue }
    const [selectionAnchor, setSelectionAnchor] = useState(null); // { rowIdx, colIdx }
    const [dragStartCol, setDragStartCol] = useState(null);
    const [dragOverCol,  setDragOverCol]  = useState(null);
    const [dragStartRow, setDragStartRow] = useState(null);
    const [dragOverRow,  setDragOverRow]  = useState(null);
    const [headerOpen, setHeaderOpen]       = useState(false);
    const [fillDragRow, setFillDragRow]     = useState(null); // row index the fill handle is dragged to
    const inputRef        = useRef(null);
    const fbInputRef      = useRef(null);
    const tableRef        = useRef(null);
    const pdfContainerRef = useRef(null);
    const colModalRef     = useRef(null);
    const templateModalRef = useRef(null);
    const tbMenuRef       = useRef(null); // ref on the open dropdown panel
    const copyAnchorRef   = useRef(null); // { rowIdx, colIdx } of top-left cell at last copy
    const isDraggingSelRef = useRef(false); // true while mouse-drag cell selection is active
    const fbFocusedRef     = useRef(false); // true while formula bar input has focus
    const fillDragRef      = useRef({ active: false, startRow: -1, startCol: -1 });
    const lpTimerRef       = useRef(null);  // long-press timer ID (touch only)
    const lpStartRef       = useRef(null);  // { x, y, ri, ci } at touch pointerdown
    useFocusTrap(colModalRef, !!colModal, () => setColModal(null));
    useFocusTrap(templateModalRef, templateModal, () => setTemplateModal(false));
    const toast = useToast();

    // Sync rows when page changes
    useEffect(() => { setRows(page.rows || []); }, [page.id]);

    // Reset drag-selection flag on global pointer-up (handles releases outside cells)
    useEffect(() => {
      const fn = () => { isDraggingSelRef.current = false; };
      document.addEventListener('pointerup', fn);
      return () => document.removeEventListener('pointerup', fn);
    }, []);

    // Close toolbar dropdown on outside click
    useEffect(() => {
      if (!openTbMenu) return;
      const fn = (e) => {
        if (tbMenuRef.current && !tbMenuRef.current.contains(e.target)) {
          setOpenTbMenu(null);
        }
      };
      document.addEventListener('pointerdown', fn, true);
      return () => document.removeEventListener('pointerdown', fn, true);
    }, [openTbMenu]);

    // Initialise / refresh HyperFormula whenever rows or columns change
    useEffect(() => {
      if (typeof HyperFormula === 'undefined') return;
      try {
        const sheetData = buildHFSheet(columns, rows);
        let instance;
        if (hf) {
          try { hf.destroy(); } catch(e) {}
        }
        instance = HyperFormula.buildFromArray(sheetData, {
          licenseKey: 'gpl-v3',
          precisionRounding: 10,
        });
        setHf(instance);
        // Compute display values for every cell
        const results = {};
        rows.forEach((row, ri) => {
          columns.forEach((col, ci) => {
            const raw = (row.cells || {})[col.id] || '';
            if (!raw.trim()) return;
            const cellType = getCellType(row, col);
            if (raw.startsWith('=')) {
              try {
                const val = instance.getCellValue({ sheet: 0, row: ri, col: ci });
                const key = row.id + '_' + col.id;

                if (typeof val === 'number') {
                  // Normal HF result
                  results[key] = cellType === 'dms' ? formatDMS(val) : String(Math.round(val * 1e8) / 1e8);

                } else if (val instanceof Error || (val && val.type)) {
                  // HF errored — could be our custom surveyor function → try JS evaluator
                  const custom = evalSurveyFormula(raw, instance);
                  if (custom !== null) {
                    results[key] = typeof custom === 'number'
                      ? (cellType === 'dms' ? formatDMS(custom) : String(Math.round(custom * 1e8) / 1e8))
                      : String(custom);          // propagate '#VALUE!' / '#DIV/0!' / '#ERR' strings
                  } else {
                    results[key] = '#ERR';
                  }

                } else {
                  results[key] = String(val ?? '');
                }
              } catch(e) {
                results[row.id + '_' + col.id] = '#ERR';
              }
            } else if (cellType === 'dms') {
              const dd = parseDMSInput(raw);
              if (dd !== null) results[row.id + '_' + col.id] = formatDMS(dd);
            }
          });
        });
        setCalcResults(results);
      } catch(e) {
        toast.error('Formula engine error — check cell values');
      }
    }, [rows, page.id]);

    function persistRows(updated) {
      setRows(updated);
      DB.updatePage(projectId, page.id, { rows: updated });
    }

    function persistColumns(updated) {
      DB.updatePage(projectId, page.id, { columns: updated });
      onReload();
    }

    // Compute the next sequential point number for a Points Data Page
    function nextPointNum(existingRows) {
      const nums = existingRows.map(r => parseInt(r.cells['col_ptnum'])).filter(n => !isNaN(n));
      return String(nums.length ? Math.max(...nums) + 1 : existingRows.length + 1);
    }

    function addRow() {
      const cells = {};
      columns.forEach(c => { cells[c.id] = ''; });
      if (page.type === 'points') cells['col_ptnum'] = nextPointNum(rows);
      const row = { id: 'r_' + Date.now(), cells };
      persistRows([...rows, row]);
    }

    function addRows(n) {
      const newRows = [];
      for (let i = 0; i < n; i++) {
        const cells = {};
        columns.forEach(c => { cells[c.id] = ''; });
        if (page.type === 'points') cells['col_ptnum'] = nextPointNum([...rows, ...newRows]);
        newRows.push({ id: 'r_' + Date.now() + '_' + i + '_' + Math.random().toString(36).slice(2), cells });
      }
      persistRows([...rows, ...newRows]);
    }

    function deleteRow(rowId) {
      if (page.type === 'points') {
        // Cross-page sync: remove this point from all sketch canvases and this data page
        window._fb?.deletePointPermanently?.(projectId, rowId);
        // Reload rows from DB since deletePointPermanently already updated this page
        const updated = DB.getPage(projectId, page.id);
        if (updated) { setRows(updated.rows || []); onReload(); }
        return;
      }
      persistRows(rows.filter(r => r.id !== rowId));
    }

    function updateCell(rowId, colId, val) {
      persistRows(rows.map(r => r.id === rowId ? { ...r, cells: { ...r.cells, [colId]: val } } : r));
    }

    // ── Cell interaction handlers ───────────────────────────────────────

    function colLetter(ci) {
      // A, B, C ... Z, AA, AB ...
      let s = '';
      let n = ci + 1;
      while (n > 0) { s = String.fromCharCode(64 + (n % 26 || 26)) + s; n = Math.floor((n - 1) / 26); }
      return s;
    }

    function cellRef(ri, ci) { return colLetter(ci) + (ri + 1); }

    // Inverse of colLetter — "A" → 0, "B" → 1, "AA" → 26, etc.
    function colLetterToIdx(s) {
      let n = 0;
      for (let i = 0; i < s.length; i++) n = n * 26 + (s.charCodeAt(i) - 64);
      return n - 1; // 0-based
    }

    // Adjust cell references in a formula by (dr rows, dc cols).
    // Absolute refs ($A or $1) are not moved.  Out-of-bounds refs are clamped to row 1 / col A.
    function adjustFormula(formula, dr, dc) {
      if (!formula || !formula.startsWith('=') || (dr === 0 && dc === 0)) return formula;
      return formula.replace(/(\$?)([A-Z]+)(\$?)(\d+)/g, (_, colAbs, colStr, rowAbs, rowStr) => {
        let newCol = colStr;
        let newRow = parseInt(rowStr, 10);
        if (!colAbs) {
          const newCI = Math.max(0, colLetterToIdx(colStr) + dc);
          newCol = colLetter(newCI);
        }
        if (!rowAbs) {
          newRow = Math.max(1, newRow + dr);
        }
        return `${colAbs}${newCol}${rowAbs}${newRow}`;
      });
    }

    // ── Auto-increment: "BM-1" → "BM-2", "TP3" → "TP4", "100" → "101" ──
    function autoIncrement(str) {
      const m = str.match(/^(.*?)(\d+)(\D*)$/);
      if (!m) return str;
      const [, pre, num, suf] = m;
      return pre + String(parseInt(num, 10) + 1).padStart(num.length, '0') + suf;
    }

    // Apply autoIncrement n times (for filling row at offset n from the source)
    function autoIncrementN(str, n) {
      let val = str;
      for (let i = 0; i < n; i++) val = autoIncrement(val);
      return val;
    }

    // ── Core fill engine used by both toolbar button and drag handle ──────
    // Fills rows [startRowIdx+1 … endRowIdx] in column colIdx.
    // Formulas: relative refs shift per-row; absolute refs stay fixed.
    // Plain values: trailing number auto-increments.
    function performFillDown(startRowIdx, colIdx, endRowIdx) {
      const col = columns[colIdx];
      const startRow = rows[startRowIdx];
      if (!col || !startRow) return;
      const startVal = (startRow.cells || {})[col.id] || '';
      if (!startVal.trim()) { toast.error('Starting cell is empty'); return; }
      const isFormula = startVal.startsWith('=');
      const count = endRowIdx - startRowIdx;
      const updated = rows.map((r, idx) => {
        if (idx <= startRowIdx || idx > endRowIdx) return r;
        const offset = idx - startRowIdx;
        const newVal = isFormula
          ? shiftFormulaDown(startVal, offset)
          : autoIncrementN(startVal, offset);
        return { ...r, cells: { ...r.cells, [col.id]: newVal } };
      });
      persistRows(updated);
      // Highlight the filled range so the user sees what was filled
      setSelectionAnchor({ rowIdx: startRowIdx, colIdx });
      setActiveCell({ rowIdx: endRowIdx, colIdx });
      toast.success(`Filled ${count} cell${count !== 1 ? 's' : ''}`);
    }

    // ── Toolbar "Fill ↓" — fills from active cell to last row ────────────
    function fillDown() {
      if (!activeCell) { toast.error('Select a starting cell first'); return; }
      const { rowIdx: ri, colIdx: ci } = activeCell;
      if (ri >= rows.length - 1) { toast.error('No rows below to fill'); return; }
      performFillDown(ri, ci, rows.length - 1);
    }

    // ── Cycle cell-reference type at cursor position (F4 behaviour) ───
    // A1 → $A$1 → A$1 → $A1 → A1
    function cycleFormulaRef(formula, cursor, callback) {
      if (!formula.startsWith('=')) return;
      const refRe = /(\$?)([A-Z]+)(\$?)(\d+)/g;
      let best = null, bestDist = Infinity, match;
      while ((match = refRe.exec(formula)) !== null) {
        const s = match.index, e2 = match.index + match[0].length;
        const dist = Math.min(Math.abs(cursor - s), Math.abs(cursor - e2));
        if (dist < bestDist) { bestDist = dist; best = { match, start: s, end: e2 }; }
      }
      if (!best) return;
      const { match: m, start, end } = best;
      const [, dc, col2, dr, row2] = m;
      const hasDC = dc === '$', hasDR = dr === '$';
      let nc, nr;
      if (!hasDC && !hasDR)    { nc = '$'; nr = '$'; }
      else if (hasDC && hasDR) { nc = '';  nr = '$'; }
      else if (!hasDC && hasDR){ nc = '$'; nr = '';  }
      else                     { nc = '';  nr = '';  }
      const newRef = nc + col2 + nr + row2;
      callback(formula.slice(0, start) + newRef + formula.slice(end), start + newRef.length);
    }

    function getSelectionBounds() {
      if (!activeCell) return null;
      const anchor = selectionAnchor || activeCell;
      return {
        minR: Math.min(activeCell.rowIdx, anchor.rowIdx),
        maxR: Math.max(activeCell.rowIdx, anchor.rowIdx),
        minC: Math.min(activeCell.colIdx, anchor.colIdx),
        maxC: Math.max(activeCell.colIdx, anchor.colIdx),
      };
    }

    function isInRange(ri, ci) {
      const b = getSelectionBounds();
      if (!b) return false;
      return ri >= b.minR && ri <= b.maxR && ci >= b.minC && ci <= b.maxC;
    }

    // ── Per-cell type override ────────────────────────────────────────
    // Sets (or clears) a cell-level colType override for the active selection.
    // Pass null to remove override and revert to column default.
    function setCellsType(type) {
      const b = getSelectionBounds();
      if (!b) return;
      const updated = rows.map((row, ri) => {
        if (ri < b.minR || ri > b.maxR) return row;
        const meta = { ...(row.cellMeta || {}) };
        columns.forEach((col, ci) => {
          if (ci < b.minC || ci > b.maxC) return;
          if (type === null) {
            delete meta[col.id];
          } else {
            meta[col.id] = { colType: type };
          }
        });
        return { ...row, cellMeta: meta };
      });
      persistRows(updated);
    }

    // Current effective type of the active cell (for badge display)
    const activeCellEffType = activeCell
      ? getCellType(rows[activeCell.rowIdx], columns[activeCell.colIdx])
      : null;
    // Whether the active cell has a per-cell override (so we can show a reset option)
    const activeCellHasOverride = activeCell
      ? !!(rows[activeCell.rowIdx]?.cellMeta?.[columns[activeCell.colIdx]?.id]?.colType)
      : false;

    function activateCell(ri, ci) {
      setActiveCell({ rowIdx: ri, colIdx: ci });
      setSelectionAnchor({ rowIdx: ri, colIdx: ci }); // always collapse on plain navigation
      const row = rows[ri];
      const col = columns[ci];
      if (!row || !col) return;
      const raw = (row.cells || {})[col.id] || '';
      setFormulaBarVal(raw);
      // Focus the table container so grid-level keyboard events fire
      setTimeout(() => { if (tableRef.current) tableRef.current.focus(); }, 0);
    }

    function startEdit(ri, ci) {
      const row = rows[ri];
      const col = columns[ci];
      if (!row || !col) return;
      const raw = (row.cells || {})[col.id] || '';
      setEditingCell({ rowIdx: ri, colIdx: ci });
      setEditValue(raw);
      setFormulaBarVal(raw);
      setTimeout(() => inputRef.current && inputRef.current.focus(), 0);
    }

    function commitEdit(ri, ci, val) {
      const row = rows[ri];
      const col = columns[ci];
      if (!row || !col) { setEditingCell(null); return; }
      // For DMS columns: if user typed space-separated numbers, keep as-is (raw storage)
      // The display layer will format it; HF gets the decimal equivalent
      updateCell(row.id, col.id, val.trim());
      setEditingCell(null);
      setFormulaBarVal(val.trim());
    }

    function handleCellKeyDown(e, ri, ci) {
      if (e.key === 'Enter' || e.key === 'Tab') {
        e.preventDefault();
        commitEdit(ri, ci, editValue);
        if (e.key === 'Tab') {
          const nextCi = e.shiftKey ? ci - 1 : ci + 1;
          if (nextCi >= 0 && nextCi < columns.length) { activateCell(ri, nextCi); startEdit(ri, nextCi); }
          else if (!e.shiftKey && ri + 1 < rows.length) { activateCell(ri + 1, 0); startEdit(ri + 1, 0); }
        } else {
          if (ri + 1 < rows.length) { activateCell(ri + 1, ci); startEdit(ri + 1, ci); }
        }
      } else if (e.key === 'Escape') {
        setEditingCell(null);
        setEditValue('');
      } else if (e.key === 'F4') {
        e.preventDefault();
        if (!editValue.startsWith('=')) return;
        const cursor = inputRef.current?.selectionStart ?? editValue.length;
        cycleFormulaRef(editValue, cursor, (newVal, newCursor) => {
          setEditValue(newVal);
          setFormulaBarVal(newVal);
          requestAnimationFrame(() => {
            if (inputRef.current) {
              inputRef.current.focus();
              inputRef.current.setSelectionRange(newCursor, newCursor);
            }
          });
        });
      }
    }

    // ── Grid-level keyboard handler (fires when a cell is selected but NOT in edit mode) ──
    function handleGridKeyDown(e) {
      if (e.target.tagName === 'INPUT') return;
      if (!activeCell) return;
      const { rowIdx: ri, colIdx: ci } = activeCell;

      // ── Ctrl+C / Cmd+C ── Copy selection
      if ((e.ctrlKey || e.metaKey) && e.key === 'c') { e.preventDefault(); copyCells(); return; }

      // ── Ctrl+X / Cmd+X ── Cut selection
      if ((e.ctrlKey || e.metaKey) && e.key === 'x') { e.preventDefault(); cutCells(); return; }

      // ── Ctrl+V / Cmd+V ── Let the browser fire the native paste event, handled by handleGridPaste
      // (Do NOT call e.preventDefault() here — that would block the paste event from firing)

      // ── Delete / Backspace ── Clear all cells in selection range
      if (e.key === 'Delete' || e.key === 'Backspace') {
        e.preventDefault();
        const b = getSelectionBounds();
        if (!b) return;
        const updated = rows.map((row, r) => {
          if (r < b.minR || r > b.maxR) return row;
          const newCells = { ...row.cells };
          for (let c = b.minC; c <= b.maxC; c++) {
            const col = columns[c];
            if (col) newCells[col.id] = '';
          }
          return { ...row, cells: newCells };
        });
        persistRows(updated);
        setFormulaBarVal('');
        return;
      }

      // ── Enter / Shift+Enter ── Vertical navigation, collapse selection
      if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        if (e.shiftKey) { if (ri - 1 >= 0) activateCell(ri - 1, ci); }
        else            { if (ri + 1 < rows.length) activateCell(ri + 1, ci); }
        return;
      }

      // ── Tab / Shift+Tab ── Horizontal navigation with row wrap, collapse selection
      if (e.key === 'Tab') {
        e.preventDefault();
        if (e.shiftKey) {
          if (ci - 1 >= 0)      activateCell(ri, ci - 1);
          else if (ri - 1 >= 0) activateCell(ri - 1, columns.length - 1);
        } else {
          if (ci + 1 < columns.length) activateCell(ri, ci + 1);
          else if (ri + 1 < rows.length) activateCell(ri + 1, 0);
        }
        return;
      }

      // ── Arrow keys ── Navigate; Shift extends selection, plain collapses it
      if (['ArrowDown','ArrowUp','ArrowRight','ArrowLeft'].includes(e.key)) {
        e.preventDefault();
        let newRi = ri, newCi = ci;
        if (e.key === 'ArrowDown'  && ri + 1 < rows.length)    newRi = ri + 1;
        if (e.key === 'ArrowUp'    && ri - 1 >= 0)             newRi = ri - 1;
        if (e.key === 'ArrowRight' && ci + 1 < columns.length) newCi = ci + 1;
        if (e.key === 'ArrowLeft'  && ci - 1 >= 0)             newCi = ci - 1;
        if (newRi === ri && newCi === ci) return;
        if (e.shiftKey) {
          // Extend: anchor stays, focus moves
          if (!selectionAnchor) setSelectionAnchor({ rowIdx: ri, colIdx: ci });
          setActiveCell({ rowIdx: newRi, colIdx: newCi });
          const row2 = rows[newRi], col2 = columns[newCi];
          if (row2 && col2) setFormulaBarVal((row2.cells || {})[col2.id] || '');
          setTimeout(() => { if (tableRef.current) tableRef.current.focus(); }, 0);
        } else {
          activateCell(newRi, newCi);
        }
        return;
      }

      // ── F2 ── Enter edit mode keeping existing value
      if (e.key === 'F2') {
        e.preventDefault();
        startEdit(ri, ci);
        return;
      }

      // ── Printable character ── Enter edit mode, pre-fill with typed char
      // (Ctrl+V does NOT reach here — it is handled by handleGridPaste via the native paste event)
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        const row = rows[ri];
        const col = columns[ci];
        if (!row || !col) return;
        setEditingCell({ rowIdx: ri, colIdx: ci });
        setEditValue(e.key);
        setFormulaBarVal(e.key);
        setTimeout(() => {
          if (inputRef.current) {
            inputRef.current.focus();
            inputRef.current.setSelectionRange(1, 1);
          }
        }, 0);
      }
    }

    // ── Grid paste handler — uses the native paste event so clipboard data is always available ──
    // This is more reliable than navigator.clipboard.readText() which requires document focus
    // and can silently fail after re-renders / async state updates.
    function handleGridPaste(e) {
      if (e.target.tagName === 'INPUT') return; // cell in edit mode — let browser paste into the input
      if (!activeCell) return;
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData)?.getData('text') || '';
      if (!text) return;
      const { rowIdx: ri, colIdx: ci } = activeCell;
      const lines = text.trimEnd().split('\n').map(l => l.split('\t'));
      const startR = ri, startC = ci;
      let updatedRows = [...rows];
      const needed = startR + lines.length - updatedRows.length;
      if (needed > 0) {
        for (let i = 0; i < needed; i++) {
          const cells = {};
          columns.forEach(c => { cells[c.id] = ''; });
          updatedRows.push({ id: 'r_' + Date.now() + '_' + i + '_' + Math.random().toString(36).slice(2), cells });
        }
      }
      const anchor = copyAnchorRef.current;
      const dr = anchor ? startR - anchor.rowIdx : 0;
      const dc = anchor ? startC - anchor.colIdx : 0;
      updatedRows = updatedRows.map((row, r) => {
        const li = r - startR;
        if (li < 0 || li >= lines.length) return row;
        const newCells = { ...row.cells };
        lines[li].forEach((val, ci2) => {
          const col = columns[startC + ci2];
          if (!col) return;
          // Adjust relative formula references if pasting from an in-app copy
          const adjusted = (dr !== 0 || dc !== 0) && val.startsWith('=')
            ? adjustFormula(val, dr, dc) : val;
          newCells[col.id] = adjusted;
        });
        return { ...row, cells: newCells };
      });
      persistRows(updatedRows);
    }

    // ── Copy / Cut / Paste — also called from toolbar buttons ────────────────
    function copyCells() {
      const b = getSelectionBounds();
      if (!b) return;
      // Store anchor so paste can adjust relative formula references
      copyAnchorRef.current = { rowIdx: b.minR, colIdx: b.minC };
      const lines = [];
      for (let r = b.minR; r <= b.maxR; r++) {
        const row = rows[r];
        if (!row) continue;
        const cells = [];
        for (let c = b.minC; c <= b.maxC; c++) {
          const col = columns[c];
          if (!col) { cells.push(''); continue; }
          const raw = (row.cells || {})[col.id] || '';
          if (raw.startsWith('=')) {
            // Always copy raw formula — relative adjustment happens on paste
            cells.push(raw);
          } else if (getCellType(row, col) === 'dms' && raw.trim()) {
            // Non-formula DMS: copy as displayed (e.g. 45°30'15") not Excel colon format
            cells.push(displayValue(row, col).text || raw);
          } else {
            cells.push(raw);
          }
        }
        lines.push(cells.join('\t'));
      }
      navigator.clipboard.writeText(lines.join('\n')).catch(() => {});
      toast.success('Copied');
    }

    function cutCells() {
      copyCells();
      const b = getSelectionBounds();
      if (!b) return;
      const updated = rows.map((row, r) => {
        if (r < b.minR || r > b.maxR) return row;
        const newCells = { ...row.cells };
        for (let c = b.minC; c <= b.maxC; c++) {
          const col = columns[c];
          if (col) newCells[col.id] = '';
        }
        return { ...row, cells: newCells };
      });
      persistRows(updated);
    }

    async function pasteCells() {
      if (!activeCell) { toast.error('Select a cell first'); return; }
      try {
        const text = await navigator.clipboard.readText();
        if (!text) return;
        const { rowIdx: ri, colIdx: ci } = activeCell;
        const lines = text.trimEnd().split('\n').map(l => l.split('\t'));
        let updatedRows = [...rows];
        const needed = ri + lines.length - updatedRows.length;
        if (needed > 0) {
          for (let i = 0; i < needed; i++) {
            const cells = {};
            columns.forEach(c => { cells[c.id] = ''; });
            updatedRows.push({ id: 'r_' + Date.now() + '_' + i + '_' + Math.random().toString(36).slice(2), cells });
          }
        }
        const anchor = copyAnchorRef.current;
        const dr = anchor ? ri - anchor.rowIdx : 0;
        const dc = anchor ? ci - anchor.colIdx : 0;
        updatedRows = updatedRows.map((row, r) => {
          const li = r - ri;
          if (li < 0 || li >= lines.length) return row;
          const newCells = { ...row.cells };
          lines[li].forEach((val, ci2) => {
            const col = columns[ci + ci2];
            if (!col) return;
            // Adjust relative formula references if pasting from an in-app copy
            const adjusted = (dr !== 0 || dc !== 0) && val.startsWith('=')
              ? adjustFormula(val, dr, dc) : val;
            newCells[col.id] = adjusted;
          });
          return { ...row, cells: newCells };
        });
        persistRows(updatedRows);
      } catch(err) {
        toast.error('Paste failed — allow clipboard access in browser settings');
      }
    }

    function handleFormulaBarCommit(e) {
      if (e.key === 'Enter' && activeCell) {
        const { rowIdx: ri, colIdx: ci } = activeCell;
        const row = rows[ri]; const col = columns[ci];
        if (row && col) {
          updateCell(row.id, col.id, formulaBarVal.trim());
          setEditingCell(null);

          setFormulaBarVal(orig);

      } else if (e.key === 'F4') {
        e.preventDefault();
        const cursor = fbInputRef.current?.selectionStart ?? formulaBarVal.length;
        cycleFormulaRef(formulaBarVal, cursor, (newVal, newCursor) => {

    // ── CSV Import (Points pages only) ──────────────────────────────────

    function importPointsCSV() {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.csv,.txt';
      inp.onchange = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const text = ev.target.result;
            // Split into lines, remove blank lines
            const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);
            if (!lines.length) { toast.error('CSV file appears to be empty'); return; }
            // Parse each line: split on comma or tab, strip surrounding quotes
            const parsed = lines.map(line => {
              const sep = line.includes('\t') ? '\t' : ',';
              return line.split(sep).map(c => c.trim().replace(/^["']|["']$/g, ''));
            });
            // Skip header row if first cell looks like a column name
            const first = (parsed[0][0] || '').toLowerCase();
            const isHeader = isNaN(Number(first)) || ['pt','point','p#','#','no','num','id'].some(h => first.startsWith(h));
            const dataRows = isHeader ? parsed.slice(1) : parsed;
            if (!dataRows.length) { toast.error('No data rows found after header'); return; }
            // Map columns positionally: [ptNum, northing, easting, elev, desc]
            const colMap = ['col_ptnum','col_north','col_east','col_elev','col_desc'];
            const newRows = dataRows.map((cols, i) => {
              const cells = {};
              columns.forEach(c => { cells[c.id] = ''; });
              colMap.forEach((cid, ci) => { if (cols[ci] != null) cells[cid] = cols[ci]; });
              // If no pt number in CSV, auto-number based on existing + position
              if (!cells['col_ptnum']) cells['col_ptnum'] = nextPointNum([...rows, ...newRows.slice(0, i)]);
              return { id: 'r_' + (Date.now() + i), cells };
            });
            persistRows([...rows, ...newRows]);
            toast.success(`Imported ${newRows.length} point${newRows.length !== 1 ? 's' : ''}`);
          } catch(err) {
            toast.error('Failed to parse CSV: ' + (err.message || 'unknown error'));
          }
        };
        reader.readAsText(file);
      };
      inp.click();
    }

    // ── CSV Import (generic data pages) ─────────────────────────────────────
    function parseCSV(text) {
      const lines = text.split(/\r?\n/);
      const result = [];
      for (const line of lines) {
        if (!line.trim()) continue;
        const row = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQ && line[i+1] === '"') { cur += '"'; i++; }
            else inQ = !inQ;
          } else if (ch === ',' && !inQ) {
            row.push(cur.trim()); cur = '';
          } else {
            cur += ch;
          }
        }
        row.push(cur.trim());
        result.push(row);
      }
      return result;
    }

    function exportCSV() {

      const header = columns.map(c => esc(c.label || c.id));
      const dataRows = rows.map(row => columns.map(col => {

        const key = row.id + '_' + col.id;

          // DMS cells: export as DD:MM:SS (Excel-compatible colon format)

      }).map(esc).join(','));

      if (!window.html2canvas || !window.jspdf) {

      const el = pdfContainerRef.current;
      if (!el) return;
      const toolbar = el.querySelector('.dp-toolbar');

      const origToolbar = toolbar?.style.display;
      const origFormula = formulaBar?.style.display;
      const origOverflow = el.style.overflow;
      const origHeight = el.style.height;
      if (toolbar) toolbar.style.display = 'none';
      if (formulaBar) formulaBar.style.display = 'none';
      el.style.overflow = 'visible';
      el.style.height = 'auto';
      try {
        const canvas = await window.html2canvas(el, { scale: 2, useCORS: true, logging: false });
        const { jsPDF } = window.jspdf;
        const imgW = canvas.width / 2;
        const imgH = canvas.height / 2;
        const orientation = imgW > imgH ? 'landscape' : 'portrait';
        const pdf = new jsPDF({ orientation, unit: 'px', format: [imgW, imgH] });
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, imgW, imgH);
        pdf.save(`${(page.label || 'data').replace(/[^a-zA-Z0-9_-]/g, '_')}_${new Date().toISOString().split('T')[0]}.pdf`);
        toast.success('PDF saved');
      } catch {
        toast.error('PDF export failed');

        if (toolbar) toolbar.style.display = origToolbar;
        if (formulaBar) formulaBar.style.display = origFormula;
        el.style.overflow = origOverflow;
        el.style.height = origHeight;
