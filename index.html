<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3C5445" />
  <meta name="description" content="Digital field notebook for land surveyors" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FieldBook" />
  <title>FieldBook</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />

  <!-- Field Book Design System Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Oswald:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fb: {
              // ── Design system tokens ────────────────────────────
              page:           '#F5F0E3',
              'page-alt':     '#EBE5D5',
              'page-deep':    '#E0D9C8',
              'grid-blue':    '#9BBCD0',
              border:         '#CEC5B0',
              ink:            '#1A1A1A',
              'ink-muted':    '#5A5248',
              'ink-faint':    '#9A908A',
              cover:          '#3C5445',
              heading:        '#3C5445',
              accent:         '#4E7864',
              'accent-light': '#7AAE94',
              'accent-pale':  '#D2E8DA',
              error:          '#B83C3C',
              // ── Legacy aliases (keep until all classes migrated) ─
              dark:    '#3C5445',
              mid:     '#4E7864',
              light:   '#7AAE94',
              pale:    '#D2E8DA',
              cream:   '#F5F0E3',
              cream2:  '#EBE5D5',
              text:    '#1A1A1A',
              muted:   '#5A5248',
            }
          },
          fontFamily: {
            data:        ['"Share Tech Mono"', '"Courier New"', 'monospace'],
            heading:     ['Oswald', '"Segoe UI"', 'sans-serif'],
            handwritten: ['Caveat', '"Patrick Hand"', 'cursive'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hyperformula@2.6.1/dist/hyperformula.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-core.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #3C5445;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── Ruled notebook paper ──────────────────────────────────── */
    .page-ruled {
      background-color: #F5F0E3;
      background-image: linear-gradient(
        transparent calc(32px - 1px),
        rgba(184,168,138,0.50) calc(32px - 1px),
        rgba(184,168,138,0.50) 32px,
        transparent 32px
      );
      background-size: 100% 32px;
    }

    /* ── Fine blue engineering grid ────────────────────────────── */
    .page-grid-blue {
      background-color: #F5F0E3;
      background-image:
        linear-gradient(rgba(155,188,208,0.40) 1px, transparent 1px),
        linear-gradient(90deg, rgba(155,188,208,0.40) 1px, transparent 1px),
        linear-gradient(rgba(155,188,208,0.20) 1px, transparent 1px),
        linear-gradient(90deg, rgba(155,188,208,0.20) 1px, transparent 1px);
      background-size: 25mm 25mm, 25mm 25mm, 5mm 5mm, 5mm 5mm;
    }

    /* ── Fieldbook data table ───────────────────────────────────── */
    .fb-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
      font-size: 13px;
    }
    .fb-table th {
      background: rgba(245,240,227,0.97);
      border-bottom: 2px solid #4E7864;
      border-right: 1px solid rgba(178,162,138,0.50);
      padding: 7px 5px 5px;
      text-align: center;
      font-family: 'Oswald', 'Segoe UI', sans-serif;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      color: #3C5445;
      letter-spacing: 0.09em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .fb-table th:last-child { border-right: none; }
    .fb-table td {
      padding: 0;
      border-right: 1px solid rgba(178,162,138,0.38);
      border-bottom: 1px solid rgba(178,162,138,0.55);
      text-align: center;
      color: #1A1A1A;
      vertical-align: middle;
      height: 32px;
    }
    .fb-table td:last-child { border-right: none; }
    .fb-table td.td-action { width: 32px; }
    .fb-table tr:nth-child(even) td { background: rgba(206,197,176,0.14); }
    .fb-table td > input {
      display: block;
      width: 100%;
      height: 32px;
      padding: 0 5px;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Caveat', cursive;
      font-size: 16px;
      text-align: center;
      color: #1A1A1A;
      -webkit-appearance: none;
    }
    .fb-table td > input:focus { background: rgba(78,120,100,0.08); }
    .fb-table td > span {
      display: block;
      height: 32px;
      line-height: 32px;
      padding: 0 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Red left-margin line (fieldbook look) ──────────────────── */
    .page-margin-rule {
      border-left: 3px solid rgba(200,72,72,0.22);
      margin-left: 32px;
    }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CEC5B0; border-radius: 3px; }

    /* ── Enhanced Data Page ──────────────────────────────────────── */
    .dp-formula-bar {
      background: #EBE5D5;
      border-bottom: 1.5px solid #CEC5B0;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
      min-height: 34px;
      flex-shrink: 0;
    }
    .dp-formula-bar .cell-ref {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #3C5445;
      min-width: 36px;
      text-align: center;
      background: rgba(60,84,69,0.08);
      border-radius: 4px;
      padding: 2px 5px;
      flex-shrink: 0;
    }
    .dp-formula-bar .fx-label {
      font-size: 12px;
      color: #9A908A;
      font-style: italic;
      flex-shrink: 0;
    }
    .dp-formula-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      color: #1A1A1A;
      min-width: 0;
    }
    .dp-cell-active {
      background: rgba(78,120,100,0.10) !important;
      outline: 2px solid #4E7864;
      outline-offset: -1px;
      z-index: 1;
      position: relative;
    }
    .dp-cell-formula {
      color: #3C5445 !important;
      font-style: italic;
    }
    .dp-cell-dms {
      color: #1a3a8c !important;
    }
    .dp-cell-error {
      color: #dc2626 !important;
      font-size: 11px;
    }
    .dp-col-header {
      cursor: pointer;
      user-select: none;
    }
    .dp-col-header:hover { background: rgba(78,120,100,0.08) !important; }
    .dp-col-header.active-col { background: rgba(78,120,100,0.15) !important; color: #2A3D32 !important; }
    .dp-row-num {
      width: 28px;
      min-width: 28px;
      max-width: 28px;
      text-align: center;
      font-size: 10px;
      color: #9A908A;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      background: #EBE5D5;
      border-right: 1.5px solid #CEC5B0 !important;
      padding: 0 2px;
      cursor: default;
      user-select: none;
    }
    .dp-row-num.active-row { background: rgba(78,120,100,0.12); color: #3C5445; font-weight: 700; }
    .dp-toolbar {
      background: #EBE5D5;
      border-bottom: 1.5px solid #CEC5B0;
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap;
      align-items: center;
      padding: 4px 8px;
      gap: 4px;
      flex-shrink: 0;
    }
    .dp-toolbar::-webkit-scrollbar { display: none; }
    .dp-toolbar button {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 5px;
      border: 1px solid #CEC5B0;
      background: #F5F0E3;
      color: #1A1A1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .dp-toolbar button:active { background: #D2E8DA; border-color: #4E7864; }
    .dp-toolbar .dp-drop-btn {
      display: flex; align-items: center; gap: 4px;
      background: #F5F0E3; border: 1px solid #CEC5B0; border-radius: 6px;
      padding: 4px 10px; font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1A1A1A; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .dp-toolbar .dp-drop-btn.active { background: #D2E8DA; border-color: #4E7864; color: #3C5445; }
    .dp-toolbar .dp-drop-btn:active { background: #D2E8DA; border-color: #4E7864; }
    .dp-toolbar .dp-tb-sep { width: 1px; height: 18px; background: #CEC5B0; margin: 0 2px; flex-shrink: 0; }
    /* Dropdown panel */
    .dp-drop-panel {
      position: fixed; z-index: 500;
      background: #F5F0E3; border-radius: 10px; min-width: 170px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.16); padding: 5px;
      border: 1px solid #CEC5B0;
    }
    .dp-drop-panel button {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 8px 12px; border-radius: 7px; text-align: left;
      font-size: 12.5px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: none; border: none; color: #1A1A1A; cursor: pointer;
      white-space: nowrap;
    }
    .dp-drop-panel button:active { background: #D2E8DA; }
    .dp-drop-panel .dp-drop-sep {
      height: 1px; background: #CEC5B0; margin: 4px 6px;
    }
    .dp-drop-panel .dp-drop-section {
      font-size: 9px; color: #9A908A; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 6px 12px 2px;
    }
    .dp-drop-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 8px 12px; border-radius: 7px;
      font-size: 12.5px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: none; border: none; color: #1A1A1A; cursor: pointer;
      gap: 12px;
    }
    .dp-drop-toggle:active { background: #D2E8DA; }
    .dp-drop-toggle-pill {
      display: inline-flex; align-items: center; gap: 0;
      border-radius: 20px; overflow: hidden; border: 1.5px solid #CEC5B0;
      flex-shrink: 0; font-size: 9.5px; font-weight: 700;
    }
    .dp-drop-toggle-pill span {
      padding: 2px 8px; transition: background 0.15s, color 0.15s;
    }
    .dp-drop-toggle-pill span.on  { background: #4E7864; color: white; }
    .dp-drop-toggle-pill span.off { background: #F5F0E3; color: #9A908A; }
    .dp-col-type-badge {
      display: inline-block;
      font-size: 8px;
      padding: 0 3px;
      border-radius: 3px;
      margin-left: 3px;
      vertical-align: middle;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .dp-col-type-dms  { background: #dbeafe; color: #1d4ed8; }
    .dp-col-type-num  { background: #d1fae5; color: #065f46; }
    .dp-col-type-text { background: #f3f4f6; color: #6b7280; }
    .dp-sum-row td {
      background: #EBE5D5 !important;
      font-weight: 700;
      border-top: 2px solid #4E7864 !important;
      font-size: 12px;
    }
    /* ── Multi-cell selection ─────────────────────────────────── */
    .dp-cell-selected {
      background: rgba(78,120,100,0.07) !important;
    }
    /* ── Drag-and-drop visual feedback ───────────────────────── */
    th.dp-drag-over-col {
      border-left: 2px solid #4E7864 !important;
      background: rgba(78,120,100,0.12) !important;
    }
    .dp-row-num.dp-drag-over-row {
      border-top: 2px solid #4E7864 !important;
      background: rgba(78,120,100,0.10) !important;
      color: #3C5445 !important;
    }
    .dp-col-header[draggable="true"] { cursor: grab; }
    .dp-col-header[draggable="true"]:active { cursor: grabbing; }
    .dp-row-num[draggable="true"] { cursor: grab; }
    .dp-row-num[draggable="true"]:active { cursor: grabbing; }
    /* ── Animations ─────────────────────────────────────────────── */
    .screen-enter { animation: slideUp 0.18s ease-out; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Modal ──────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(2px);
      z-index: 50;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-sheet {
      background: #F5F0E3;
      width: 100%; max-width: 600px;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 40px;
      animation: sheetUp 0.22s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* ── Double-page spread ─────────────────────────────────────── */
    .double-spread {
      display: flex;
      flex-direction: row;
      height: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .spread-panel {
      flex: 0 0 min(calc(100vw - 32px), 480px);
      height: 100%;
      overflow-y: auto;
      scroll-snap-align: start;
      border-right: 2px solid #CEC5B0;
    }
    .spread-panel:last-child { border-right: none; }

    /* ── Header strip ───────────────────────────────────────────── */
    .page-header-strip {
      background: #EBE5D5;
      border-bottom: 2px solid #4E7864;
    }
    .page-header-strip input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(178,162,138,0.5);
      outline: none;
      font-family: 'Caveat', cursive;
      font-size: 15px;
      color: #1A1A1A;
      width: 100%;
      padding: 1px 0;
    }

    /* ── DMS Numpad ──────────────────────────────────────────────── */
    .dp-numpad {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #3C5445;
      border-top: 2px solid #4E7864;
      padding: 8px 8px max(20px, env(safe-area-inset-bottom));
      z-index: 9980;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.42);
    }
    .dp-numpad-preview {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 18px;
      color: #D2E8DA;
      text-align: right;
      padding: 3px 12px;
      margin-bottom: 6px;
      background: rgba(0,0,0,0.28);
      border-radius: 7px;
      min-height: 34px;
      line-height: 34px;
      letter-spacing: 0.04em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dp-numpad-preview.empty { color: rgba(210,232,218,0.30); }
    .dp-numpad-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 5px;
    }
    .dp-numpad-btn {
      height: 54px;
      border: none;
      border-radius: 10px;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-weight: 700;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
    .dp-numpad-btn:active { opacity: 0.65; }
    .dp-numpad-btn.digit   { background: rgba(255,255,255,0.10); font-size: 20px; }
    .dp-numpad-btn.sym     { background: #4E7864; font-size: 17px; }
    .dp-numpad-btn.special { background: rgba(255,255,255,0.06); font-size: 15px; }
    .dp-numpad-btn.del     { background: rgba(127,29,29,0.7); font-size: 18px; }
    .dp-numpad-btn.confirm { background: #7AAE94; font-size: 17px; }
    .dp-numpad-space {
      width: 100%; height: 46px;
      border: none; border-radius: 10px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.55);
      font-size: 13px; letter-spacing: 0.12em;
      cursor: pointer; font-family: 'Share Tech Mono', 'Courier New', monospace;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; user-select: none;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .dp-numpad-space:active { opacity: 0.6; }
    .dp-numpad-dismiss {
      display: block; width: 100%;
      background: transparent; border: none;
      color: rgba(255,255,255,0.28); font-size: 11px;
      padding: 3px; cursor: pointer; font-family: sans-serif;
    }
    /* ── Fill handle (drag-down to fill/copy) ───────────────────────── */
    .dp-fill-handle {
      position: absolute;
      bottom: -1px; right: -1px;
      width: 8px; height: 8px;
      background: #4E7864;
      border: 1.5px solid white;
      border-radius: 1px;
      cursor: crosshair;
      z-index: 10;
      touch-action: none;
      user-select: none;
    }
    /* Preview highlight for cells that will be filled during a handle drag */
    .dp-cell-fill-preview {
      background: rgba(122,174,148,0.13) !important;
      outline: 1px dashed #7AAE94 !important;
      outline-offset: -1px !important;
    }

    /* ── Formula reference chips ─────────────────────────────────── */
    .dp-ref-chips {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 3px 8px 3px;
      background: #EBE5D5;
      border-bottom: 1px solid #CEC5B0;
      flex-shrink: 0;
      min-height: 24px; align-items: center;
    }

    /* ── Layout shell ─────────────────────────────────────────── */
    .notebook-binding-bar { display: none; }
    .notebook-frame {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .notebook-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Desktop: centred column with breathing room on the sides */
    @media (min-width: 768px) {
      #root { display: flex; justify-content: center; }
      .notebook-frame {
        width: min(960px, calc(100vw - 48px));
        border-left:  1px solid rgba(255,255,255,0.07);
        border-right: 1px solid rgba(255,255,255,0.07);
        box-shadow: 0 0 48px rgba(0,0,0,0.45);
      }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef, useCallback } = React;

  // App version — shown in HomePage footer so Steve can visually confirm which
  // build the PWA is actually running (SW caching on Android makes this
  // otherwise invisible). Format: 1.<sw-cache-bump>. Must stay in sync with
  // CACHE_NAME in sw.js (e.g. 'fieldbook-v1.118' ↔ '1.118').
  const APP_VERSION = '1.135';

  // ─────────────────────────────────────────────────────────────────────────────
  // PHOTO STORAGE — IndexedDB
  // ─────────────────────────────────────────────────────────────────────────────
  // Photos used to live inside each project's JSON in localStorage. That caps
  // at ~5–10 MB per origin on mobile browsers, and a single fieldbook with a
  // few dozen photos blows past it. `photoDB` stores JPEG dataUrls in a
  // dedicated IndexedDB so the localStorage budget is freed up for everything
  // else (projects, pages, shapes, notes, data rows).
  //
  // Page schema change:
  //   OLD: photos = [{ id, note, dataUrl }]
  //   NEW: photos = [{ id, note, photoRef }]
  // `photoRef` is a string key into the IDB `photos` store. The dataUrl is
  // resolved lazily in the UI and inlined for export/PDF.
  const photoDB = (() => {
    const DB_NAME  = 'fieldbook-photos';
    const STORE    = 'photos';
    const VERSION  = 1;
    let _dbPromise = null;

    function open() {
      if (_dbPromise) return _dbPromise;
      _dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
      });
      return _dbPromise;
    }

    function tx(mode) {
      return open().then(db => db.transaction(STORE, mode).objectStore(STORE));
    }

    function newRef() {
      return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
    }

    async function put(ref, dataUrl) {
      const store = await tx('readwrite');
      return new Promise((resolve, reject) => {
        const r = store.put(dataUrl, ref);
        r.onsuccess = () => resolve(ref);
        r.onerror   = () => reject(r.error);
      });
    }

    async function get(ref) {
      if (!ref) return null;
      const store = await tx('readonly');
      return new Promise((resolve, reject) => {
        const r = store.get(ref);
        r.onsuccess = () => resolve(r.result || null);
        r.onerror   = () => reject(r.error);
      });
    }

    async function getMany(refs) {
      if (!refs || refs.length === 0) return {};
      const store = await tx('readonly');
      const out = {};
      await Promise.all(refs.map(ref => new Promise((resolve) => {
        const r = store.get(ref);
        r.onsuccess = () => { if (r.result) out[ref] = r.result; resolve(); };
        r.onerror   = () => resolve();
      })));
      return out;
    }

    async function del(ref) {
      if (!ref) return;
      const store = await tx('readwrite');
      return new Promise((resolve, reject) => {
        const r = store.delete(ref);
        r.onsuccess = () => resolve();
        r.onerror   = () => reject(r.error);
      });
    }

    async function deleteMany(refs) {
      if (!refs || refs.length === 0) return;
      const store = await tx('readwrite');
      return new Promise((resolve, reject) => {
        let remaining = refs.length;
        let failed = false;
        refs.forEach(ref => {
          const r = store.delete(ref);
          r.onsuccess = () => { if (--remaining === 0 && !failed) resolve(); };
          r.onerror   = () => { if (!failed) { failed = true; reject(r.error); } };
        });
      });
    }

    async function keys() {
      const store = await tx('readonly');
      return new Promise((resolve, reject) => {
        const r = store.getAllKeys();
        r.onsuccess = () => resolve(r.result || []);
        r.onerror   = () => reject(r.error);
      });
    }

    async function getUsageBytes() {
      // Sum all dataUrl lengths. dataUrls are strings, so this is bytes-as-chars.
      // Good enough for a storage gauge; exact byte count isn't worth another pass.
      const store = await tx('readonly');
      return new Promise((resolve, reject) => {
        let total = 0;
        const req = store.openCursor();
        req.onsuccess = (e) => {
          const cur = e.target.result;
          if (cur) {
            if (typeof cur.value === 'string') total += cur.value.length;
            cur.continue();
          } else {
            resolve(total);
          }
        };
        req.onerror = () => reject(req.error);
      });
    }

    // Walk all projects' photo arrays and delete any IDB entries no longer
    // referenced. Called after bulk deletes (project/page removal, import).
    async function pruneOrphans(allProjects) {
      const live = new Set();
      (allProjects || []).forEach(proj => {
        (proj.pages || []).forEach(pg => {
          (pg.photos || []).forEach(ph => {
            if (ph && ph.photoRef) live.add(ph.photoRef);
          });
        });
      });
      const all = await keys();
      const orphans = all.filter(k => !live.has(k));
      if (orphans.length) await deleteMany(orphans);
      return orphans.length;
    }

    return { open, put, get, getMany, del, deleteMany, keys, getUsageBytes, pruneOrphans, newRef };
  })();

    deletePage(projectId, pageId) {

      projects[pi].pages = projects[pi].pages.filter(g => g.id !== pageId);
      projects[pi].pages.forEach((g, i) => { g.pageNumber = i + 1; });
      DB.saveProjects(projects);
    },
    duplicatePage(projectId, pageId) {
      const projects = DB.getProjects();
      const pi = projects.findIndex(p => p.id === projectId);
      if (pi === -1) return null;
      const src = projects[pi].pages.find(g => g.id === pageId);
      if (!src) return null;
      let n = Date.now();
      const uid = () => String(++n);
      // Deep clone, then assign fresh IDs
      const newPage = JSON.parse(JSON.stringify(src));
      newPage.id = uid();
      newPage.pageNumber = projects[pi].pages.length + 1;
      newPage.title = (src.title?.trim() ? src.title.trim() + ' (Copy)' : '(Copy)');
      if (newPage.rows)   newPage.rows   = newPage.rows.map(r => ({ ...r, id: uid() }));
      if (newPage.shapes) newPage.shapes = newPage.shapes.map(s => ({ ...s, id: uid() }));
      projects[pi].pages.push(newPage);
      DB.saveProjects(projects);
      return newPage;
    },
    deleteProject(id) {
      DB.saveProjects(DB.getProjects().filter(p => p.id !== id));
    },
    updateProject(id, updates) {
      const projects = DB.getProjects();
      const idx = projects.findIndex(p => p.id === id);
      if (idx === -1) return;
      projects[idx] = { ...projects[idx], ...updates };
      DB.saveProjects(projects);
    },
    duplicateProject(id) {
      const projects = this.getProjects();
      const src = projects.find(p => p.id === id);
      if (!src) return null;
      let n = Date.now();
      const uid = () => ++n;
      const newProj = {
        ...src,
        id: uid(),
        name: src.name + ' (Copy)',
        createdAt: new Date().toISOString(),
        pages: (src.pages || []).map(pg => ({
          ...pg,
          id: uid(),
          rows: (pg.rows || []).map(r => ({ ...r, id: uid() }))
        }))
      };
      projects.push(newProj);
      this.saveProjects(projects);
      return newProj;
    },
    reorderPages(projectId, fromIdx, toIdx) {
      const projects = DB.getProjects();
      const pi = projects.findIndex(p => p.id === projectId);
      if (pi === -1) return;
      const pages = [...projects[pi].pages];
      const [moved] = pages.splice(fromIdx, 1);
      pages.splice(toIdx, 0, moved);
      pages.forEach((pg, i) => { pg.pageNumber = i + 1; });
      projects[pi].pages = pages;
      DB.saveProjects(projects);

  function parseRoute(hash) {
    const path = hash.replace('#', '') || '/';
    const pageMatch = path.match(/^\/project\/([^/]+)\/page\/([^/]+)$/);
    if (pageMatch) return { view: 'page', projectId: pageMatch[1], pageId: pageMatch[2] };

    if (projMatch) return { view: 'project', projectId: projMatch[1] };
    return { view: 'home' };

  function useFocusTrap(ref, isActive, onEscape) {
    const escRef = useRef(onEscape);
    useEffect(() => { escRef.current = onEscape; });

    useEffect(() => {
      if (!isActive || !ref.current) return;
      const el = ref.current;
      const sel = 'a[href],button:not([disabled]),input:not([disabled]),textarea:not([disabled]),select:not([disabled]),[tabindex]:not([tabindex="-1"])';
      const getFocusable = () => Array.from(el.querySelectorAll(sel));
      requestAnimationFrame(() => getFocusable()[0]?.focus());

      const handler = e => {
        if (e.key === 'Escape') { escRef.current?.(); return; }
        if (e.key !== 'Tab') return;
        const focusable = getFocusable();
        if (!focusable.length) { e.preventDefault(); return; }
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      };
      document.addEventListener('keydown', handler);
      return () => document.removeEventListener('keydown', handler);
    }, [isActive]);
  }

  const ToastContext = React.createContext(null);

  function ToastProvider({ children }) {
    const [toasts, setToasts] = useState([]);
    const add = (msg, type = 'success') => {
      const id = Date.now() + Math.random();
      setToasts(prev => [...prev, { id, msg, type }]);
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
    };
    // `toast` is both callable AND has .success / .error — different callsites
    // throughout the app use both patterns. Before this was an object-only API,
    // which meant every `toast({message, type})` call silently threw and
    // swallowed errors — a huge class of invisible failures on mobile.
    const toast = (arg, maybeType) => {
      if (arg && typeof arg === 'object') add(arg.message || '', arg.type || 'success');
      else add(arg, maybeType || 'success');
    };
    toast.success = msg => add(msg, 'success');
    toast.error   = msg => add(msg, 'error');
    return (
      <ToastContext.Provider value={toast}>
        {children}
        <div style={{ position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)',
          zIndex:9999, display:'flex', flexDirection:'column', gap:8, alignItems:'center',
          pointerEvents:'none', width:'calc(100% - 32px)', maxWidth:360 }}>
          {toasts.map(t => (
            <div key={t.id} style={{
              background: t.type === 'error' ? '#7F1D1D' : '#3C5445',
              color: t.type === 'error' ? '#FECACA' : '#F5F0E3',
              padding:'10px 18px', borderRadius:10, fontSize:14, fontWeight:500,
              boxShadow:'0 4px 16px rgba(0,0,0,0.35)', pointerEvents:'auto',
              width:'100%', textAlign:'center'
            }}>{t.msg}</div>
          ))}
        </div>
      </ToastContext.Provider>
    );
  }

  function ContextMenu({ x, y, items, onClose }) {
    const ref = useRef(null);
    const [pos, setPos] = useState({ x, y });

    useEffect(() => {
      if (!ref.current) return;
      const { width, height } = ref.current.getBoundingClientRect();
      const vw = window.innerWidth, vh = window.innerHeight;
      setPos({ x: Math.min(x, vw - width - 8), y: Math.min(y, vh - height - 8) });

      const onDown = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
      const onKey  = e => { if (e.key === 'Escape') onClose(); };
      document.addEventListener('mousedown', onDown);
      document.addEventListener('keydown', onKey);
      return () => {
        document.removeEventListener('mousedown', onDown);
        document.removeEventListener('keydown', onKey);
      };
    }, []);

    return (
      <div ref={ref} style={{
        position:'fixed', top:pos.y, left:pos.x, zIndex:9998,
        background:'#253B2E', border:'1px solid rgba(245,240,227,0.13)',
        borderRadius:10, boxShadow:'0 8px 28px rgba(0,0,0,0.45)',
        minWidth:168, overflow:'hidden'

          <button key={i}

              background:'transparent', border:'none',
              color: item.danger ? '#FCA5A5' : '#F5F0E3',
              fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', gap:10 }}
            onPointerOver={e => e.currentTarget.style.background='rgba(253,250,244,0.08)'}

          >{item.icon && <span style={{ display:'flex', alignItems:'center', opacity: item.danger ? 1 : 0.75 }}>{item.icon}</span>}{item.label}</button>

    const toast = useToast();

    // Storage usage gauge: localStorage bytes for projects/pages/shapes/etc
    // vs IndexedDB bytes for photos. Tracked separately because they have
    // independent caps (localStorage ~5-10 MB, IDB 60%+ of free disk).
    const [usage, setUsage] = useState({ ls: 0, idb: 0, quota: null });

    useEffect(() => {
      (async () => {
        let lsBytes = 0;
        try { lsBytes = (localStorage.getItem('fb_projects') || '').length; } catch {}
        let idbBytes = 0;
        try { idbBytes = await photoDB.getUsageBytes(); } catch {}
        let quota = null;
        try {
          if (navigator.storage?.estimate) {
            const est = await navigator.storage.estimate();
            quota = est.quota || null;
          }
        } catch {}
        setUsage({ ls: lsBytes, idb: idbBytes, quota });
      })();
    }, []);

    function fmtMB(bytes) {
      if (bytes < 1024)   return `${bytes} B`;
      if (bytes < 1e6)    return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1e6).toFixed(1)} MB`;
    }

    async function doPrune() {
      try {
        const n = await photoDB.pruneOrphans(DB.getProjects());
        if (n > 0) toast.success(`Cleaned up ${n} orphan photo${n === 1 ? '' : 's'}`);
        else       toast.success('No orphan photos found');
        // Refresh gauge
        const idbBytes = await photoDB.getUsageBytes();
        setUsage(u => ({ ...u, idb: idbBytes }));

        toast.error('Cleanup failed');
      }

    function exportBackup() {
      const data = localStorage.getItem('fb_projects') || '[]';
      const date = new Date().toISOString().split('T')[0];
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      a.href = url; a.download = `fieldbook_backup_${date}.json`;
      a.click(); URL.revokeObjectURL(url);
      toast.success('Backup downloaded');
    }

    function importBackup(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);

            toast.error('Invalid backup — expected a project array');
            return;

          if (!window.confirm(`Replace ALL existing projects with ${parsed.length} project(s) from this backup?\n\nThis cannot be undone.`)) return;
          localStorage.setItem('fb_projects', JSON.stringify(parsed));
          toast.success(`Restored ${parsed.length} project(s)`);
          onClose();
          window.location.reload();

          toast.error('Failed to parse backup file');

      reader.readAsText(file);
      e.target.value = '';

    const btnStyle = {
      width: '100%', display: 'flex', alignItems: 'center', gap: 12,

          <p className="text-fb-muted text-sm mb-4">Back up or restore all projects. Photos live in a separate IndexedDB with its own storage budget.</p>

          {/* Storage gauge */}
          <div style={{ borderRadius: 12, border: '1px solid #CEC5B0', background: '#EBE5D5', padding: 12, marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: '#1A1A1A', marginBottom: 8 }}>Storage</div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#5A5248', marginBottom: 4 }}>
              <span>Projects &amp; data (localStorage)</span>
              <span style={{ fontFamily: "'Share Tech Mono', 'Courier New', monospace", color: '#1A1A1A' }}>{fmtMB(usage.ls)}</span>
            </div>
            <div style={{ height: 6, borderRadius: 4, background: '#D2C9B7', overflow: 'hidden', marginBottom: 10 }}>
              <div style={{ height: '100%', width: `${Math.min(100, usage.ls / 5e6 * 100)}%`, background: '#4E7864' }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#5A5248', marginBottom: 4 }}>
              <span>Photos (IndexedDB)</span>
              <span style={{ fontFamily: "'Share Tech Mono', 'Courier New', monospace", color: '#1A1A1A' }}>
                {fmtMB(usage.idb)}{usage.quota ? ` / ${fmtMB(usage.quota)}` : ''}
              </span>
            </div>
            <div style={{ height: 6, borderRadius: 4, background: '#D2C9B7', overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${usage.quota ? Math.min(100, usage.idb / usage.quota * 100) : 0}%`, background: '#7C3AED' }} />
            </div>
            <button onClick={doPrune}
              style={{ marginTop: 10, width: '100%', padding: '8px 0', borderRadius: 8,
                       border: '1px solid #CEC5B0', background: '#F5F0E3', fontSize: 12,
                       fontWeight: 600, color: '#1A1A1A', cursor: 'pointer' }}>

  // Returns a short device hint string based on the user-agent.
  function deviceHint() {
    const ua = navigator.userAgent;
    if (/iPhone/.test(ua))            return 'iPhone';
    if (/iPad/.test(ua))              return 'iPad';
    if (/Android/.test(ua))           return 'Android';
    if (/Windows/.test(ua))           return 'Windows';
    if (/Macintosh|Mac OS X/.test(ua)) return 'Mac';
    return 'Unknown';
  }

  // Walk a project|page shape and inline photoRef → dataUrl from photoDB so
  // the exported file is self-contained across devices. Returns a mutated
  // *copy* of the input; photoRef is dropped from the copy, dataUrl is set.
  async function inlinePhotosForExport(projOrPage) {
    const clone = JSON.parse(JSON.stringify(projOrPage));
    const pages = clone.pages ? clone.pages : [clone];
    const allRefs = [];
    pages.forEach(pg => (pg.photos || []).forEach(ph => {
      if (ph && ph.photoRef) allRefs.push(ph.photoRef);
    }));
    if (allRefs.length === 0) return clone;
    const map = await photoDB.getMany(allRefs);
    pages.forEach(pg => {
      if (!Array.isArray(pg.photos)) return;
      pg.photos = pg.photos.map(ph => {
        if (ph && ph.photoRef && map[ph.photoRef]) {
          const { photoRef, ...rest } = ph;
          return { ...rest, dataUrl: map[photoRef] };
        }
        return ph;
      });
    });
    return clone;
  }

  // Reverse of inlinePhotosForExport — after importing, move any inline
  // dataUrls into photoDB and replace with fresh photoRef keys. Mutates in
  // place. Returns the mutated input.
  async function extractPhotosFromImport(projOrPage) {
    const pages = projOrPage.pages ? projOrPage.pages : [projOrPage];
    for (const pg of pages) {
      if (!Array.isArray(pg.photos)) continue;
      const next = [];
      for (const ph of pg.photos) {
        if (ph && ph.dataUrl && !ph.photoRef) {
          try {
            const ref = photoDB.newRef();
            await photoDB.put(ref, ph.dataUrl);
            const { dataUrl, ...rest } = ph;
            next.push({ ...rest, photoRef: ref });
          } catch (err) {
            console.error('Photo extract-on-import failed:', err);
            next.push(ph); // fall back to keeping inline
          }
        } else {
          next.push(ph);
        }
      }
      pg.photos = next;
    }
    return projOrPage;
  }

  // Build and trigger a .fieldbook file download for a project.
  // Appends an export record to the chain and persists it locally too.
  async function exportProjectToFile(project, by, location) {
    const chain = project.exportChain || [];
    const record = {
      seq:       chain.length + 1,
      action:    'export',
      timestamp: new Date().toISOString(),
      by:        by || 'Unknown',
      location:  location || '',
      device:    deviceHint(),
      appVersion: 'fieldbook-v' + APP_VERSION,
    };
    const updatedChain = [...chain, record];

    // Persist the updated chain on this device
    DB.updateProject(project.id, { exportChain: updatedChain });

    // Inline photo dataUrls so the exported file is portable across devices.
    const projectWithPhotos = await inlinePhotosForExport({ ...project, exportChain: updatedChain });

    const exportData = {
      type:       'fieldbook_project_export',
      version:    '1',
      exportedAt: record.timestamp,
      project:    projectWithPhotos,
    };

    const safeName = (project.name || 'project').replace(/[^a-z0-9_\-]/gi, '_');
    const dateStr  = record.timestamp.split('T')[0];
    const filename = `${safeName}_${dateStr}.fieldbook`;

    // Use octet-stream so Android/Windows download managers don't append .json
    // to the filename. application/json caused "foo.fieldbook" → "foo.fieldbook.json".
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/octet-stream' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);

    return updatedChain;
  }

  // Import a .fieldbook file's project into local storage.
  // Appends an import record and assigns new IDs so it doesn't collide.
  async function importProjectFromData(fileData, importerName) {
    const srcProject = fileData.project;
    const chain      = srcProject.exportChain || [];
    const importRecord = {
      seq:       chain.length + 1,
      action:    'import',
      timestamp: new Date().toISOString(),
      by:        importerName || '',
      location:  '',
      device:    deviceHint(),
      appVersion: 'fieldbook-v' + APP_VERSION,
    };

    // Generate fresh IDs so the imported project doesn't collide with existing ones
    let n = Date.now();
    const uid = () => String(++n);
    const newProject = {
      ...srcProject,
      id:            uid(),
      importedAt:    importRecord.timestamp,
      exportChain:   [...chain, importRecord],
      pages: (srcProject.pages || []).map(pg => ({
        ...pg,
        id:   uid(),
        rows: (pg.rows || []).map(r => ({ ...r, id: uid() })),
      })),
    };

    // Move any inline photo dataUrls into photoDB so the project lives under
    // the new photoRef scheme after import.
    await extractPhotosFromImport(newProject);

    const existing = DB.getProjects();
    DB.saveProjects([newProject, ...existing]);
    return newProject;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // PAGE TRANSFER HELPERS
  // ─────────────────────────────────────────────────────────────────────────────

  // Deep-clone a page with all-new IDs (page, rows, shapes, photos).
  // Does NOT modify pageChain — callers append chain records themselves.
  function freshPageIds(page) {
    let n = Date.now();
    const uid = () => 'p_' + (++n) + '_' + Math.random().toString(36).slice(2, 7);
    const cloned = JSON.parse(JSON.stringify(page));
    cloned.id = uid();
    if (Array.isArray(cloned.rows)) {
      cloned.rows = cloned.rows.map(r => ({ ...r, id: uid() }));
    }
    if (Array.isArray(cloned.shapes)) {
      cloned.shapes = cloned.shapes.map(s => ({ ...s, id: uid() }));
    }
    if (Array.isArray(cloned.photos)) {
      cloned.photos = cloned.photos.map(ph => ({ ...ph, id: uid() }));
    }
    return cloned;
  }

  // Copy one page from fromProjectId to toProjectId.
  // Returns the newly-created page.
  DB.copyPageToProject = function(fromProjectId, pageId, toProjectId, by) {
    const src         = DB.getPage(fromProjectId, pageId);
    const fromProject = DB.getProject(fromProjectId);
    const toProject   = DB.getProject(toProjectId);
    if (!src || !fromProject || !toProject) return null;

    const cloned = freshPageIds(src);
    const chain  = cloned.pageChain || [];
    chain.push({
      seq:         chain.length + 1,
      action:      'copy',
      timestamp:   new Date().toISOString(),
      by:          by || '',
      location:    '',
      device:      deviceHint(),
      appVersion:  'fieldbook-v' + APP_VERSION,
      fromProject: fromProject.name || '',
      toProject:   toProject.name   || '',
    });
    cloned.pageChain = chain;
    delete cloned.pageNumber;
    DB.addPage(toProjectId, cloned);
    return cloned;
  };

  // Export a single page to a .fieldbook-page file.
  // Appends export record to the page's chain and persists it.
  async function exportPageToFile(page, projectName, by, location, toastFn) {
    const chain = page.pageChain || [];
    const record = {
      seq:         chain.length + 1,
      action:      'export',
      timestamp:   new Date().toISOString(),
      by:          by || '',
      location:    location || '',
      device:      deviceHint(),
      appVersion:  'fieldbook-v' + APP_VERSION,
      fromProject: projectName || '',
      toProject:   null,
    };
    const updatedChain = [...chain, record];
    DB.updatePage(page._projectId || '', page.id, { pageChain: updatedChain });

    // Inline photoRef dataUrls so the .fieldbook-page file is self-contained.
    const pageWithPhotos = await inlinePhotosForExport({ ...page, pageChain: updatedChain });

    const exportData = {
      type:       'fieldbook_page_export',
      version:    '1',
      exportedAt: record.timestamp,
      sourceMeta: {
        projectName: projectName || '',
        pageTitle:   page.title  || '',
        pageType:    page.type   || '',
      },
      page: pageWithPhotos,
    };

    const safeName = (page.title || 'page').replace(/[^a-z0-9_\-]/gi, '_');
    const dateStr  = record.timestamp.split('T')[0];
    const filename = `${safeName}_${dateStr}.fieldbook-page`;

    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/octet-stream' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);

    if (toastFn) toastFn({ message: `Page exported as ${filename}`, type: 'success' });
    return updatedChain;
  }

  // Import a .fieldbook-page file into a project.
  // Validates format, assigns fresh IDs, appends import chain record.
  async function importPageFromData(fileData, toProjectId, importerName) {
    if (fileData.type !== 'fieldbook_page_export') {
      throw new Error('Not a valid .fieldbook-page file');
    }
    const srcPage   = fileData.page;
    const cloned    = freshPageIds(srcPage);
    const chain     = cloned.pageChain || [];
    chain.push({
      seq:         chain.length + 1,
      action:      'import',
      timestamp:   new Date().toISOString(),
      by:          importerName || '',
      location:    '',
      device:      deviceHint(),
      appVersion:  'fieldbook-v' + APP_VERSION,
      fromProject: fileData.sourceMeta?.projectName || '',
      toProject:   null,
    });
    cloned.pageChain = chain;
    delete cloned.pageNumber;
    // Move inlined photo dataUrls into photoDB.
    await extractPhotosFromImport(cloned);
    DB.addPage(toProjectId, cloned);
    return cloned;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // IMPORT MODAL  — previews chain, collects importer name, creates project
  // ─────────────────────────────────────────────────────────────────────────────

  function ImportProjectModal({ fileData, onClose, onImported }) {
    const [importerName, setImporterName] = useState('');
    const trapRef = useRef(null);
    useFocusTrap(trapRef, true, onClose);

    const src       = fileData.project;
    const chain     = src.exportChain || [];
    const lastExp   = [...chain].reverse().find(r => r.action === 'export');
    const pageCount = src.pages?.length || 0;

    async function doImport() {
      const proj = await importProjectFromData(fileData, importerName.trim());
      onImported(proj);

    useEffect(() => { setProjects(DB.getProjects()); }, []);

    function handleCreate(proj) {
      setShowNew(false);
      setProjects(DB.getProjects());
      navigate(`#/project/${proj.id}`);
    }

    function handleImportFileChange(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.type !== 'fieldbook_project_export') {
            toast.error('Not a valid .fieldbook file');
            return;
          }
          setPendingImport(data);
        } catch {
          toast.error('Could not read file — invalid format');
        }
      };
      reader.readAsText(file);
      // Reset so the same file can be re-selected if needed
      e.target.value = '';
    }

    function handleImported(newProject) {
      setPendingImport(null);
      setProjects(DB.getProjects());
      toast.success(`"${newProject.name}" imported`);
      navigate(`#/project/${newProject.id}`);
    }

    function confirmDelete() {
      DB.deleteProject(delTarget);
      setProjects(DB.getProjects());
      setDelTarget(null);

        DB.updateProject(p.id, { name: name.trim() });
        setProjects(DB.getProjects());
        toast.success('Project renamed');
      }

      toast.success(`"${p.name}" duplicated`);
