                      style={{ background: coverForm.name.trim() ? '#2D6A4F' : '#555' }}>
                      Save
                    </button>
                  </div>
                </div>
                <div className="px-5 py-4 space-y-3">
                  <div>
                    <p className="text-fb-light/45 text-[9px] font-bold uppercase tracking-widest mb-1">Project Name *</p>
                    <input type="text" value={coverForm.name}
                      onChange={e => setCoverForm(f => ({ ...f, name: e.target.value }))}
                      autoFocus maxLength={80}
                      className="w-full bg-white/08 text-white text-sm font-semibold rounded-lg px-3 py-2 outline-none border border-white/15 focus:border-fb-light/50 placeholder-white/25"
                      style={{ background: 'rgba(255,255,255,0.06)' }}
                      placeholder="Project name..." />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <p className="text-fb-light/45 text-[9px] font-bold uppercase tracking-widest mb-1">Job No.</p>
                      <input type="text" value={coverForm.jobNumber}
                        onChange={e => setCoverForm(f => ({ ...f, jobNumber: e.target.value }))}
                        className="w-full text-white text-sm font-data rounded-lg px-3 py-2 outline-none border border-white/15 focus:border-fb-light/50 placeholder-white/25"
                        style={{ background: 'rgba(255,255,255,0.06)' }}
                        placeholder="2026-001" />
                    </div>
                    <div>
                      <p className="text-fb-light/45 text-[9px] font-bold uppercase tracking-widest mb-1">Date</p>
                      <input type="date" value={coverForm.date}
                        onChange={e => setCoverForm(f => ({ ...f, date: e.target.value }))}
                        className="w-full text-white text-sm font-data rounded-lg px-3 py-2 outline-none border border-white/15 focus:border-fb-light/50"
                        style={{ background: 'rgba(255,255,255,0.06)', colorScheme: 'dark' }} />
                    </div>
                    <div>
                      <p className="text-fb-light/45 text-[9px] font-bold uppercase tracking-widest mb-1">Client</p>
                      <input type="text" value={coverForm.client}
                        onChange={e => setCoverForm(f => ({ ...f, client: e.target.value }))}
                        className="w-full text-white text-sm rounded-lg px-3 py-2 outline-none border border-white/15 focus:border-fb-light/50 placeholder-white/25"
                        style={{ background: 'rgba(255,255,255,0.06)' }}
                        placeholder="Client name" />
                    </div>
                    <div>
                      <p className="text-fb-light/45 text-[9px] font-bold uppercase tracking-widest mb-1">Surveyor</p>
                      <input type="text" value={coverForm.surveyor}
                        onChange={e => setCoverForm(f => ({ ...f, surveyor: e.target.value }))}
                        className="w-full text-white text-sm rounded-lg px-3 py-2 outline-none border border-white/15 focus:border-fb-light/50 placeholder-white/25"
                        style={{ background: 'rgba(255,255,255,0.06)' }}
                        placeholder="Your name" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-x-5 pt-1 opacity-40">
                    <CoverField label="Pages" value={String(pageCount)} mono />
                    <CoverField label="Created" value={new Date(project.createdAt).toLocaleDateString('en-CA')} mono />
                  </div>
                </div>
              </>
            ) : (
              <>
                <div className="px-5 py-3 border-b border-fb-mid/30 flex items-center justify-between">
                  <div>
                    <p className="text-fb-light text-[10px] font-bold uppercase tracking-widest mb-0.5">Field Book</p>
                    <h2 className="text-white text-lg font-bold leading-tight">{project.name}</h2>
                  </div>
                  <button onClick={startEditCover}
                    className="p-2 rounded-lg text-white/40 active:text-white active:bg-white/10 transition-colors flex-shrink-0"
                    title="Edit project info">
                    <Ico.Pencil />
                  </button>
                </div>
                <div className="px-5 py-3 grid grid-cols-2 gap-x-5 gap-y-2">
                  <CoverField label="Job No." value={project.jobNumber || '—'} mono />
                  <CoverField label="Date" value={project.date || '—'} mono />
                  <CoverField label="Client" value={project.client || '—'} />
                  <CoverField label="Surveyor" value={project.surveyor || '—'} />
                  <CoverField label="Pages" value={String(pageCount)} mono />
                  <CoverField label="Created" value={new Date(project.createdAt).toLocaleDateString('en-CA')} mono />
                </div>
              </>
            )}
          </div>

          {/* Pages */}
          {pageCount > 0 && (
            <div className="mb-4">
              <div className="flex items-center justify-between mb-2 px-1">
                <p className="text-white/45 text-[10px] font-bold uppercase tracking-widest">Pages</p>
                <button onClick={() => pageImportInputRef.current && pageImportInputRef.current.click()}

              </div>
              <div className="space-y-1.5">
                {project.pages.map((pg, idx) => (
                  <PageListRow key={pg.id} page={pg} projectId={projectId}
                    canMoveUp={idx > 0}
                    canMoveDown={idx < project.pages.length - 1}
                    onMoveUp={() => { DB.reorderPages(projectId, idx, idx - 1); reload(); }}
                    onMoveDown={() => { DB.reorderPages(projectId, idx, idx + 1); reload(); }}
                    onDuplicate={() => { DB.duplicatePage(projectId, pg.id); reload(); }}
                    onPageAction={pg2 => setPageActionTarget(pg2)}
                    onChainBadge={pg2 => setPageChainTarget(pg2)}
                  />
                ))}
              </div>
            </div>
          )}

          <button onClick={() => setAddStep('type')}
            className="w-full py-4 rounded-2xl border-2 border-dashed border-fb-mid/50 text-fb-light font-semibold flex items-center justify-center gap-2 active:bg-fb-mid/10 transition-colors text-sm">
            <Ico.Plus /> Add Page
          </button>
        </div>

        {addStep === 'type' && (
          <AddPageTypeModal onSelect={handleTypeSelect} onClose={() => setAddStep(null)}
            onCopyFrom={() => { setAddStep(null); setCopyFromOpen(true); }} />
        )}
        {showSettings && (
          <ProjectSettingsModal
            project={project}
            projectId={projectId}
            onClose={() => setShowSettings(false)}
            onReload={reload}
          />
        )}

        {/* hidden file input for page import */}
        <input ref={pageImportInputRef} type="file" accept=".fieldbook-page,.fieldbook-page.json"
          style={{ display: 'none' }}
          onChange={e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
              try {
                const data = JSON.parse(ev.target.result);
                setImportPageModal({ fileData: data });
              } catch {
                toast({ message: 'Invalid .fieldbook-page file', type: 'error' });
              }
            };
            reader.readAsText(file);
            e.target.value = '';
          }} />

        {pageActionTarget && (
          <PageActionsSheet
            page={pageActionTarget}
            projectId={projectId}
            onClose={() => setPageActionTarget(null)}
            onCopyTo={pg => { setPageActionTarget(null); setPageCopyToTarget(pg); }}
            onExport={pg => { setPageActionTarget(null); setPageExportTarget(pg); }}
            onChain={pg => { setPageActionTarget(null); setPageChainTarget(pg); }}
            onDelete={pg => {
              if (!window.confirm(`Delete "${pg.title || 'Untitled'}"? This cannot be undone.`)) return;
              DB.deletePage(projectId, pg.id);
              setPageActionTarget(null);
              reload();
            }}
          />
        )}
        {pageCopyToTarget && (
          <CopyToProjectModal
            page={pageCopyToTarget}
            fromProjectId={projectId}
            onClose={() => setPageCopyToTarget(null)}
            onDone={() => { setPageCopyToTarget(null); toast({ message: 'Page copied!', type: 'success' }); }}
            toast={toast}
          />
        )}
        {pageExportTarget && (
          <PageExportModal
            page={pageExportTarget}
            project={project}
            onClose={() => setPageExportTarget(null)}
            onDone={() => setPageExportTarget(null)}
            toast={toast}
          />
        )}
        {importPageModal && (
          <ImportPageModal
            fileData={importPageModal.fileData}
            toProjectId={projectId}
            onClose={() => setImportPageModal(null)}
            onDone={() => { setImportPageModal(null); reload(); toast({ message: 'Page imported!', type: 'success' }); }}
          />
        )}
        {copyFromOpen && (
          <CopyFromProjectModal
            toProjectId={projectId}
            onClose={() => setCopyFromOpen(false)}
            onDone={() => { setCopyFromOpen(false); reload(); toast({ message: 'Page(s) copied!', type: 'success' }); }}
          />
        )}
        {pageChainTarget && (
          <PageChainSheet
            page={pageChainTarget}
            onClose={() => setPageChainTarget(null)}
          />
        )}
      </div>
    );
  }

  function PageListRow({ page, projectId, canMoveUp, canMoveDown, onMoveUp, onMoveDown, onDuplicate, onPageAction, onChainBadge }) {
    const meta = TYPE_META[page.type] || TYPE_META.data;
    const rowCount = page.rows?.length || 0;
    const displayTitle = page.title && page.title.trim() ? page.title.trim() : null;
    const hasChain = (page.pageChain || []).length > 0;
    return (
      <div className="flex items-stretch gap-1">
        {/* Reorder + duplicate + actions buttons */}
        <div className="flex flex-col gap-0.5 flex-shrink-0 justify-center">
          <button
            onClick={canMoveUp ? onMoveUp : undefined}
            disabled={!canMoveUp}
            className="w-7 h-7 flex items-center justify-center rounded-lg transition-colors"
            style={{ color: canMoveUp ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)' }}>
            <Ico.ChevUp />
          </button>
          <button
            onClick={canMoveDown ? onMoveDown : undefined}
            disabled={!canMoveDown}
            className="w-7 h-7 flex items-center justify-center rounded-lg transition-colors"
            style={{ color: canMoveDown ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)' }}>
            <Ico.ChevDown />
          </button>
          <button
            onClick={onDuplicate}
            title="Duplicate page"
            className="w-7 h-7 flex items-center justify-center rounded-lg transition-colors"
            style={{ color: 'rgba(255,255,255,0.35)', background: 'rgba(255,255,255,0.05)', fontSize: 13 }}>
            ⧉
          </button>
          <button
            onClick={() => onPageAction && onPageAction(page)}
            title="Page actions"
            className="w-7 h-7 flex items-center justify-center rounded-lg transition-colors"
            style={{ color: 'rgba(255,255,255,0.35)', background: 'rgba(255,255,255,0.05)', fontSize: 15, letterSpacing: '-1px' }}>
            ···
          </button>
        </div>
        {/* Main row */}
        <button onClick={() => navigate(`#/project/${projectId}/page/${page.id}`)}
          className="flex-1 min-w-0 rounded-xl px-3 py-2.5 flex items-center gap-3 text-left transition-colors active:bg-white/15"
          style={{ background: 'rgba(255,255,255,0.07)' }}>
          <span className="font-data text-fb-light text-sm font-bold w-7 flex-shrink-0">{page.pageNumber}</span>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider flex-shrink-0"
                style={{ background: meta.bg, color: meta.color }}>
                {meta.label}
              </span>
              <span className={`text-sm truncate ${displayTitle ? 'text-white/90 font-medium' : 'text-white/40 italic'}`}>
                {displayTitle || 'Untitled'}
              </span>
            </div>
            <p className="text-white/30 text-xs mt-0.5 truncate">
              {page.date}
              {(page.type === 'data' || page.type === 'points') && rowCount > 0 ? ` · ${rowCount} pts` : ''}
            </p>
          </div>
          {hasChain && (
            <button
              onClick={e => { e.stopPropagation(); onChainBadge && onChainBadge(page); }}
              title="Page history"
              className="flex-shrink-0 text-xs px-1 py-0.5 rounded"
              style={{ background: 'rgba(99,179,237,0.2)', color: 'rgba(99,179,237,0.9)', fontSize: 11 }}>
              🔗
            </button>
          )}
          <span className="text-white/25 flex-shrink-0"><Ico.ChevR /></span>
        </button>
      </div>
    );
  }

  function PageActionsSheet({ page, projectId, onClose, onCopyTo, onExport, onChain, onDelete }) {
    const trapRef = useRef(null);
    useFocusTrap(trapRef, true, onClose);
    const hasChain = (page.pageChain || []).length > 0;
    const meta = TYPE_META[page.type] || TYPE_META.data;
    return (
      <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
        <div ref={trapRef} className="modal-sheet">
          <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4" />
          <div className="flex items-center gap-2 mb-4">
            <span className="text-[10px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider"
              style={{ background: meta.bg, color: meta.color }}>{meta.label}</span>
            <span className="text-fb-text font-semibold text-sm truncate">{page.title || 'Untitled'}</span>
          </div>
          <div className="space-y-2">
            <button onClick={() => onCopyTo(page)}
              className="w-full text-left px-4 py-3 rounded-xl font-medium text-fb-text transition-colors active:bg-gray-100"

            <button onClick={() => onExport(page)}
              className="w-full text-left px-4 py-3 rounded-xl font-medium text-fb-text transition-colors active:bg-gray-100"

              ↓ Export Page…

              <button onClick={() => onChain(page)}
                className="w-full text-left px-4 py-3 rounded-xl font-medium text-fb-text transition-colors active:bg-gray-100"

                🕐 Page History

            <button onClick={() => onDelete(page)}
              className="w-full text-left px-4 py-3 rounded-xl font-medium transition-colors active:bg-red-100"
              style={{ background: '#fff1f0', color: '#dc2626' }}>
              🗑 Delete Page
            </button>
          </div>
          <button onClick={onClose}
            className="w-full mt-4 py-3 rounded-xl text-fb-muted font-medium transition-colors active:bg-gray-100"
            style={{ background: '#f4f4f4' }}>
            Cancel
          </button>
        </div>
      </div>
    );
  }

  function CoverField({ label, value, mono }) {
    return (
      <div>
        <p className="text-fb-light/45 text-[9px] font-bold uppercase tracking-widest mb-0.5">{label}</p>
        <p className={`text-white text-sm font-medium truncate ${mono ? 'font-data' : ''}`}>{value}</p>
      </div>

  // ─────────────────────────────────────────────────────────────────────────────
  // PAGE SHARING MODALS
  // ─────────────────────────────────────────────────────────────────────────────

  function CopyToProjectModal({ page, fromProjectId, onClose, onDone, toast }) {
    const trapRef = useRef(null);
    useFocusTrap(trapRef, true, onClose);
    const [by, setBy] = useState(() => localStorage.getItem('fb_lastExportName') || '');
    const allProjects = DB.getProjects()
      .filter(p => p.id !== fromProjectId)
      .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    const meta = TYPE_META[page.type] || TYPE_META.data;

    function doCopy(toProject) {
      localStorage.setItem('fb_lastExportName', by.trim());
      DB.copyPageToProject(fromProjectId, page.id, toProject.id, by.trim());
      toast({ message: `Copied to "${toProject.name}"`, type: 'success' });
      onDone();
    }

    return (
      <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
        <div ref={trapRef} className="modal-sheet">
          <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4" />
          <h2 className="text-xl font-bold text-fb-text mb-1">Copy Page to Project</h2>
          <div className="flex items-center gap-2 mb-4">
            <span className="text-[10px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider"
              style={{ background: meta.bg, color: meta.color }}>{meta.label}</span>
            <span className="text-fb-muted text-sm truncate">{page.title || 'Untitled'}</span>
          </div>
          <div className="mb-4">
            <label className="text-fb-muted text-xs font-semibold uppercase tracking-wider block mb-1">Your name (optional)</label>
            <input value={by} onChange={e => setBy(e.target.value)}
              placeholder="e.g. Steve"
              className="w-full rounded-xl px-3 py-2 text-sm border border-gray-200 focus:outline-none focus:border-fb-accent"
              style={{ background: '#f8f8f8' }} />
          </div>
          {allProjects.length === 0 ? (
            <p className="text-fb-muted text-sm text-center py-6">No other projects found.</p>
          ) : (
            <div className="space-y-2 max-h-64 overflow-y-auto">
              {allProjects.map(p => (
                <div key={p.id} className="flex items-center gap-3 px-3 py-2.5 rounded-xl"
                  style={{ background: 'rgba(0,0,0,0.04)' }}>
                  <div className="flex-1 min-w-0">
                    <p className="font-semibold text-fb-text text-sm truncate">{p.name || 'Unnamed'}</p>
                    <p className="text-fb-muted text-xs truncate">
                      {p.jobNumber ? `#${p.jobNumber} · ` : ''}{(p.pages||[]).length} page{(p.pages||[]).length !== 1 ? 's' : ''}
                    </p>
                  </div>
                  <button onClick={() => doCopy(p)}
                    className="flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-lg transition-opacity active:opacity-60"
                    style={{ background: '#2D6A4F', color: '#fff' }}>
                    Copy here
                  </button>
                </div>
              ))}
            </div>
          )}
          <button onClick={onClose}
            className="w-full mt-4 py-3 rounded-xl text-fb-muted font-medium transition-colors active:bg-gray-100"
            style={{ background: 'rgba(0,0,0,0.04)' }}>
            Cancel
          </button>
        </div>
      </div>
    );
  }

  function PageExportModal({ page, project, onClose, onDone, toast }) {
    const trapRef = useRef(null);
    useFocusTrap(trapRef, true, onClose);
    const [by,       setBy]       = useState(() => localStorage.getItem('fb_lastExportName') || '');
    const [location, setLocation] = useState('');

    async function doExport() {
      localStorage.setItem('fb_lastExportName', by.trim());
      await exportPageToFile({ ...page, _projectId: project.id }, project.name || '', by.trim(), location.trim(), toast);
      onDone();
    }

    return (
      <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
        <div ref={trapRef} className="modal-sheet">
          <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-5" />

  function CopyFromProjectModal({ toProjectId, onClose, onDone }) {

      setSelected(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });

    function doCopy() {
      localStorage.setItem('fb_lastExportName', by.trim());

  function AddColumnsModal({ columns: initCols, onConfirm, onBack, onClose }) {
    const trapRef = useRef(null);
    useFocusTrap(trapRef, true, onClose);
    const defaultCols = initCols && initCols.length
      ? initCols
      : [{ id: 'col_' + Date.now(), label: '', colType: 'num', width: 80 }];
    const [cols, setCols] = useState(defaultCols);

    function addCol() {
      if (cols.length >= 10) return;
      setCols([...cols, { id: 'col_' + Date.now() + '_' + Math.random().toString(36).slice(2), label: '', colType: 'num', width: 80 }]);
    }
    function removeCol(id) {
      if (cols.length <= 1) return;
      setCols(cols.filter(c => c.id !== id));
    }
    function setLabel(id, label) {
      setCols(cols.map(c => c.id === id ? { ...c, label } : c));
    }
    function setColType(id, colType) {
      setCols(cols.map(c => c.id === id ? { ...c, colType } : c));
    }

    const valid = cols.filter(c => c.label.trim()).length;
    const typeColors = { text: '#6b7280', num: '#065f46', dms: '#1d4ed8' };
    const typeLabels = { text: 'TXT', num: 'NUM', dms: 'DMS' };

    return (
      <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
        <div ref={trapRef} className="modal-sheet">
          <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4" />
          <button onClick={onBack} className="flex items-center gap-1 text-fb-muted text-sm mb-4 -mt-1 active:opacity-70">
            <Ico.Back /> Back
          </button>
          <h2 className="text-lg font-bold text-fb-dark mb-1">Define Columns</h2>
          <p className="text-fb-muted text-sm mb-1">Name each column and choose its type. Up to 10 columns.</p>
          <p className="text-fb-muted text-xs mb-4 font-data">TXT = text/notes &nbsp;·&nbsp; NUM = decimal number &nbsp;·&nbsp; DMS = angle (°′″)</p>

          <div className="space-y-2 mb-4">
            {cols.map((col, i) => (
              <div key={col.id} className="flex items-center gap-2">
                <span className="text-xs font-data text-fb-muted w-5 text-right flex-shrink-0">{i + 1}</span>
                <input
                  type="text"
                  value={col.label}
                  onChange={e => setLabel(col.id, e.target.value)}
                  placeholder={`Column ${i + 1}...`}
                  maxLength={20}
                  autoFocus={i === 0}
                  className="flex-1 px-3 py-2 rounded-xl border-2 border-gray-200 focus:border-fb-mid outline-none text-fb-text text-sm font-data transition-colors"
                />
                {/* Type cycle button */}
                <button
                  onClick={() => {
                    const cycle = { text: 'num', num: 'dms', dms: 'text' };
                    setColType(col.id, cycle[col.colType || 'num']);
                  }}
                  className="px-2 py-1 rounded-lg border text-xs font-bold font-data flex-shrink-0"
                  style={{ borderColor: typeColors[col.colType || 'num'], color: typeColors[col.colType || 'num'], background: typeColors[col.colType || 'num'] + '18' }}
                  title="Tap to cycle: TXT → NUM → DMS">
                  {typeLabels[col.colType || 'num']}
                </button>
                <button onClick={() => removeCol(col.id)} className="p-2 text-gray-300 active:text-red-400 flex-shrink-0">
                  <Ico.Trash />
                </button>
              </div>
            ))}
          </div>

          {cols.length < 10 && (
            <button onClick={addCol} className="flex items-center gap-1.5 text-fb-mid text-sm font-semibold mb-6 active:opacity-70">
              <Ico.Plus /> Add Column
            </button>
          )}

          <div className="flex gap-3">
            <button onClick={onClose} className="flex-1 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm">Cancel</button>
            <button onClick={() => onConfirm(cols)} disabled={valid === 0}
              className="flex-1 py-3 rounded-xl text-white font-semibold text-sm"
              style={{ background: valid > 0 ? '#2D6A4F' : '#9CA3AF' }}>
              Create ({valid} col{valid !== 1 ? 's' : ''})
            </button>
          </div>
        </div>
      </div>
    );
  }

  function PageView({ projectId, pageId }) {
    const [project, setProject] = useState(null);
    const [page, setPage]       = useState(null);
    const [exporting, setExporting] = useState(false);
    const [showExportMenu, setShowExportMenu] = useState(false);
    const exportFnsRef = useRef({ exportCSV: null, exportPDF: null });
    const registerExports = useCallback(fns => { exportFnsRef.current = fns; }, []);
    const toast = useToast();

    function reload() {
      const proj = DB.getProject(projectId);
      setProject(proj);
      if (proj) setPage(proj.pages.find(p => p.id === pageId) || null);
    }
    useEffect(() => { reload(); }, [projectId, pageId]);

    if (!project || !page) return (
      <div className="flex flex-col h-full bg-fb-cream">
        <NavBar title="Page" onBack={() => navigate(`#/project/${projectId}`)} />
        <div className="flex-1 flex items-center justify-center text-fb-muted text-sm">Page not found.</div>
      </div>
    );

    function handleDelete() {
      if (window.confirm(`Delete Page ${page.pageNumber}? This cannot be undone.`)) {
        DB.deletePage(projectId, pageId);
        navigate(`#/project/${projectId}`);
      }
    }

    function handleExportPDF() {
      exportSinglePagePDF(projectId, pageId, toast, setExporting);
    }

    const meta     = TYPE_META[page.type] || TYPE_META.data;
    const pages    = project.pages;
    const myIdx    = pages.findIndex(p => p.id === pageId);
    const prevPage = pages[myIdx - 1] || null;
    const nextPage = pages[myIdx + 1] || null;

    const navActions = (
      <>
        <button
          onClick={() => prevPage && navigate(`#/project/${projectId}/page/${prevPage.id}`)}
          disabled={!prevPage}
          className="p-1.5 rounded-lg active:bg-white/10 transition-colors disabled:opacity-30"
          title="Previous page">
          <Ico.PageL />
        </button>
        <button
          onClick={() => nextPage && navigate(`#/project/${projectId}/page/${nextPage.id}`)}
          disabled={!nextPage}
          className="p-1.5 rounded-lg active:bg-white/10 transition-colors disabled:opacity-30"
          title="Next page">
          <Ico.PageR />
        </button>
        <div style={{ position: 'relative' }}>
          <button
            onClick={() => {
              if (page.type === 'data') { setShowExportMenu(v => !v); }
              else { handleExportPDF(); }
            }}
            disabled={exporting}
            className="p-1.5 rounded-lg active:bg-white/10 transition-colors disabled:opacity-50"
            title={page.type === 'data' ? 'Export options' : 'Export page as PDF'}>
            {exporting ? <span style={{ fontSize: 14 }}>⏳</span> : <Ico.Download />}
          </button>
          {showExportMenu && page.type === 'data' && (
            <div
              style={{
                position: 'absolute', top: 'calc(100% + 6px)', right: 0, zIndex: 300,
                background: '#fff', borderRadius: 12, padding: 6, minWidth: 160,
                boxShadow: '0 4px 24px rgba(0,0,0,0.18)',
              }}
              onClick={e => e.stopPropagation()}>
              <button

                  padding: '9px 14px', borderRadius: 8, textAlign: 'left', fontSize: 13,
                  color: '#1a3a2a', fontWeight: 600 }}>
                <Ico.Download /> Export PDF
              </button>
              <button
                onClick={() => { exportFnsRef.current.exportCSV?.(); setShowExportMenu(false); }}
                style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%',
                  padding: '9px 14px', borderRadius: 8, textAlign: 'left', fontSize: 13,
                  color: '#1a3a2a', fontWeight: 600 }}>
                <Ico.Download /> Export CSV
              </button>
            </div>
          )}
        </div>
        <button onClick={handleDelete} className="p-1.5 rounded-lg active:bg-white/10 transition-colors text-red-300">
          <Ico.Trash />
        </button>
      </>
    );

    const PageContent = getPageComponent(page.type);

    return (
      <div className="flex flex-col h-full" style={{ background: '#FDFAF4' }}>
        <NavBar
          title={page.title && page.title.trim() ? page.title.trim() : `P.${page.pageNumber} — ${meta.label}`}
          subtitle={`${project.name} · P.${page.pageNumber}`}
          onBack={() => navigate(`#/project/${projectId}`)}
          actions={navActions}
        />
        {/* Sketch pages must NOT be scrollable — the canvas handles all pointer/wheel
            events directly and needs to fill the full remaining height without a
            scrollable ancestor (which the browser prefers over canvas wheel handlers).
            All other page types keep overflow-y-auto + the safe-area bottom spacer. */}
        <div
          className={`flex-1 screen-enter${(page.type === 'sketch' || page.type === 'photo') ? ' overflow-hidden flex flex-col' : ' overflow-y-auto'}`}
          onClick={() => showExportMenu && setShowExportMenu(false)}>
          <PageContent
            page={page}
            projectId={projectId}
            onReload={reload}
            onRegisterExports={page.type === 'data' || page.type === 'photo' ? registerExports : undefined}
          />
          {page.type !== 'sketch' && <div style={{ height: 'max(24px, env(safe-area-inset-bottom))' }} />}
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // IMAGE COMPRESSION UTILITY
  // Resizes + compresses an image File to a JPEG base64 data URI.
  // Uses a Blob URL (not FileReader.readAsDataURL) to avoid allocating a huge
  // base64 string in memory before decode — critical on mobile where a 12MP
  // camera JPEG otherwise doubles peak RAM and can OOM-kill the PWA.
  // maxDim 1600 + quality 0.65 = good fieldbook quality at ~150-300KB per photo.
  // Used by PhotoPage and exposed via window._fb so sketch.js can call it.
  // ─────────────────────────────────────────────────────────────────────────────
  function compressImage(file, maxDim = 1400, quality = 0.6) {
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      const cleanup = () => URL.revokeObjectURL(url);
      img.onerror = (e) => { cleanup(); reject(e); };
      img.onload = () => {
        try {
          let w = img.naturalWidth || img.width;
          let h = img.naturalHeight || img.height;
          if (!w || !h) { cleanup(); reject(new Error('Image has no dimensions')); return; }
          if (w > maxDim || h > maxDim) {
            if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else        { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          const ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const dataUrl = c.toDataURL('image/jpeg', quality);
          // Free the canvas immediately (helps on iOS where canvas buffers are limited)
          c.width = 0; c.height = 0;
          cleanup();
          resolve(dataUrl);
        } catch (err) {
          cleanup();
          reject(err);
        }
      };
      img.src = url;
    });
  }

  function NotesPage({ page, projectId, onReload, onRegisterExports }) {
    const editorRef  = useRef(null);
    const saveTimer  = useRef(null);
    const toast      = useToast();

    // Restore saved HTML into the contenteditable on mount / page change
    useEffect(() => {
      if (editorRef.current && page.notesHtml !== undefined) {
        editorRef.current.innerHTML = page.notesHtml || '';
      }
    }, [page.id]);

    // Register PDF export
    useEffect(() => {
      if (!onRegisterExports) return;
      onRegisterExports({ exportPage: () => exportNotesPDF(page, toast) });
    }, [page]);

    function scheduleSave() {
      if (saveTimer.current) clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => {
        const html = editorRef.current ? editorRef.current.innerHTML : '';
        DB.updatePage(projectId, page.id, { notesHtml: html });
        onReload?.();
      }, 800);
    }

    function execCmd(cmd, val) {
      editorRef.current?.focus();
      document.execCommand(cmd, false, val ?? null);
    }

    // Toolbar button definitions
    const tbBtns = [
      { label: 'B',  title: 'Bold',        cmd: 'bold',        style: { fontWeight: 700 } },
      { label: 'I',  title: 'Italic',       cmd: 'italic',      style: { fontStyle: 'italic' } },
      { label: 'H1', title: 'Heading 1',    cmd: 'formatBlock', val: 'H2' },
      { label: 'H2', title: 'Heading 2',    cmd: 'formatBlock', val: 'H3' },
      { label: '•',  title: 'Bullet list',  cmd: 'insertUnorderedList' },
      { label: '1.', title: 'Numbered list',cmd: 'insertOrderedList' },
      { label: '—',  title: 'Horizontal rule', cmd: 'insertHorizontalRule' },
      { label: 'Tx', title: 'Clear formatting', cmd: 'removeFormat' },
    ];

    return (
      <div className="flex flex-col h-full" style={{ background: '#FDFAF4' }}>
        <PageHeaderStrip page={page} projectId={projectId} onReload={onReload} />
        {/* Formatting toolbar */}
        <div style={{
          display: 'flex', gap: 4, padding: '6px 10px', overflowX: 'auto',
          borderBottom: '1px solid #E5E1D8', background: '#F5F1E8', flexShrink: 0,
        }}>
          {tbBtns.map(btn => (
            <button key={btn.label}
              onPointerDown={e => { e.preventDefault(); execCmd(btn.cmd, btn.val); }}
              title={btn.title}
              style={{
                minWidth: 32, height: 32, padding: '0 8px', borderRadius: 7,
                border: '1px solid #D4CFCA', background: '#FDFAF4', cursor: 'pointer',
                fontSize: 13, fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: '#3C5445',
                flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
                ...btn.style,
              }}>
              {btn.label}
            </button>
          ))}
        </div>
        {/* Editor */}
        <div
          ref={editorRef}
          contentEditable
          suppressContentEditableWarning

          spellCheck
          style={{
            flex: 1, minHeight: 0, overflowY: 'auto',
            padding: '16px 18px', outline: 'none',
            fontFamily: "'Caveat', cursive", fontSize: 18,
            lineHeight: 1.7, color: '#1A1A1A',
            caretColor: '#4E7864',
          }}
        />
      </div>
    );
  }

  async function exportNotesPDF(page, toast) {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
      const margin = 18, pageW = doc.internal.pageSize.getWidth();
      const usableW = pageW - margin * 2;
      let y = margin;

      // Page header
      doc.setFont('Courier', 'bold');
      doc.setFontSize(13);
      doc.text(page.title || 'Notes', margin, y); y += 7;
      doc.setFont('Courier', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(120);
      doc.text([page.date || '', page.weather || ''].filter(Boolean).join('  ·  '), margin, y); y += 8;
      doc.setTextColor(0);
      doc.setLineWidth(0.3);
      doc.line(margin, y, pageW - margin, y); y += 6;

      // Render HTML content as plain text (strip tags)
      const tmp = document.createElement('div');
      tmp.innerHTML = page.notesHtml || '';
      const text = tmp.innerText || tmp.textContent || '';
      doc.setFont('Courier', 'normal');
      doc.setFontSize(10);
      const lines = doc.splitTextToSize(text, usableW);
      for (const ln of lines) {
        if (y > doc.internal.pageSize.getHeight() - margin) {
          doc.addPage(); y = margin;
        }
        doc.text(ln, margin, y); y += 6;
      }

      doc.save((page.title || 'Notes') + '.pdf');
      toast({ message: 'PDF exported.', type: 'success' });
    } catch(err) {
      toast({ message: 'Export failed: ' + (err.message || 'unknown error'), type: 'error' });
    }
  }

  function PhotoPage({ page, projectId, onReload, onRegisterExports }) {
    const [photos, setPhotos] = useState(page.photos || []);
    const [urlMap, setUrlMap] = useState({}); // photoRef -> dataUrl, for rendering
    const [expandedId, setExpandedId] = useState(null);
    const [uploading, setUploading] = useState(false);
    const [camKey, setCamKey] = useState(0);
    const fileRef = useRef(null);
    const camRef  = useRef(null);
    const toast   = useToast();

    // Ref mirrors the photos state so async handlers always see the latest
    // array after awaits, avoiding the stale-closure bug that caused the
    // second upload to clobber or drop the first.
    const photosRef = useRef(photos);
    useEffect(() => { photosRef.current = photos; }, [photos]);

    // On page mount: (1) lazy-migrate any legacy inline-dataUrl photos into
    // photoDB (IDB) so they share the same photoRef model as new photos, and
    // (2) load all referenced dataUrls into `urlMap` for rendering.
    useEffect(() => {
      let cancelled = false;
      (async () => {
        const raw = page.photos || [];
        let migrated = raw;
        let didMigrate = false;

        // Migrate legacy entries — those with a dataUrl but no photoRef.
        const legacy = raw.filter(p => p && p.dataUrl && !p.photoRef);
        if (legacy.length) {
          const updates = {};
          for (const ph of legacy) {
            try {
              const ref = photoDB.newRef();
              await photoDB.put(ref, ph.dataUrl);
              updates[ph.id] = ref;
            } catch (err) {
              console.error('Photo migration failed:', err);
            }
          }
          migrated = raw.map(p => {
            if (updates[p.id]) {
              const { dataUrl, ...rest } = p;
              return { ...rest, photoRef: updates[p.id] };
            }
            return p;
          });
          try {
            DB.updatePage(projectId, page.id, { photos: migrated });
            didMigrate = true;
          } catch (err) {
            console.error('Failed to save migrated photos:', err);
          }
        }

        // Resolve all current refs into the urlMap.
        const refs = migrated.map(p => p.photoRef).filter(Boolean);
        const map  = await photoDB.getMany(refs);

        // Also keep any inline dataUrls from unmigrated entries so they still render.
        migrated.forEach(p => {
          if (!p.photoRef && p.dataUrl) map[p.id] = p.dataUrl;
        });

        if (cancelled) return;
        photosRef.current = migrated;
        setPhotos(migrated);
        setUrlMap(map);
        if (didMigrate) toast.success(`Upgraded ${legacy.length} photo${legacy.length === 1 ? '' : 's'} to new storage.`);
      })();
      return () => { cancelled = true; };
    }, [page.id]);

    // Register per-page PDF export so the header export button works
    useEffect(() => {
      if (!onRegisterExports) return;
      onRegisterExports({
        exportPage: () => exportPhotoPDF(page, photos, urlMap, toast),
      });
    }, [page, photos, urlMap]);

    // Persist a specific `next` array to both DB and component state.
    // Returns true on success, false if localStorage threw (quota exceeded).
    function savePhotos(next) {
      try {
        DB.updatePage(projectId, page.id, { photos: next });
      } catch (err) {
        toast.error('Photo not saved — storage full. Delete photos or old projects to free space.');
        return false;
      }
      photosRef.current = next;
      setPhotos(next);
      return true;
    }

    // Resolve a photo record to its dataUrl for rendering/export.
    function photoUrl(ph) {
      if (!ph) return null;
      if (ph.photoRef && urlMap[ph.photoRef]) return urlMap[ph.photoRef];
      if (ph.dataUrl) return ph.dataUrl; // unmigrated legacy fallback
      return null;
    }

    async function handleFileInput(e) {
      const files = Array.from(e.target.files || []);
      e.target.value = '';
      if (!files.length) return;
      setUploading(true);
      let savedCount = 0;
      let failedCount = 0;
      let quotaHit = false;
      // Process one at a time — parallel decode of multi-MP images via
      // Promise.all is what was OOM-killing the PWA on phones (camera capture
      // green-screen) and causing the "second photo vanishes" bug.
      // Save after each photo so a mid-batch crash still retains earlier ones.
      for (const f of files) {
        try {
          const dataUrl = await compressImage(f);
          const ref = photoDB.newRef();
          await photoDB.put(ref, dataUrl);
          const next = [...photosRef.current, {
            id: 'ph_' + Date.now() + '_' + Math.random().toString(36).slice(2),
            photoRef: ref,
            note: '',
          }];
          if (savePhotos(next)) {
            setUrlMap(m => ({ ...m, [ref]: dataUrl }));
            savedCount++;
          } else {
            // localStorage quota hit — the page-level save failed, so the ref
            // would be orphaned. Clean up the IDB entry we just wrote.
            try { await photoDB.del(ref); } catch {}
            quotaHit = true;
            break;
          }
        } catch (err) {
          failedCount++;
          console.error('Photo import failed:', err);
        }
      }
      setUploading(false);
      if (quotaHit) return;
      if (failedCount > 0 && savedCount === 0) {
        toast.error('Failed to import image.');
      } else if (failedCount > 0) {
        toast.error(`Imported ${savedCount} of ${savedCount + failedCount} photos.`);
      }
    }

    function updateNote(id, note) {
      savePhotos(photosRef.current.map(p => p.id === id ? { ...p, note } : p));
    }

    function deletePhoto(id) {
      const toRemove = photosRef.current.find(p => p.id === id);
      const next = photosRef.current.filter(p => p.id !== id);
      if (!savePhotos(next)) return;
      // Lazy IDB cleanup — pruneOrphans handles this safely at app-level, so
      // we don't need to worry about duplicate pages sharing a ref. Only
      // remove if we're confident no other page references it on this project.
      // Simplest correct behaviour: don't delete from IDB here. pruneOrphans
      // (DataManagementModal button + app launch) will sweep unreferenced
      // entries. Photos deleted here just drop from page.photos in localStorage.
      if (toRemove && toRemove.photoRef) {
        // Non-blocking best-effort cleanup if the ref appears nowhere else.
        // Safe because pruneOrphans will catch anything we miss.
        queueMicrotask(() => {
          try {
            const projects = DB.getProjects();
            const stillReferenced = projects.some(pr =>
              (pr.pages || []).some(pg =>
                (pg.photos || []).some(ph => ph.photoRef === toRemove.photoRef)));
            if (!stillReferenced) photoDB.del(toRemove.photoRef).catch(() => {});
          } catch {}
        });
      }
    }

    return (
      <div className="flex flex-col h-full" style={{ background: '#FDFAF4' }}>
        <PageHeaderStrip page={page} projectId={projectId} onReload={onReload} />
        {/* Hidden file inputs.
            Camera input intentionally omits capture="environment": on Android, that
            attribute launches the camera app directly and backgrounds the PWA, which
            Samsung's memory manager can kill before the photo is returned — causing the
            green-splash-screen reload and lost photo. Without capture, Android shows a
            system picker (Camera / Gallery / Files) that keeps the browser alive as an
            active task and reliably delivers the photo. One extra tap, zero lost photos.
            Key remount after each capture forces a fresh input element so rapid repeat
            shots don't silently skip onChange (a known Android/Chrome quirk). */}
        <input ref={fileRef} type="file" accept="image/*" multiple
               style={{ position: 'fixed', top: -9999, left: -9999, width: 1, height: 1, opacity: 0 }}
               onChange={handleFileInput} />
        <input key={camKey} ref={camRef} type="file" accept="image/*"
               style={{ position: 'fixed', top: -9999, left: -9999, width: 1, height: 1, opacity: 0 }}
               onChange={e => { handleFileInput(e); setCamKey(k => k + 1); }} />
        {/* Add buttons */}
        <div style={{ display: 'flex', gap: 12, padding: '12px 16px', borderBottom: '1px solid #E5E1D8' }}>
          <button onClick={() => !uploading && camRef.current?.click()}
            disabled={uploading}
            style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                     padding: '12px 0', borderRadius: 14, background: '#3C5445', color: '#FDFAF4',
                     fontWeight: 600, fontSize: 14, border: 'none',
                     cursor: uploading ? 'wait' : 'pointer', opacity: uploading ? 0.6 : 1 }}>
            <Ico.Camera /> {uploading ? 'Importing…' : 'Camera'}
          </button>
          <button onClick={() => !uploading && fileRef.current?.click()}
            disabled={uploading}
            style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                     padding: '12px 0', borderRadius: 14, background: 'transparent', color: '#3C5445',
                     fontWeight: 600, fontSize: 14, border: '2px solid #3C5445',
                     cursor: uploading ? 'wait' : 'pointer', opacity: uploading ? 0.6 : 1 }}>
            <Ico.Download /> {uploading ? 'Importing…' : 'Upload'}
          </button>
        </div>
        {/* Photo cards — minHeight:0 lets the flex child scroll instead of shrink */}
        <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 16 }}>
          {photos.length === 0 && (
            <div style={{ textAlign: 'center', padding: '60px 16px', color: '#A0948A', fontSize: 14 }}>
              No photos yet — tap Camera or Upload to add one.
            </div>
          )}
          {photos.map((ph, i) => (
            <div key={ph.id} style={{ flexShrink: 0, borderRadius: 16, overflow: 'hidden', border: '1px solid #E5E1D8',
                                      background: '#fff', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
              <div style={{ position: 'relative', flexShrink: 0 }}>
                <img src={photoUrl(ph) || ''} alt={`Photo ${i + 1}`}
                     onClick={() => setExpandedId(ph.id)}
                     style={{ width: '100%', height: 160, minHeight: 160, display: 'block', cursor: 'zoom-in',
                              objectFit: 'cover', objectPosition: 'center', flexShrink: 0 }} />
                <button onClick={() => deletePhoto(ph.id)}
                  style={{ position: 'absolute', top: 8, right: 8, width: 32, height: 32,
                           borderRadius: '50%', background: 'rgba(0,0,0,0.5)', border: 'none',
                           display: 'flex', alignItems: 'center', justifyContent: 'center',
                           color: '#fff', cursor: 'pointer' }}>
                  <Ico.Trash />
                </button>
              </div>
              <div style={{ padding: 12, flexShrink: 0 }}>
                <textarea
                  value={ph.note}
                  onChange={e => updateNote(ph.id, e.target.value)}
                  placeholder="Notes for this photo…"
                  rows={2}
                  style={{ width: '100%', boxSizing: 'border-box', fontSize: 13, resize: 'none',
                           borderRadius: 8, border: '1px solid #E5E1D8', padding: '8px 10px',
                           fontFamily: "'Caveat', cursive", fontSize: 15, outline: 'none',
                           background: '#F5F0E3', color: '#1A1A1A' }}
                />
              </div>
            </div>
          ))}
        </div>
        {/* Lightbox — full image on tap */}
        {expandedId && (() => {
          const lbPhoto = photos.find(p => p.id === expandedId);
          if (!lbPhoto) return null;
          return (
            <div onClick={() => setExpandedId(null)}
                 style={{ position: 'fixed', inset: 0, zIndex: 9999,
                          background: 'rgba(0,0,0,0.90)',
                          display: 'flex', flexDirection: 'column',
                          alignItems: 'center', justifyContent: 'center',
                          cursor: 'zoom-out', padding: '12px 8px' }}>
              <img src={photoUrl(lbPhoto) || ''}
                   style={{ maxWidth: '96vw', maxHeight: '80vh',
                            objectFit: 'contain', borderRadius: 6,
                            boxShadow: '0 4px 32px rgba(0,0,0,0.6)',
                            display: 'block' }} />
              {lbPhoto.note?.trim() && (
                <div style={{ marginTop: 12, maxWidth: '96vw', color: '#E8E4DC',
                              fontSize: 16, fontFamily: "'Caveat', cursive",
                              textAlign: 'center', lineHeight: 1.4 }}>
                  {lbPhoto.note.trim()}
                </div>
              )}
              <div style={{ marginTop: 14, fontSize: 12, color: 'rgba(255,255,255,0.45)' }}>
                Tap anywhere to close
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  // Resolve a list of photo records into a `{ id -> dataUrl }` map for export.
  // Prefers the caller's urlMap (already loaded in PhotoPage) and falls back
  // to a photoDB lookup for each missing ref. Legacy inline dataUrl photos
  // pass through unchanged.
  async function resolvePhotoUrls(photos, urlMap) {
    urlMap = urlMap || {};
    const out = {};
    const missing = [];
    for (const ph of (photos || [])) {
      if (!ph) continue;
      if (ph.photoRef && urlMap[ph.photoRef]) {
        out[ph.id] = urlMap[ph.photoRef];
      } else if (ph.photoRef) {
        missing.push(ph);
      } else if (ph.dataUrl) {
        out[ph.id] = ph.dataUrl;
      }
    }
    if (missing.length) {
      const map = await photoDB.getMany(missing.map(p => p.photoRef));
      for (const ph of missing) {
        if (map[ph.photoRef]) out[ph.id] = map[ph.photoRef];
      }
    }
    return out;
  }

  // Single-page photo PDF export (used by per-page export button)
  async function exportPhotoPDF(page, photos, urlMap, toast) {
    if (!window.jspdf) { toast({ message: 'PDF library not loaded.', type: 'error' }); return; }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
    const W = pdf.internal.pageSize.getWidth();
    const H = pdf.internal.pageSize.getHeight();
    const margin = 14;
    const meta = { label: 'Photos', color: '#7C3AED', bg: '#EDE9FE' };
    const F = _initPDFFonts();
    const contentY = _pdfPageHeader(pdf, page, meta, W, H, margin, F);
    const urls = await resolvePhotoUrls(photos, urlMap);
    if (!photos || photos.length === 0) {
      pdf.setTextColor(150, 150, 150); pdf.setFontSize(9);
      pdf.text('(No photos)', W / 2, contentY + 20, { align: 'center' });
    } else {
      // 2×2 grid layout — 4 photos per page
      const colGap = 6, rowGap = 8;
      const cellW = (W - margin * 2 - colGap) / 2;
      const maxImgH = 62, captH = 10;
      const cellH = maxImgH + captH;
      let pi = 0, isFirstPage = true;
      while (pi < photos.length) {
        if (!isFirstPage) pdf.addPage();
        isFirstPage = false;
        let py = contentY + 4;
        for (let row = 0; row < 2 && pi < photos.length; row++) {
          for (let col = 0; col < 2 && pi < photos.length; col++) {
            const ph = photos[pi++];
            const url = urls[ph.id];
            const cx = margin + col * (cellW + colGap);
            if (url) {
              try {
                const tmp = new Image();
                await new Promise(res => { tmp.onload = res; tmp.onerror = res; tmp.src = url; });
                const aspect = (tmp.naturalWidth || 4) / (tmp.naturalHeight || 3);
                let imgW = cellW, imgH = imgW / aspect;
                if (imgH > maxImgH) { imgH = maxImgH; imgW = imgH * aspect; }
                pdf.addImage(url, 'JPEG', cx + (cellW - imgW) / 2, py, imgW, imgH);
              } catch { /* skip unloadable */ }
            }
            if (ph.note?.trim()) {
              pdf.setFontSize(7.5); pdf.setTextColor(60, 60, 60);
              const captLines = pdf.splitTextToSize(ph.note.trim(), cellW).slice(0, 2);
              captLines.forEach((ln, li) => {

  // ─────────────────────────────────────────────────────────────────────────────
  // DMS ENGINE  — shared by DataPage
  // ─────────────────────────────────────────────────────────────────────────────

  // Parse a DMS string entered by the user into decimal degrees.
  // Accepts all of these formats:
  //   "45 34 23"        → 45°34'23"  (space-separated — the primary fast-entry method)
  //   "45 34"           → 45°34'00"
  //   "45"              → 45°00'00"
  //   "45.5"            → treated as decimal degrees (no spaces)
  // Supported input formats (all accept a leading "-" for south/west):
  //   Classical:      45°34'23"  or  45°34'23.5"  (° ' " with optional spaces)
  //   d/m/s words:    45d34m23s  or  45d 34m 23s  (also handles voice "45 degrees 34 minutes")
  //   Space-sep:      45 34 23   or  45 34         (D M S or D M)
  //   Dash-sep:       45-34-23   or  45-34         (D-M-S, common in voice transcription)
  //   Colon-sep:      45:34:23   or  45:34         (D:M:S — Excel clipboard round-trip format)
  //   DD.MMSS:        45.3423  → 45°34'23"         (exactly 4 decimal digits, valid MM < 60 and SS < 60)
  //   Plain decimal:  45.5722  → 45.5722°          (fallback when not valid DD.MMSS)
  //   Unicode quotes: handles ' " ′ ″ ' ' " " variants from voice/paste
  // Returns decimal degrees (number) or null if unparseable.
  function parseDMSInput(raw) {
    if (!raw || !raw.trim()) return null;
    const s = raw.trim();

    // Strip sign, work with absolute value, reapply at end
    const neg = s.charAt(0) === '-';
    const abs = neg ? s.slice(1).trimStart() : s;
    const sign = neg ? -1 : 1;

    // ── Classical notation: 45°34'23" / 45d34m23s / 45d 34m 23s ──────
    // Degree sep: °  d  (case-insensitive d)
    // Minute sep: '  ′  '  '  m
    // Second sep: "  ″  "  "  s  (optional at end)
    const classicRe = /^(\d+)\s*[°dD]\s*(\d+)\s*['''′m]\s*(\d+(?:\.\d+)?)\s*["""″sS]?$/;
    const cm = abs.match(classicRe);
    if (cm) {
      const d = parseInt(cm[1], 10), m = parseInt(cm[2], 10), sec = parseFloat(cm[3]);
      if (m >= 60 || sec >= 60) return null;
      return sign * (d + m / 60 + sec / 3600);
    }

    // ── Voice variant: "45 degrees 34 minutes 23 seconds" ─────────────
    const wordsRe = /^(\d+)\s+degrees?\s+(\d+)\s+minutes?\s+(\d+(?:\.\d+)?)\s+seconds?$/i;
    const wm = abs.match(wordsRe);
    if (wm) {
      const d = parseInt(wm[1], 10), m = parseInt(wm[2], 10), sec = parseFloat(wm[3]);
      if (m >= 60 || sec >= 60) return null;
      return sign * (d + m / 60 + sec / 3600);
    }

    // ── Space-separated: "45 34 23" or "45 34" ────────────────────────
    const spaceRe = /^(\d+)\s+(\d+)(?:\s+(\d+(?:\.\d+)?))?$/;
    const sm = abs.match(spaceRe);
    if (sm) {
      const d = parseInt(sm[1], 10), m = parseInt(sm[2], 10), sec = sm[3] ? parseFloat(sm[3]) : 0;
      if (m >= 60 || sec >= 60) return null;
      return sign * (d + m / 60 + sec / 3600);
    }

    // ── Dash-separated: "45-34-23" or "45-34" ─────────────────────────
    const dashRe = /^(\d+)-(\d+)(?:-(\d+(?:\.\d+)?))?$/;
    const dm = abs.match(dashRe);
    if (dm) {
      const d = parseInt(dm[1], 10), m = parseInt(dm[2], 10), sec = dm[3] ? parseFloat(dm[3]) : 0;
      if (m >= 60 || sec >= 60) return null;
      return sign * (d + m / 60 + sec / 3600);
    }

    // ── Colon-separated: "45:34:23" or "45:34" ────────────────────────
    // This is the format produced by formatDMSColon() for the Excel clipboard export,
    // so values copied out of the app paste back in cleanly (round-trip).
    const colonRe = /^(\d+):(\d+)(?::(\d+(?:\.\d+)?))?$/;
    const coM = abs.match(colonRe);
    if (coM) {
      const d = parseInt(coM[1], 10), m = parseInt(coM[2], 10), sec = coM[3] ? parseFloat(coM[3]) : 0;
      if (m >= 60 || sec >= 60) return null;
      return sign * (d + m / 60 + sec / 3600);
    }

    // ── DD.MMSS shorthand: exactly 4 decimal digits, MM < 60, SS < 60 ─
    // e.g. 45.3423 → 45°34'23"   127.1505 → 127°15'05"
    // Ambiguous with decimal degrees, but in a DMS column this is the intended interpretation.
    const shortRe = /^(\d+)\.(\d{4})$/;
    const shm = abs.match(shortRe);
    if (shm) {
      const d  = parseInt(shm[1], 10);
      const mm = parseInt(shm[2].slice(0, 2), 10);
      const ss = parseInt(shm[2].slice(2), 10);
      if (mm < 60 && ss < 60) return sign * (d + mm / 60 + ss / 3600);
      // Falls through to plain decimal if MM or SS are out of range
    }

    // ── Plain decimal degrees (final fallback) ─────────────────────────
    const plain = parseFloat(abs);
    if (!isNaN(plain)) return sign * plain;

    return null;
  }

  // Format decimal degrees as D°MM'SS.s" for display in DMS columns.
  function formatDMS(dd) {
    if (dd === null || dd === undefined || isNaN(dd)) return '';
    const sign = dd < 0 ? '-' : '';
    const abs  = Math.abs(dd);
    const d    = Math.floor(abs);
    const mf   = (abs - d) * 60;
    const m    = Math.floor(mf);
    const sf   = (mf - m) * 60;
    let dispS = Math.round(sf), dispM = m, dispD = d;
    if (dispS >= 60) { dispS -= 60; dispM += 1; }   // carry seconds
    if (dispM >= 60) { dispM -= 60; dispD += 1; }   // carry minutes
    return `${sign}${dispD}°${String(dispM).padStart(2,'0')}'${String(dispS).padStart(2,'0')}"`;
  }

  // Format decimal degrees as DD:MM:SS for clipboard export (Excel-compatible angle format).
  function formatDMSColon(dd) {
    if (dd === null || dd === undefined || isNaN(dd)) return '';
    const sign = dd < 0 ? '-' : '';
    const abs  = Math.abs(dd);
    const d    = Math.floor(abs);
    const mf   = (abs - d) * 60;
    const m    = Math.floor(mf);
    let dispS = Math.round((mf - m) * 60), dispM = m, dispD = d;
    if (dispS >= 60) { dispS -= 60; dispM += 1; }
    if (dispM >= 60) { dispM -= 60; dispD += 1; }
    return `${sign}${dispD}:${String(dispM).padStart(2,'0')}:${String(dispS).padStart(2,'0')}`;
  }

  // Convert decimal degrees to a compact DMS string for formula storage.
  // e.g. 45.5722... → "45 34 20.0" (space-separated, for re-parsing)
  function ddToDMSParts(dd) {
    if (dd === null || isNaN(dd)) return '';
    const sign = dd < 0 ? '-' : '';
    const abs  = Math.abs(dd);
    const d    = Math.floor(abs);
    const mf   = (abs - d) * 60;
    const m    = Math.floor(mf);
    const s    = Math.round((mf - m) * 600) / 10;
    return `${sign}${d} ${m} ${s.toFixed(1)}`;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // HYPERFORMULA SURVEY PLUGIN
  // Registers custom surveyor functions once, before any HF instance is created.
  // Safe to call multiple times — guarded by window._fbSurveyPluginRegistered.
  // ─────────────────────────────────────────────────────────────────────────────
  // ─────────────────────────────────────────────────────────────────────────────
  // CUSTOM SURVEYOR FUNCTIONS
  // Evaluated in plain JavaScript AFTER HyperFormula runs — avoiding HF's plugin
  // API entirely (which breaks under Babel standalone's class-inheritance model).
  //
  // Supported formulas (entire cell must be one of these calls):
  //   =HDIST(slope_dist, zenith_deg)       horizontal distance
  //   =VDIST(slope_dist, zenith_deg)       vertical distance
  //   =AZIMUTH(n1, e1, n2, e2)            bearing 0-360°
  //   =DISTANCE(n1, e1, n2, e2)           Pythagorean distance
  //   =DEG2RAD(degrees)                   degrees → radians
  //   =RAD2DEG(radians)                   radians → degrees
  //
  // Arguments can be numeric literals or simple cell references (A1, $B$3, etc.).
  // ─────────────────────────────────────────────────────────────────────────────

  const SURVEY_FUNCS = {
    HDIST:    (d, z) => d * Math.sin(z * Math.PI / 180),
    VDIST:    (d, z) => d * Math.cos(z * Math.PI / 180),
    AZIMUTH:  (n1, e1, n2, e2) => (((Math.atan2(e2 - e1, n2 - n1) * 180 / Math.PI) % 360) + 360) % 360,
    DISTANCE: (n1, e1, n2, e2) => Math.sqrt((n2 - n1) ** 2 + (e2 - e1) ** 2),
    DEG2RAD:  (d) => d * Math.PI / 180,
    RAD2DEG:  (r) => r * 180 / Math.PI,
  };

  // "A" → 0, "B" → 1, "AA" → 26, etc.
  function colLetterToIndex(letters) {
    let n = 0;
    for (let i = 0; i < letters.length; i++) n = n * 26 + (letters.charCodeAt(i) - 64);
    return n - 1;
  }

  // Try to evaluate a single-call surveyor formula using live HF cell values.
  // Returns a Number on success, an error string on formula error, or null when
  // the formula is not a recognized surveyor function (so caller can fall through).
  function evalSurveyFormula(formula, hf) {
    if (!formula || !formula.startsWith('=')) return null;
    // Match:  =FUNCNAME( ... )
    const m = formula.slice(1).trim().match(/^([A-Z][A-Z0-9_]*)\s*\((.+)\)$/i);
    if (!m) return null;
    const fn = SURVEY_FUNCS[m[1].toUpperCase()];
    if (!fn) return null;

    // Resolve each comma-separated argument to a number
    const args = m[2].split(',').map(raw => {
      const s = raw.trim();
      // Simple cell reference: A1  $B$3  a1  etc.
      const cellM = s.match(/^\$?([A-Z]+)\$?(\d+)$/i);
      if (cellM && hf) {
        const v = hf.getCellValue({ sheet: 0, row: parseInt(cellM[2], 10) - 1, col: colLetterToIndex(cellM[1].toUpperCase()) });
        if (typeof v === 'number') return v;
        const n = parseFloat(v);
        return isNaN(n) ? NaN : n;
      }
      // Numeric literal (handles negatives: -1.5)
      const n = parseFloat(s);
      return isNaN(n) ? NaN : n;
    });

    if (args.some(isNaN)) return '#VALUE!';
    try {
      const result = fn(...args);
      return isFinite(result) && !isNaN(result) ? result : '#DIV/0!';
    } catch (_) {
      return '#ERR';
    }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // FORMULA FILL — relative/absolute reference shifting for drag-fill
  // ─────────────────────────────────────────────────────────────────────────────

  // Shift all *relative* row numbers in a formula string by `offset` rows.
  // Rules match Excel:
  //   A1   → relative col + relative row  → shift row
  //   $A1  → absolute col + relative row  → shift row
  //   A$1  → relative col + absolute row  → keep row
  //   $A$1 → absolute col + absolute row  → keep row
  function shiftFormulaDown(formula, offset) {
    if (!formula.startsWith('=') || offset === 0) return formula;
    return formula.replace(/(\$?)([A-Z]+)(\$?)(\d+)/g, (match, dc, col, dr, row) => {
      if (dr === '$') return match;   // absolute row — leave untouched
      const newRow = parseInt(row, 10) + offset;
      return newRow < 1 ? match : dc + col + dr + newRow;
    });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // DMS NUMPAD
  // Full-screen bottom panel for rapid DMS entry on mobile — suppresses the
  // native OS keyboard when a DMS column cell is being edited.
  // ─────────────────────────────────────────────────────────────────────────────
  function DmsNumpad({ value, onChange, onCommit, onDismiss }) {
    // Top row: digits + DMS symbols. Bottom: wide space bar.
    const rows = [
      [
        { label: '7', cls: 'digit' }, { label: '8', cls: 'digit' },
        { label: '9', cls: 'digit' }, { label: '°', cls: 'sym' },
      ],
      [
        { label: '4', cls: 'digit' }, { label: '5', cls: 'digit' },
        { label: '6', cls: 'digit' }, { label: "'", cls: 'sym' },
      ],
      [
        { label: '1', cls: 'digit' }, { label: '2', cls: 'digit' },
        { label: '3', cls: 'digit' }, { label: '"', cls: 'sym' },
      ],
      [
        { label: '±', cls: 'special' }, { label: '0', cls: 'digit' },
        { label: '⌫', cls: 'del' },    { label: '✓', cls: 'confirm' },
      ],
    ];

    function tap(key) {
      if (key === '⌫') { onChange(value.slice(0, -1)); return; }
      if (key === '✓') { onCommit(); return; }
      if (key === '±') {
        onChange(value.startsWith('-') ? value.slice(1) : '-' + value);
        return;
      }
      onChange(value + key);
    }

    const isEmpty = !value || !value.trim();

    return (
      <div className="dp-numpad">
        {/* Value preview */}
        <div className={`dp-numpad-preview${isEmpty ? ' empty' : ''}`}>
          {isEmpty ? '0' : value}
        </div>
        {/* Main key grid */}
        <div className="dp-numpad-grid">
          {rows.flat().map((k, i) => (
            <button key={i} className={`dp-numpad-btn ${k.cls}`}
              onPointerDown={e => { e.preventDefault(); tap(k.label); }}>
              {k.label}
            </button>
          ))}
        </div>
        {/* Wide space bar */}
        <button className="dp-numpad-space"
          onPointerDown={e => { e.preventDefault(); onChange(value + ' '); }}>
          SPACE
        </button>
        <button className="dp-numpad-dismiss"
          onPointerDown={e => { e.preventDefault(); onDismiss(); }}>
          dismiss keyboard
        </button>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // HYPERFORMULA ENGINE  — one instance per DataPage mount
  // ─────────────────────────────────────────────────────────────────────────────

  // Return the effective type for a single cell: per-cell override wins over column default.
  function getCellType(row, col) {
    return (row?.cellMeta || {})[col?.id]?.colType || col?.colType || 'num';
  }

  // Build a 2-D array of raw values suitable for HyperFormula from the page data.
  // DMS columns/cells store their decimal-degree equivalent so formulas work numerically.
  function buildHFSheet(columns, rows) {
    return rows.map(row =>
      columns.map(col => {
        const raw = (row.cells || {})[col.id] || '';
        if (!raw.trim()) return '';
        if (raw.startsWith('=')) return raw;   // formula — pass through
        if (getCellType(row, col) === 'dms') {
          const dd = parseDMSInput(raw);
          return dd !== null ? dd : raw;
        }
        const num = parseFloat(raw);
        return isNaN(num) ? raw : num;
      })
    );
  }

  // Evaluate all formula cells for export functions that run outside React.
  // Returns a map { "rowId_colId": displayString } same shape as calcResults state.
  function evalDataPageCells(columns, rows) {
    const results = {};
    if (typeof HyperFormula === 'undefined' || !columns.length || !rows.length) return results;
    try {
      const sheetData = buildHFSheet(columns, rows);
      const hf = HyperFormula.buildFromArray(sheetData, { licenseKey: 'gpl-v3', precisionRounding: 10 });
      rows.forEach((row, ri) => {
        columns.forEach((col, ci) => {
          const raw = (row.cells || {})[col.id] || '';
          if (!raw.trim()) return;
          const key = row.id + '_' + col.id;
          const cellType = getCellType(row, col);
          if (raw.startsWith('=')) {
            try {
              const val = hf.getCellValue({ sheet: 0, row: ri, col: ci });
              if (typeof val === 'number') {
                results[key] = cellType === 'dms' ? formatDMS(val) : String(Math.round(val * 1e8) / 1e8);
              } else if (val instanceof Error || (val && val.type)) {
                const custom = evalSurveyFormula(raw, hf);
                results[key] = custom !== null
                  ? (typeof custom === 'number'
                      ? (cellType === 'dms' ? formatDMS(custom) : String(Math.round(custom * 1e8) / 1e8))
                      : String(custom))
                  : '#ERR';
              } else {
                results[key] = String(val ?? '');
              }
            } catch(e) { results[key] = '#ERR'; }
          } else if (cellType === 'dms') {
            const dd = parseDMSInput(raw);
            if (dd !== null) results[key] = formatDMS(dd);
          }
        });
      });
      try { hf.destroy(); } catch(e) {}
    } catch(e) {}
    return results;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // DATA PAGE
  // ─────────────────────────────────────────────────────────────────────────────

  function DataPage({ page, projectId, onReload, onRegisterExports }) {

    const [activeCell, setActiveCell]   = useState(null);   // { rowIdx, colIdx }
    const [editingCell, setEditingCell] = useState(null);   // { rowIdx, colIdx }
    const [editValue, setEditValue]     = useState('');
    const [formulaBarVal, setFormulaBarVal] = useState('');
    const [colModal, setColModal]       = useState(null);   // null | { col }
    const [colModalForm, setColModalForm] = useState({});
    const [templateModal, setTemplateModal] = useState(false);
    const [customTemplates, setCustomTemplates] = useState(() => DB.getCustomTemplates());
    const [openTbMenu, setOpenTbMenu]   = useState(null); // 'insert' | 'formulas' | 'view' | null
    const [csvImportModal, setCsvImportModal] = useState(null); // null | { parsed, useHeader }
    const [menuPos, setMenuPos]         = useState({ top: 0, left: 0 }); // fixed-position for open dropdown
    // DMS keyboard — global setting persisted in localStorage, OFF by default
    const [dmsKeyboard, setDmsKeyboard] = useState(() => {
